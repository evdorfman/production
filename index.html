                      </div>
                      {(production.crewInternal||[]).length===0&&<div style={{fontSize:11,color:"#374151"}}>No internal crew.</div>}
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {(production.crewInternal||[]).map(c=>{
                          const m = team.find(x=>x.id===c.memberId);
                          const crewId = \`i-\${c.id||m?.id||c.memberId}\`;
                          const schedT = getCrewTimes(crewId);
                          const spaceT = getSpaceCallTime(c.role||"");
                          // Prefer schedule-derived times; fall back to space-derived
                          const callT = schedT.call || spaceT.call;
                          const wrapT = schedT.wrap || spaceT.wrap;
                          return(
                          <div key={c.id} style={{display:"grid",gridTemplateColumns:"150px 1fr 110px 110px auto",gap:5,alignItems:"center"}}>
                            <select value={c.role||""} onChange={e=>updCI(c.id,"role",e.target.value)} style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:"#e2e8f0",padding:"5px 7px",fontSize:12,outline:"none"}}>
                              <option value="">Role…</option>{CREW_ROLES.map(r=><option key={r}>{r}</option>)}
                            </select>
                            <select value={c.memberId||""} onChange={e=>updCI(c.id,"memberId",e.target.value?Number(e.target.value):null)} style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:c.memberId?"#e2e8f0":"#4b5563",padding:"5px 7px",fontSize:12,outline:"none"}}>
                              <option value="">Assign member…</option>{team.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                            </select>
                            <div style={{background:"#0a0f1a",border:"1px solid #3b82f630",borderRadius:6,padding:"4px 7px",fontSize:11,color:"#60a5fa",textAlign:"center"}}>
                              📞 {callT||"—"}
                            </div>
                            <div style={{background:"#0a0f1a",border:"1px solid #8b5cf630",borderRadius:6,padding:"4px 7px",fontSize:11,color:"#a78bfa",textAlign:"center"}}>
                              🏁 {wrapT||"—"}
                            </div>
                            <button onClick={()=>delCI(c.id)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                          </div>
                        );})}
                      </div>
                    </div>
                    {/* External */}
                    <div style={{borderTop:"1px solid #1f2937",paddingTop:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>External</div>
                        <Btn small onClick={addCrewExt}>+ Add</Btn>
                      </div>
                      {(production.crewExternal||[]).length===0&&<div style={{fontSize:11,color:"#374151"}}>No external crew.</div>}
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {(production.crewExternal||[]).map(c=>{
                          const crewId=\`e-\${c.id}\`;
                          const schedT=getCrewTimes(crewId);
                          const spaceT=getSpaceCallTime(c.role||"");
                          const callT=schedT.call||spaceT.call;
                          const wrapT=schedT.wrap||spaceT.wrap;
                          return(
                          <div key={c.id} style={{display:"grid",gridTemplateColumns:"150px 1fr 1fr 80px 80px auto",gap:5,alignItems:"center"}}>
                            <select value={c.role||""} onChange={e=>updCE(c.id,"role",e.target.value)} style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:"#e2e8f0",padding:"5px 7px",fontSize:12,outline:"none"}}>
                              <option value="">Role…</option>{CREW_ROLES.map(r=><option key={r}>{r}</option>)}
                            </select>
                            <Inp value={c.name||""} onChange={e=>updCE(c.id,"name",e.target.value)} placeholder="Name…"/>
                            <Inp value={c.company||""} onChange={e=>updCE(c.id,"company",e.target.value)} placeholder="Company…"/>
                            <div style={{background:"#0a0f1a",border:"1px solid #3b82f630",borderRadius:6,padding:"4px 7px",fontSize:11,color:"#60a5fa",textAlign:"center"}}>
                              📞 {callT||"—"}
                            </div>
                            <div style={{background:"#0a0f1a",border:"1px solid #8b5cf630",borderRadius:6,padding:"4px 7px",fontSize:11,color:"#a78bfa",textAlign:"center"}}>
                              🏁 {wrapT||"—"}
                            </div>
                            <button onClick={()=>delCE(c.id)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                          </div>
                        );})}
                      </div>
                    </div>
                  </SecPanel>
                )}

                {/* 6. Schedule */}
                <SecPanel icon="📋" label="Production Schedule"
                  open={sectOpen.schedule} onOpen={()=>setSectOpen(p=>({...p,schedule:true}))} onClose={()=>setSectOpen(p=>({...p,schedule:false}))}
                  badge={(production.schedule||[]).length||null}
                  summary={(production.schedule||[]).length>0?\`\${(production.schedule||[]).length} items\`+((production.schedule||[])[0]?.time?\` · starts \${(production.schedule||[])[0].time}\`:""):null}
                  summaryEmpty="No run-of-show yet">
                  <ProductionScheduleEditor
                    schedule={production.schedule||[]}
                    productionType={production.type}
                    startTime={production.startTime||""}
                    endTime={production.endTime||""}
                    secondaryLocations={production.secondaryLocations||[]}
                    crewInternal={production.crewInternal||[]}
                    crewExternal={production.crewExternal||[]}
                    team={team}
                    onUpdate={s=>upd("schedule",s)}
                  />
                </SecPanel>

                {/* 7. Gear */}
                <SecPanel icon="🎒" label="Gear"
                  open={sectOpen.gear} onOpen={()=>setSectOpen(p=>({...p,gear:true}))} onClose={()=>setSectOpen(p=>({...p,gear:false}))}
                  badge={(production.equipmentIds||[]).length+(production.externalGear||[]).length+(production.mediaCardIds||[]).length||null}
                  summary={(()=>{
                    const parts=[];
                    if((production.equipmentIds||[]).length) parts.push(\`\${production.equipmentIds.length} studio\`);
                    if((production.mediaCardIds||[]).length) parts.push(\`\${production.mediaCardIds.length} media\`);
                    if((production.externalGear||[]).length) parts.push(\`\${production.externalGear.length} external\`);
                    return parts.length?parts.join(", "):null;
                  })()}
                  summaryEmpty="No gear selected">
                  <ShootGearPicker
                    equipmentIds={production.equipmentIds||[]}
                    externalGear={production.externalGear||[]}
                    mediaCardIds={production.mediaCardIds||[]}
                    onUpdateEquipment={ids=>upd("equipmentIds",ids)}
                    onUpdateExternal={gear=>upd("externalGear",gear)}
                    onUpdateMediaCards={ids=>upd("mediaCardIds",ids)}
                  />
                </SecPanel>

                {/* 8. Live Playback assets */}
                {isPlayback&&(
                  <SecPanel icon="📼" label="Playback Assets"
                    open={sectOpen.playbackAssets} onOpen={()=>setSectOpen(p=>({...p,playbackAssets:true}))} onClose={()=>setSectOpen(p=>({...p,playbackAssets:false}))}
                    badge={(production.playbackAssets||[]).length||null}
                    summary={(production.playbackAssets||[]).length>0?\`\${production.playbackAssets.length} asset\${production.playbackAssets.length!==1?"s":""}\`:null}
                    summaryEmpty="No playback assets added">
                    <LivePlaybackAssetPicker
                      production={production}
                      allProjectDels={allProjectDels}
                      allProjects={[]}
                      onUpdate={upd}
                      onAddDeliverable={onAddDeliverable}
                    />
                  </SecPanel>
                )}

                {/* 9. Ingest */}
                <SecPanel icon="📥" label="Media Ingest"
                  open={sectOpen.ingest} onOpen={()=>setSectOpen(p=>({...p,ingest:true}))} onClose={()=>setSectOpen(p=>({...p,ingest:false}))}
                  summary={production.ingest?.datetime?\`\${fmtDT(production.ingest.datetime)}\${production.ingest.recurringOrOnce?" · "+production.ingest.recurringOrOnce:""}\`:null}
                  summaryEmpty="Ingest not yet scheduled">
                  {(()=>{
                    const ig=production.ingest||{};
                    const updIG=patch=>upd("ingest",{...ig,...patch});
                    const needsRichIngest=["Live Event","Live Broadcast","Hybrid Event","Pre-tape"].includes(production.type);
                    const REQUIRED_FIELDS=[{key:"datetime",label:"Media ingest time"},{key:"recurringOrOnce",label:"Recurring or one-off"},{key:"sessionCount",label:"Number of sessions"}];
                    const missingFields=needsRichIngest?REQUIRED_FIELDS.filter(f=>!ig[f.key]):[];
                    const createReviewLinks=(count,ingestDatetime,watermark,transcriptNeeded)=>{
                      if(!ingestDatetime||!count) return;
                      const prevIds=ig.reviewLinkDelIds||[];
                      if(prevIds.length>0) prevIds.forEach(did=>onDeleteDeliverable(did));
                      const base=new Date(ingestDatetime);
                      const due=new Date(base.getTime()+24*3600000);
                      const dueISO=due.toISOString().slice(0,16);
                      const noteParts=[];
                      if(watermark) noteParts.push("Internal use only watermark required.");
                      if(transcriptNeeded) noteParts.push("Transcript needed.");
                      const newIds=[];
                      Array.from({length:Number(count)},(_,i)=>{
                        const d=mkDel(count===1?"Review Link":\`Review Link \${i+1}\`,null,null,"Not Started",[]);
                        d.deadline=dueISO; d.deliverableType="Review Link"; d.notes=noteParts.join(" ");
                        onAddDeliverable(d); newIds.push(d.id);
                      });
                      updIG({reviewLinkDelIds:newIds});
                    };
                    const TRow=({label,value,onChange,indent=false,children})=>(
                      <div style={{marginLeft:indent?16:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #1f293740"}}>
                          <div style={{fontSize:12,color:indent?"#9ca3af":"#e2e8f0",fontWeight:indent?400:600}}>{label}</div>
                          <Toggle value={value} onChange={onChange}/>
                        </div>
                        {value&&children&&<div style={{marginLeft:indent?0:16,paddingTop:4}}>{children}</div>}
                      </div>
                    );
                    const BtnGroup=({options,value,onChange,small})=>(
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                        {options.map(o=>(
                          <button key={o} onClick={()=>onChange(o)} style={{padding:small?"3px 10px":"5px 12px",borderRadius:6,border:\`1px solid \${value===o?"#10b981":"#374151"}\`,background:value===o?"#10b98120":"transparent",color:value===o?"#10b981":"#6b7280",fontWeight:700,fontSize:small?10:11,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif"}}>
                            {o}
                          </button>
                        ))}
                      </div>
                    );
                    return (
                      <div style={{display:"flex",flexDirection:"column",gap:0}}>
                        {/* Social Content: delivery auto-set from end time */}
                        {isSocial?(
                          <>
                            <div style={{paddingBottom:8,marginBottom:8,borderBottom:"1px solid #06b6d420"}}>
                              <LW label="Media Delivery Time">
                                <DateTimePicker value={ig.datetime||(production.endTime||"")} onChange={v=>updIG({datetime:v})} label="Defaults to production end time"/>
                              </LW>
                              {production.endTime&&!ig.datetime&&(
                                <div style={{fontSize:10,color:"#4b5563",marginTop:3}}>
                                  Auto-set to wrap time ({fmtDT(production.endTime)}) — edit to override
                                </div>
                              )}
                            </div>
                            <div style={{display:"flex",gap:16,flexWrap:"wrap",paddingTop:4}}>
                              <Toggle label="Transcript Needed" value={!!ig.transcriptNeeded} onChange={v=>updIG({transcriptNeeded:v})}/>
                              <Toggle label="Review Link Needed" value={!!ig.reviewLinkNeeded} onChange={v=>updIG({reviewLinkNeeded:v})}/>
                            </div>
                            <div style={{marginTop:10}}><LW label="Notes for Media Manager"><Inp textarea value={ig.notes||""} onChange={e=>updIG({notes:e.target.value})} placeholder="Card types, drive labels…" style={{minHeight:36}}/></LW></div>
                          </>
                        ):(
                          <>
                            <div style={{paddingBottom:8,marginBottom:8,borderBottom:"1px solid #06b6d420"}}>
                              <LW label="Expected Delivery Time"><DateTimePicker value={ig.datetime||""} onChange={v=>updIG({datetime:v})} label="When will media arrive?"/></LW>
                            </div>
                            {needsRichIngest&&(
                              <>
                                <div style={{paddingBottom:6,marginBottom:2}}><div style={{fontSize:11,color:"#6b7280",fontWeight:600,marginBottom:4}}>Type of event</div><BtnGroup options={["One-off","Recurring"]} value={ig.recurringOrOnce} onChange={v=>updIG({recurringOrOnce:v})}/></div>
                                <div style={{paddingBottom:6,marginBottom:2}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#e2e8f0",fontWeight:600}}>Sessions being recorded</div><Sel value={ig.sessionCount||""} onChange={e=>updIG({sessionCount:e.target.value})} style={{width:"auto",fontSize:12}}><option value="">—</option>{Array.from({length:10},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}</Sel></div></div>
                                <TRow label="Transcript needed?" value={!!ig.transcriptNeeded} onChange={v=>updIG({transcriptNeeded:v,transcriptType:""})}><BtnGroup options={["1 full transcript","Individual per session"]} value={ig.transcriptType} onChange={v=>updIG({transcriptType:v})} small/></TRow>
                                <TRow label="Review link needed?" value={!!ig.reviewLinkNeeded} onChange={v=>updIG({reviewLinkNeeded:v})}>
                                  <TRow label="Internal use only watermark" value={!!ig.reviewWatermark} onChange={v=>updIG({reviewWatermark:v})} indent/>
                                  <div style={{marginLeft:16,marginTop:6}}>
                                    <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>Link structure:</div>
                                    <BtnGroup options={["1 link for entire event","Individual links"]} value={ig.reviewLinkType} onChange={v=>updIG({reviewLinkType:v})} small/>
                                    {ig.reviewLinkType==="Individual links"&&(<div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><div style={{fontSize:11,color:"#9ca3af"}}>How many links?</div><Sel value={ig.reviewLinkCount||""} onChange={e=>updIG({reviewLinkCount:e.target.value})} style={{width:"auto",fontSize:11}}><option value="">—</option>{Array.from({length:10},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}</Sel></div>)}
                                    {ig.reviewLinkType&&ig.datetime&&(<div style={{marginTop:8}}><button onClick={()=>createReviewLinks(ig.reviewLinkType==="1 link for entire event"?1:Number(ig.reviewLinkCount||1),ig.datetime,ig.reviewWatermark,ig.transcriptNeeded)} style={{background:(ig.reviewLinkDelIds||[]).length>0?"#f59e0b20":"#10b98120",border:\`1px solid \${(ig.reviewLinkDelIds||[]).length>0?"#f59e0b40":"#10b98140"}\`,borderRadius:6,color:(ig.reviewLinkDelIds||[]).length>0?"#f59e0b":"#10b981",padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{(ig.reviewLinkDelIds||[]).length>0?"↺ Re-create Review Links":"✓ Create Review Link Deliverable"+(ig.reviewLinkType==="Individual links"&&Number(ig.reviewLinkCount||1)>1?"s":"")}</button>{(ig.reviewLinkDelIds||[]).length>0&&<div style={{fontSize:10,color:"#6b7280",marginTop:3}}>{ig.reviewLinkDelIds.length} deliverable{ig.reviewLinkDelIds.length!==1?"s":""} created · Re-create to update</div>}</div>)}
                                  </div>
                                </TRow>
                                <TRow label="Brightcove link needed?" value={!!ig.brightcoveNeeded} onChange={v=>updIG({brightcoveNeeded:v})}><TRow label="Password needed?" value={!!ig.brightcovePW} onChange={v=>updIG({brightcovePW:v})} indent/></TRow>
                              </>
                            )}
                            {!needsRichIngest&&(<div style={{display:"flex",gap:16,flexWrap:"wrap",paddingTop:6}}><Toggle label="Transcript Needed" value={!!ig.transcriptNeeded} onChange={v=>updIG({transcriptNeeded:v})}/><Toggle label="Review Link Needed" value={!!ig.reviewLinkNeeded} onChange={v=>updIG({reviewLinkNeeded:v})}/></div>)}
                            <div style={{marginTop:10}}><LW label="Notes for Media Manager"><Inp textarea value={ig.notes||""} onChange={e=>updIG({notes:e.target.value})} placeholder="Card types, drive labels…" style={{minHeight:36}}/></LW></div>
                            {needsRichIngest&&missingFields.length>0&&(<div style={{background:"#f59e0b10",border:"1px solid #f59e0b30",borderRadius:8,padding:"8px 12px",marginTop:8}}><div style={{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:3}}>⚠ Fill these to unlock Completed:</div>{missingFields.map(f=><div key={f.key} style={{fontSize:10,color:"#6b7280"}}>· {f.label}</div>)}</div>)}
                          </>
                        )}
                      </div>
                    );
                  })()}
                </SecPanel>

                {/* 10. Deliverables */}
                <SecPanel icon="📦" label="Deliverables"
                  open={sectOpen.deliverables} onOpen={()=>setSectOpen(p=>({...p,deliverables:true}))} onClose={()=>setSectOpen(p=>({...p,deliverables:false}))}
                  badge={(production.deliverables||[]).length||null}
                  summary={(production.deliverables||[]).length>0?\`\${production.deliverables.length} deliverable\${production.deliverables.length!==1?"s":""}\`:null}
                  summaryEmpty="No deliverables — auto-adds to Deliverables tab">
                  {/* Social Content: enriched deliverable form */}
                  {isSocial&&(
                    <SocialDeliverableForm
                      onAdd={d=>{onAddDeliverable(d);}}
                      deliverables={production.deliverables||[]}
                      onUpdateDeliverable={d=>upd("deliverables",(production.deliverables||[]).map(x=>x.id===d.id?d:x))}
                      onDeleteDeliverable={did=>{upd("deliverables",(production.deliverables||[]).filter(x=>x.id!==did));onDeleteDeliverable(did);}}
                    />
                  )}
                  {/* Standard deliverable add */}
                  {!isSocial&&(
                    <div style={{display:"flex",gap:6,marginBottom:8}}>
                      <Inp value={newDelTitle} onChange={e=>setNewDelTitle(e.target.value)} placeholder="Deliverable title…" onKeyDown={e=>e.key==="Enter"&&addDeliverable()}/>
                      <Btn small onClick={addDeliverable} disabled={!newDelTitle.trim()}>Add</Btn>
                    </div>
                  )}
                  {(production.deliverables||[]).length===0&&<div style={{fontSize:12,color:"#374151"}}>No deliverables yet.</div>}
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {(production.deliverables||[]).map(d=>{
                      const dc=DCOLOR[d.status]||"#6b7280";
                      const isRequired=isHybrid&&d.id===production.playbackDeliverableId;
                      return(
                        <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#0f172a",borderRadius:7,border:\`1px solid \${isRequired?"#f9731640":dc+"20"}\`}}>
                          {isRequired&&<span style={{fontSize:11}}>📼</span>}
                          <div style={{width:7,height:7,borderRadius:"50%",background:dc,flexShrink:0}}/>
                          <span style={{flex:1,fontSize:13,color:"#e2e8f0",fontWeight:600}}>{d.title}</span>
                          {isRequired&&<Chip label="Required for Event" color="#f97316" xs/>}
                          <Chip label={d.status} color={dc} xs/>
                          {d.deadline&&<span style={{fontSize:11,color:"#6b7280"}}>{fmtDate(d.deadline)}</span>}
                          <button onClick={()=>onDeleteDeliverable(d.id)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:15,lineHeight:1}}>×</button>
                        </div>
                      );
                    })}
                  </div>
                </SecPanel>

          </>


          {/* Completion gate on status change */}
          {(()=>{
            const needsRichIngest=["Live Event","Live Broadcast","Hybrid Event","Pre-tape"].includes(production.type);
            const ig=production.ingest||{};
            const REQUIRED=[
              {key:"datetime",        label:"Media ingest time"},
              {key:"recurringOrOnce", label:"Recurring or one-off"},
              {key:"sessionCount",    label:"Number of sessions"},
            ];
            const missing = needsRichIngest ? REQUIRED.filter(f=>!ig[f.key]) : [];
            if(!needsRichIngest||missing.length===0) return (
              <div style={{display:"flex",justifyContent:"flex-end"}}><Btn variant="danger" small onClick={onDelete}>Remove Production</Btn></div>
            );
            return (
              <div style={{background:"#1f2937",borderRadius:9,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:4}}>⚠ Completion blocked — fill in ingest fields to mark as Complete:</div>
                    {missing.map(f=><div key={f.key} style={{fontSize:11,color:"#6b7280"}}>· {f.label}</div>)}
                  </div>
                  <Btn variant="danger" small onClick={onDelete}>Remove</Btn>
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
};

// ─── Production Section ───────────────────────────────────────────────────────
// ─── Production Section — lifecycle-staged ────────────────────────────────────
const ProductionSection = ({productions=[], projectDeliverables=[], onUpdate, onAddToMainDels, onAddIngestDate, team, studioBookings, mediaCards, onUpdateStudioBookings, allProjects=[], projectId=null, projectAssignees={}}) => {
  const [showAdd, setShowAdd] = useState(false);
  const [newType, setNewType] = useState("Content Shoot");
  const [addFormOpen, setAddFormOpen] = useState(false);
  const [presets, setPresets] = useState([]);
  const [showLoadPreset, setShowLoadPreset] = useState(false);
  const [loadPresetForId, setLoadPresetForId] = useState(null); // production id to apply to, null = new

  // Load presets from storage on mount
  useEffect(()=>{
    window.storage.get(PRESET_STORAGE_KEY).then(r=>{
      if(r?.value) try { setPresets(JSON.parse(r.value)); } catch(e){}
    }).catch(()=>{});
  },[]);

  const persistPresets = ps => {
    setPresets(ps);
    window.storage.set(PRESET_STORAGE_KEY, JSON.stringify(ps)).catch(()=>{});
  };

  const savePreset = (production, name, sections) => {
    const preset = productionToPreset(production, name, sections);
    persistPresets([...presets, preset]);
  };

  const deletePreset = id => persistPresets(presets.filter(p=>p.id!==id));

  const applyPresetTo = (preset, sections, targetId, targetDate, targetStartTime, targetLocation) => {
    const sourceProd = targetId ? productions.find(p=>p.id===targetId) : null;
    const baseProd   = sourceProd || {
      crewInternal:[], crewExternal:[], secondaryLocations:[], schedule:[],
      equipmentIds:[], externalGear:[], deliverables:[], ingest:{},
    };
    const applied = applyPreset(baseProd, preset, sections, targetDate, targetStartTime, targetLocation);

    if(targetId) {
      updP(targetId, applied);
    } else {
      addProduction(preset, sections, targetDate, targetStartTime, targetLocation);
      // addProduction handles the production update; we still need to sync project-level items below
    }

    // ── Sync deliverables to project-level tab ──
    if(sections.includes("deliverables") && preset.sections.deliverables?.length && onAddToMainDels) {
      const prodTitle = targetId
        ? (productions.find(p=>p.id===targetId)?.title || "Production")
        : "New Production";
      applied.deliverables?.forEach(d=>{
        onAddToMainDels({
          ...d,
          _productionId:   targetId || null,
          _productionTitle: prodTitle,
          _fromPreset:     true,
          status:          "Not Started",
        });
      });
    }

    // ── Sync ingest to project ingestDates ──
    if(sections.includes("ingest") && preset.sections.ingest && onAddIngestDate) {
      const pi = preset.sections.ingest;
      // Determine the best datetime: use targetDate+targetStartTime if available,
      // otherwise applied.startTime (works for existing productions)
      const ingestDatetime = applied.startTime ||
        (targetDate && targetStartTime ? \`\${targetDate}T\${targetStartTime}\` : "") ||
        (targetDate ? \`\${targetDate}T00:00\` : "");
      onAddIngestDate({
        id:            uid(),
        datetime:      ingestDatetime,
        notes:         pi.notes ? \`[From preset] \${pi.notes}\` : "[From preset]",
        callSheet:     null,
        _fromPreset:   true,
        _productionId: targetId || null,
        // Carry over ingest settings so the Media Manager can see them
        transcriptNeeded: pi.transcriptNeeded||false,
        reviewLinkNeeded: pi.reviewLinkNeeded||false,
        recurringOrOnce:  pi.recurringOrOnce||"",
        sessionCount:     pi.sessionCount||"",
        reviewLinkType:   pi.reviewLinkType||"",
        reviewLinkCount:  pi.reviewLinkCount||"",
        reviewWatermark:  pi.reviewWatermark||false,
        brightcoveNeeded: pi.brightcoveNeeded||false,
        brightcovePW:     pi.brightcovePW||false,
      });
    }

    setShowLoadPreset(false);
    setLoadPresetForId(null);
  };

  // Duplicate a production (clone with new id, strip dates/status)
  const duplicateProduction = (prod) => {
    const dup = {
      ...prod,
      id: uid(),
      title: prod.title ? prod.title + " (Copy)" : "",
      status: "Planning",
      startTime: "", endTime: "", crewCallTime: "",
      secondaryLocations: (prod.secondaryLocations||[]).map(l=>({...l, id:uid(), startTime:"", endTime:""})),
      crewInternal: (prod.crewInternal||[]).map(c=>({...c, id:uid(), callTime:""})),
      crewExternal: (prod.crewExternal||[]).map(c=>({...c, id:uid(), callTime:""})),
      schedule: (prod.schedule||[]).map(r=>({...r, id:uid(), time:""})),
      deliverables: [],
      ingest: {datetime:"",notes:"",transcriptNeeded:false,reviewLinkNeeded:false,
               recurringOrOnce:"",sessionCount:"",reviewLinkType:"",reviewLinkCount:"",
               reviewWatermark:false,brightcoveNeeded:false,brightcovePW:false,reviewLinkDelIds:[]},
    };
    onUpdate([...productions, dup]);
  };

  const addProduction = (fromPreset=null, presetSections=[], targetDate=null, targetStartTime=null, targetLocation=null) => {
    // Build default crew — Producer from project assignees
    const defaultCrew = [];
    const producerIds = projectAssignees?.Producer||[];
    if(producerIds.length>0) {
      producerIds.forEach(mid=>{
        defaultCrew.push({id:uid(), role:"Producer", memberId:mid, callTime:""});
      });
    }
    // PCR type gets Camera Op x2, Sound Mixer, TD pre-populated (external, blank names)
    const defaultExternal = [];
    if(newType==="Live Broadcast"||newType==="Live Playback") {
      defaultExternal.push(
        {id:uid(), role:"Camera Op",         name:"", company:"", callTime:""},
        {id:uid(), role:"Camera Op",         name:"", company:"", callTime:""},
        {id:uid(), role:"Sound Mixer",       name:"", company:"", callTime:""},
        {id:uid(), role:"Technical Director",name:"", company:"", callTime:""},
      );
    }
    let np = {
      id:uid(), type:newType, title:"", status:"Planning",
      startTime:"", endTime:"", location:"", crewCallTime:"",
      notes:"", feedsIntoId:null, playbackDeliverableId:null,
      playbackAssets:[], assetRequests:[],
      equipmentIds:[], externalGear:[], mediaCardIds:[],
      crewInternal:defaultCrew, crewExternal:defaultExternal,
      schedule:[],
      ingest:{datetime:"",notes:"",transcriptNeeded:false,reviewLinkNeeded:false,
              recurringOrOnce:"",sessionCount:"",reviewLinkType:"",reviewLinkCount:"",
              reviewWatermark:false,brightcoveNeeded:false,brightcovePW:false,
              reviewLinkDelIds:[]},
      deliverables:[],
    };
    if(fromPreset && presetSections.length>0) {
      np = applyPreset(np, fromPreset, presetSections, targetDate, targetStartTime, targetLocation);
    }
    onUpdate([...productions, np]);
    setShowAdd(false);
    setAddFormOpen(false);
  };

  const updP = (id, data) => onUpdate(productions.map(p=>p.id!==id?p:data));
  const delP = id => onUpdate(productions.filter(p=>p.id!==id));

  const addDel = (pid, d) => {
    onUpdate(productions.map(p=>p.id!==pid?p:{...p,deliverables:[...(p.deliverables||[]),d]}));
    if(onAddToMainDels) onAddToMainDels({...d,_productionId:pid,_productionTitle:productions.find(p=>p.id===pid)?.title||"Production"});
  };
  const delDel = (pid, did) => onUpdate(productions.map(p=>p.id!==pid?p:{...p,deliverables:(p.deliverables||[]).filter(d=>d.id!==did)}));

  const allProdDels = productions.flatMap(p=>p.deliverables||[]);
  const allDelsForPicker = [...projectDeliverables,...allProdDels];

  // Compute effective stage (auto-detect Happening Now / Production Wrapped)
  const effectiveStage = p => autoDetectStage(p);

  // Stage sections in order
  const STAGE_ORDER = ["Planning","Tentative","Approved","Happening Now","Production Wrapped","Completed"];
  const byStage = STAGE_ORDER.reduce((a,s)=>({...a,[s]:[]}),{});
  productions.forEach(p=>{
    const stage = effectiveStage(p);
    if(byStage[stage]) byStage[stage].push(p);
    else byStage["Planning"].push(p);
  });

  const pendingCount = byStage["Tentative"]?.length || 0;

  const StageBadge = ({stage}) => {
    const c = PROD_STAGE_COLOR[stage]||"#6b7280";
    const icons = {"Planning":"📝","Tentative":"⏳","Approved":"✅","Happening Now":"🔴","Production Wrapped":"🎬","Completed":"✓"};
    return (
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
        <div style={{width:3,height:18,borderRadius:99,background:c,flexShrink:0}}/>
        <span style={{fontSize:11}}>{icons[stage]||"·"}</span>
        <div style={{fontWeight:900,fontSize:14,color:c,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>{stage}</div>
        <div style={{background:c+"22",color:c,borderRadius:99,padding:"1px 9px",fontSize:12,fontWeight:800}}>{byStage[stage]?.length||0}</div>
        {stage==="Tentative"&&pendingCount>0&&<div style={{fontSize:10,color:"#f59e0b",fontStyle:"italic"}}>Awaiting Torey's approval</div>}
        {stage==="Happening Now"&&<div style={{background:"#ef444430",color:"#ef4444",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase",animation:"pulse 2s infinite"}}>● LIVE</div>}
      </div>
    );
  };

  return (
    <div>
      {/* ── Add new production — at TOP ── */}
      <div style={{marginBottom:20,background:"#111827",border:"1px solid #374151",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px"}}>
          <div style={{fontWeight:900,fontSize:14,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>
            Productions <span style={{color:"#4b5563",fontWeight:400,fontSize:12,textTransform:"none"}}>({productions.length})</span>
            {pendingCount>0&&<Chip label={\`\${pendingCount} pending approval\`} color="#f59e0b" xs/>}
          </div>
          <div style={{display:"flex",gap:6}}>
            {presets.length>0&&<button onClick={()=>{setLoadPresetForId(null);setShowLoadPreset(true);}}
              style={{background:"#6366f115",border:"1px solid #6366f130",borderRadius:6,color:"#818cf8",padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>
              Load Preset
            </button>}
            <Btn onClick={()=>setShowAdd(o=>!o)} small>{showAdd?"Cancel":"+ Add Production"}</Btn>
          </div>
        </div>

        {showAdd&&(
          <div style={{borderTop:"1px solid #374151",padding:"14px 16px",background:"#0f172a"}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:10}}>Select Production Type:</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
              {PRODUCTION_TYPES.map(t=>(
                <button key={t} onClick={()=>setNewType(t)}
                  style={{background:newType===t?(PRODUCTION_COLOR[t]||"#6366f1")+"30":"#1f2937",
                    border:\`1px solid \${newType===t?(PRODUCTION_COLOR[t]||"#6366f1"):"#374151"}\`,
                    borderRadius:6,color:newType===t?(PRODUCTION_COLOR[t]||"#6366f1"):"#9ca3af",
                    padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",
                    fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>
                  {t}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn onClick={addProduction}>+ Add {newType}</Btn>
              <div style={{fontSize:11,color:"#4b5563"}}>New productions start in Planning — not visible to approvers until you send for approval.</div>
            </div>
          </div>
        )}
      </div>

      {/* ── Preset modals ── */}
      {showLoadPreset&&(
        <LoadPresetModal
          presets={presets}
          allProjects={allProjects}
          onApply={(preset,sections,targetDate,targetStartTime,targetLocation)=>applyPresetTo(preset,sections,loadPresetForId,targetDate,targetStartTime,targetLocation)}
          onDelete={deletePreset}
          onClose={()=>{setShowLoadPreset(false);setLoadPresetForId(null);}}
        />
      )}

      {/* ── Stage sections ── */}
      {productions.length===0&&!showAdd&&(
        <div style={{textAlign:"center",padding:"32px",color:"#374151",fontSize:13,border:"1px dashed #1f2937",borderRadius:10}}>
          No productions yet. Click "+ Add Production" to get started.
        </div>
      )}

      {STAGE_ORDER.map(stage=>{
        const stageProds = byStage[stage]||[];
        if(stageProds.length===0) return null;
        return (
          <div key={stage} style={{marginBottom:24}}>
            <StageBadge stage={stage}/>
            <div style={{marginLeft:12,borderLeft:\`2px solid \${(PROD_STAGE_COLOR[stage]||"#6b7280")}30\`,paddingLeft:12}}>
              {stageProds.map((p,i)=>(
                <ProductionCard key={p.id} production={p} idx={i}
                  projectId={projectId}
                  allProductions={productions}
                  allProjectDels={allDelsForPicker}
                  team={team} studioBookings={studioBookings} mediaCards={mediaCards}
                  allProjects={allProjects}
                  presets={presets}
                  onUpdate={data=>updP(p.id,data)}
                  onDelete={()=>delP(p.id)}
                  onDuplicate={()=>duplicateProduction(p)}
                  onSavePreset={(name,sections)=>savePreset(p,name,sections)}
                  onLoadPreset={()=>{setLoadPresetForId(p.id);setShowLoadPreset(true);}}
                  onAddDeliverable={d=>addDel(p.id,d)}
                  onDeleteDeliverable={did=>delDel(p.id,did)}
                  onSendForApproval={()=>updP(p.id,{...p,status:"Tentative",rejectionNote:null})}
                  onUnapprove={()=>updP(p.id,{...p,status:"Planning"})}
                />
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};

const BroadcastDashboard = ({member, projects, team, studioBookings, onOpenProject, onUpdateProject, onUpdateStudioBookings, showToast}) => {
  const firstName = member.name.split(" ")[0];
  const isApprover = member.roles.includes("Studio Approver");
  const now = new Date();
  const [locFilter, setLocFilter] = useState("All");
  const [drawerBooking, setDrawerBooking] = useState(null);
  const [drawerVis, setDrawerVis] = useState(false);
  // Persistent approval history — survives the session
  const [approvalHistory, setApprovalHistory] = useState([]);

  const openDrawer = b => { setDrawerBooking(b); requestAnimationFrame(()=>setDrawerVis(true)); };
  const closeDrawer = () => { setDrawerVis(false); setTimeout(()=>setDrawerBooking(null),220); };

  // Approve / Deny a booking — records to history so it's never lost
  const handleApproval = (bookingId, approved, denyReason="") => {
    const booking = (studioBookings||[]).find(b=>b.id===bookingId);
    const newStatus = approved ? "Confirmed" : "Tentative"; // denial returns to Tentative not Cancelled
    onUpdateStudioBookings(prev=>prev.map(b=>b.id!==bookingId?b:{...b,bookingStatus:newStatus,rejectionNote:approved?null:(denyReason||"Denied by Broadcast Manager")}));
    if(booking) {
      setApprovalHistory(h=>[{
        id:uid(), bookingId, title:booking.title,
        location:booking.location, startTime:booking.startTime,
        decision:approved?"Approved":"Denied",
        decidedAt:new Date().toISOString(),
        decidedBy:member.name,
        productionType:booking.productionType,
      },...h]);
    }
    showToast(approved
      ? {msg:\`✓ Booking approved — Studio confirmed.\`, color:"#10b981"}
      : {msg:\`✗ Booking denied — Returned to Planning.\`, color:"#ef4444"}
    );
    closeDrawer();
  };

  // Unapprove (revert Confirmed → Tentative) for corrections
  const handleUnapprove = (bookingId) => {
    const booking = (studioBookings||[]).find(b=>b.id===bookingId);
    onUpdateStudioBookings(prev=>prev.map(b=>b.id!==bookingId?b:{...b,bookingStatus:"Tentative"}));
    if(booking) {
      setApprovalHistory(h=>[{
        id:uid(), bookingId, title:booking.title,
        location:booking.location, startTime:booking.startTime,
        decision:"Unapproved",
        decidedAt:new Date().toISOString(),
        decidedBy:member.name,
        productionType:booking.productionType,
      },...h]);
    }
    showToast({msg:\`↩ Booking returned to Tentative for review.\`, color:"#f59e0b"});
    closeDrawer();

  // Bookings this member is on
  const myBookings = useMemo(()=>
    (studioBookings||[]).filter(b=>
      (b.crewInternal||[]).some(c=>c.memberId===member.id)||
      (b.confirmations||[]).some(c=>c.crewId===member.id)||
      (b.crewExternal||[]).some(c=>c.name===member.name)||

  ,[studioBookings,member,isApprover]);

  const upcoming = [...myBookings].filter(b=>b.startTime&&new Date(b.startTime)>=now&&b.bookingStatus!=="Cancelled").sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const completed = [...myBookings].filter(b=>b.startTime&&new Date(b.startTime)<now).sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  const pendingApprovals = isApprover ? (studioBookings||[]).filter(b=>b.bookingStatus==="Tentative") : [];
  const mentionCount = projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)).length;

  // Week calendar — filtered by location

const StudioCalendar = ({allBookings}) => {
  const now=new Date(); const [dateOffset,setDateOffset]=useState(0);
  const viewDate=new Date(now); viewDate.setDate(now.getDate()+dateOffset);
  const viewDateStr=viewDate.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  const isToday=dateOffset===0;
  const HS=7,HE=22,TH=HE-HS;
  const nowH=now.getHours()+now.getMinutes()/60;
  const nowP=Math.max(0,Math.min(100,(nowH-HS)/TH*100));
  const dayBks=allBookings.filter(b=>{if(!b.startTime)return false;const bd=new Date(b.startTime);return bd.getFullYear()===viewDate.getFullYear()&&bd.getMonth()===viewDate.getMonth()&&bd.getDate()===viewDate.getDate();});
  const fH=h=>{const ap=h<12?"am":"pm",h12=h===0?12:h>12?h-12:h;return \`\${h12}\${ap}\`;};
  const sB={background:"#1f2937",border:"none",borderRadius:7,color:"#e2e8f0",width:30,height:30,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"};
  return (
    <div style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:"1px solid #1f2937",background:"#111827"}}>
        <button onClick={()=>setDateOffset(o=>o-1)} style={sB}>‹</button>
        <button onClick={()=>setDateOffset(0)} style={{...sB,width:"auto",padding:"0 10px",fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",color:"#9ca3af"}}>Today</button>
        <button onClick={()=>setDateOffset(o=>o+1)} style={sB}>›</button>
        <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",flex:1}}>{viewDateStr}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {Object.entries(PRODTYPE_COLOR).slice(0,4).map(([t,c])=><div key={t} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{fontSize:10,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif"}}>{t.replace(" Filming","")}</span></div>)}
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:"#8b5cf6"}}/><span style={{fontSize:10,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif"}}>HMU</span></div>
        </div>
      </div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"70vh"}}>
        <div style={{minWidth:700}}>
          <div style={{display:"grid",gridTemplateColumns:\`52px repeat(\${ALL_STUDIO_LOCATIONS.length},1fr)\`,borderBottom:"1px solid #1f2937",background:"#111827",position:"sticky",top:0,zIndex:5}}>
            <div style={{borderRight:"1px solid #1f2937"}}/>
            {ALL_STUDIO_LOCATIONS.map(loc=>{const lbks=dayBks.filter(b=>b.location===loc);const hC=lbks.some(b=>b.bookingStatus==="Confirmed");const hT=lbks.some(b=>b.bookingStatus==="Tentative");const isH=LOCATION_META[loc]?.isHMU;return(<div key={loc} style={{padding:"7px 8px",textAlign:"center",borderRight:"1px solid #1f2937",background:isH?"#8b5cf608":"transparent"}}><div style={{fontSize:11,fontWeight:800,color:isH?"#a78bfa":"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{loc}</div><div style={{fontSize:9,color:hC?"#10b981":hT?"#f59e0b":"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginTop:1}}>{hC?"● Booked":hT?"◌ Tentative":"○ Free"}</div></div>);})}
          </div>
          <div style={{position:"relative",height:\`\${TH*60}px\`}}>

                  {u.action==="addDeliverable"&&\`Add deliverable "\${u.deliverable?.title||""}" to "\${u.projectName||"project"}"\`}
                  {u.action==="updateProject"&&\`Update \${u.field} on "\${u.projectName||"project"}"\`}
                  {u.action==="updateProduction"&&\`Update production in "\${u.projectName||"project"}"\`}
                  {u.action==="openProject"&&\`Open project\`}

    </div>
  );
};

const StudioAgent = ({projects, team, onApplyUpdate, onOpenProject}) => {
  const [open,      setOpen]      = useState(false);
  const [msgs,      setMsgs]      = useState([{
    role:"assistant", msgId:"init",
    content:"Hey! I'm your PostTrack Agent. I can answer questions about any project, help fill out production details, check schedules, or create deliverables. What do you need?"
  }]);
  const [input,     setInput]     = useState("");
  const [loading,   setLoading]   = useState(false);
  const [pendingId, setPendingId] = useState(null); // msgId of pending update
  const bottomRef = useRef();
  const inputRef  = useRef();

  useEffect(()=>{ if(open) setTimeout(()=>inputRef.current?.focus(),100); },[open]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  // Parse all update blocks from a response into one flat array of actions
  const parseUpdates = (text, projectsRef) => {
    const m = text.match(/\`\`\`update\\s*([\\s\\S]*?)\`\`\`/);
    if(!m) return null;
    try {
      const parsed = JSON.parse(m[1].trim());
      const actions = parsed.updates || (parsed.action ? [parsed] : []);
      // Enrich with projectName for display
      return actions.map(u=>({
        ...u,
        projectName: u.projectId ? (projectsRef.find(p=>p.id===u.projectId)?.name||"#"+u.projectId) : "",
      }));
    } catch(e) { return null; }
  };

  const send = async () => {
    const txt = input.trim();
    if(!txt || loading) return;
    setInput("");
    const userMsg = {role:"user", content:txt, msgId:uid()};
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1500,
          system: AGENT_SYSTEM_PROMPT(projects, team),
          messages: newMsgs.map(m=>({role:m.role, content:m.content})),
        })
      });
      const data = await res.json();
      const reply = data.content?.map(c=>c.text||"").join("") || "Sorry, I couldn't get a response.";
      const updates = parseUpdates(reply, projects);
      const msgId = uid();
      const displayReply = reply.replace(/\`\`\`update[\\s\\S]*?\`\`\`/g,"").trim();
      setMsgs(prev=>[...prev,{role:"assistant", content:displayReply, updates, msgId, applied:false}]);
      if(updates && updates.length>0) setPendingId(msgId);
    } catch(e) {
      setMsgs(prev=>[...prev,{role:"assistant", content:"Something went wrong — please try again.", msgId:uid()}]);
    }
    setLoading(false);
  };

  const applyUpdates = (msgId) => {
    const msg = msgs.find(m=>m.msgId===msgId);
    if(!msg?.updates) return;
    msg.updates.forEach(u=>onApplyUpdate(u));
    setMsgs(prev=>prev.map(m=>m.msgId===msgId?{...m,applied:true}:m));
    const names = msg.updates.map(u=>
      u.action==="addProduction"?\`\${u.production?.type||"production"} added\`:
      u.action==="addDeliverable"?\`"\${u.deliverable?.title||"deliverable"}" added\`:
      u.action==="updateProject"?\`\${u.field} updated\`:\`change applied\`
    ).join(", ");
    setMsgs(prev=>[...prev,{role:"assistant",content:\`✓ Done — \${names}.\`,msgId:uid()}]);
    setPendingId(null);
  };

  const dismissUpdates = (msgId) => {
    setMsgs(prev=>prev.map(m=>m.msgId===msgId?{...m,applied:false}:m));
    setMsgs(prev=>[...prev,{role:"assistant",content:"No problem, I won't make those changes.",msgId:uid()}]);
    setPendingId(null);
  };

  return (
    <>
      {/* FAB */}
      <button onClick={()=>setOpen(o=>!o)}
        style={{position:"fixed",bottom:28,right:28,zIndex:900,width:52,height:52,borderRadius:"50%",
          background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",cursor:"pointer",
          boxShadow:"0 4px 20px #6366f160",display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:open?20:22,transition:"transform 0.2s,font-size 0.1s",transform:open?"rotate(0deg)":"none"}}>
        {open?"×":"✦"}
      </button>

      {/* Panel */}
      {open&&(
        <div style={{position:"fixed",right:0,top:0,bottom:0,zIndex:800,width:390,
          background:"#0d1117",borderLeft:"1px solid #1f2937",
          display:"flex",flexDirection:"column",boxShadow:"-8px 0 40px #000a"}}>

          {/* Header */}
          <div style={{padding:"16px 18px",borderBottom:"1px solid #1f2937",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>✦</div>
            <div>
              <div style={{fontWeight:800,fontSize:14,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>PostTrack Agent</div>
              <div style={{fontSize:10,color:"#4b5563"}}>AI assistant · knows all projects & workflow</div>
            </div>
            <button onClick={()=>{ setMsgs([{role:"assistant",content:"Conversation cleared. How can I help?",msgId:uid()}]); setPendingId(null); }}
              style={{marginLeft:"auto",background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}
              title="Clear chat">CLR</button>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px"}}>
            {msgs.map((m,i)=>(
              <AgentMsgBubble key={m.msgId||i} m={m} pendingId={pendingId}
                onApply={applyUpdates} onDismiss={dismissUpdates}/>
            ))}
            {loading&&(
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 0",marginBottom:8}}>
                {[0,0.2,0.4].map((d,i)=>(
                  <div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#6366f1",
                    animation:\`pulse 1.2s \${d}s infinite\`}}/>
                ))}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Quick prompts */}
          <div style={{padding:"0 14px 8px",display:"flex",gap:5,flexWrap:"wrap",flexShrink:0}}>
            {["What's due this week?","Who's on crew tomorrow?","Summarize In Production projects","What locations are booked Friday?"].map(p=>(
              <button key={p} onClick={()=>{ setInput(p); }}
                style={{background:"#111827",border:"1px solid #1f2937",borderRadius:20,color:"#6b7280",padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>
                {p}
              </button>
            ))}
          </div>

          {/* Input */}
          <div style={{padding:"10px 14px 16px",borderTop:"1px solid #1f2937",display:"flex",gap:8,flexShrink:0}}>
            <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); }}}
              placeholder="Ask anything about your projects…"
              rows={2}
              style={{flex:1,background:"#111827",border:"1px solid #374151",borderRadius:8,color:"#e2e8f0",
                padding:"8px 12px",fontSize:13,outline:"none",resize:"none",fontFamily:"'DM Sans',sans-serif",lineHeight:1.4}}/>
            <button onClick={send} disabled={!input.trim()||loading}
              style={{background:"#6366f1",border:"none",borderRadius:8,color:"#fff",padding:"8px 14px",
                fontSize:18,fontWeight:800,cursor:input.trim()&&!loading?"pointer":"not-allowed",
                opacity:input.trim()&&!loading?1:0.4,flexShrink:0}}>
              ↑
            </button>
          </div>
        </div>
      )}
    </>
  );
};

const DEPT_OPTIONS = ["Production","Post Production","Creative","Broadcast","Management"];

const AdminTeamTab = ({team, onUpdateTeam}) => {
  const [editId, setEditId]     = useState(null);
  const [search, setSearch]     = useState("");
  const [draft, setDraft]       = useState(null);
  const [showAdd, setShowAdd]   = useState(false);
  const [importMsg, setImportMsg] = useState(null); // {type:"success"|"error", text}
  const fileInputRef = useRef();
  const [newMember, setNewMember] = useState({name:"",roles:[],department:"Production",employeeType:"Internal",available:true,email:"",phone:"",skills:[]});

  const filtered = team.filter(m=>
    !search || m.name.toLowerCase().includes(search.toLowerCase()) ||
    m.roles.some(r=>r.toLowerCase().includes(search.toLowerCase())) ||
    m.department?.toLowerCase().includes(search.toLowerCase())
  );

  const startEdit = m => { setEditId(m.id); setDraft({...m}); };
  const saveEdit  = () => { onUpdateTeam(team.map(m=>m.id===editId?{...m,...draft}:m)); setEditId(null); setDraft(null); };
  const deleteM   = id => { if(window.confirm("Remove this team member?")) onUpdateTeam(team.filter(m=>m.id!==id)); };
  const addMember = () => {
    if(!newMember.name.trim()) return;
    onUpdateTeam([...team, {...newMember, id:Math.max(...team.map(m=>m.id))+1}]);
    setNewMember({name:"",roles:[],department:"Production",employeeType:"Internal",available:true,email:"",phone:"",skills:[]});
    setShowAdd(false);
  };

  // Anonymise all names
  const clearNames = () => {
    if(!window.confirm("Replace all names with 'Team Member 1, 2, 3…'? You can restore them later by importing the original CSV.")) return;
    onUpdateTeam(team.map((m,i)=>({...m, name:\`Team Member \${i+1}\`, email:"", phone:""})));
  };

  // Parse CSV text → array of row objects
  const parseCSV = text => {
    const lines = text.trim().split(/\\r?\\n/);
    if(lines.length < 2) return null;
    // Un-quote a CSV field
    const unq = s => {
      s = s.trim();
      if(s.startsWith('"') && s.endsWith('"')) s = s.slice(1,-1).replace(/""/g,'"');
      return s;
    };
    // Naive CSV splitter (handles quoted commas)
    const splitRow = line => {
      const cols = []; let cur = "", inQ = false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
        else if(c===','&&!inQ){cols.push(unq(cur));cur="";}
        else cur+=c;
      }
      cols.push(unq(cur));
      return cols;
    };
    const headers = splitRow(lines[0]).map(h=>h.toLowerCase().trim());
    return lines.slice(1).filter(l=>l.trim()).map(l=>{
      const cols = splitRow(l);
      const row = {};
      headers.forEach((h,i)=>{ row[h]=cols[i]||""; });
      return row;
    });
  };

  const handleImport = e => {
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = parseCSV(ev.target.result);
      if(!rows||rows.length===0){
        setImportMsg({type:"error",text:"Couldn't parse file — make sure it's the PostTrack team CSV."});
        return;
      }
      // Map CSV rows → team member objects
      // Match on ID if present, otherwise match by name, otherwise add as new
      const imported = rows.map(r=>{
        const id = r["id"] ? parseInt(r["id"]) : null;
        const existing = id ? team.find(m=>m.id===id) : team.find(m=>m.name.toLowerCase()===r["name"]?.toLowerCase());
        return {
          ...(existing||{}),
          id:           existing?.id || (Math.max(0,...team.map(m=>m.id))+1),
          name:         r["name"]||existing?.name||"",
          department:   r["department"]||existing?.department||"Production",
          employeeType: r["employee type"]||existing?.employeeType||"Internal",
          available:    r["available"]?.toLowerCase()==="yes",
          roles:        r["roles"] ? r["roles"].split(/[;|]/).map(s=>s.trim()).filter(Boolean) : (existing?.roles||[]),
          email:        r["email"]||existing?.email||"",
          phone:        r["phone"]||existing?.phone||"",
          skills:       r["skills"] ? r["skills"].split(/[;|]/).map(s=>s.trim()).filter(Boolean) : (existing?.skills||[]),
        };
      });
      onUpdateTeam(imported);
      setImportMsg({type:"success",text:\`✓ Imported \${imported.length} team member\${imported.length!==1?"s":""}.\`});
      setTimeout(()=>setImportMsg(null),4000);
    };
    reader.readAsText(file);
    e.target.value=""; // reset so same file can be re-imported
  };

  const RoleToggle = ({roles, onChange}) => (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
      {ROLE_OPTIONS.map(r=>(
        <button key={r} onClick={()=>onChange(roles.includes(r)?roles.filter(x=>x!==r):[...roles,r])}
          style={{background:roles.includes(r)?"#6366f120":"#0a0f1a",border:\`1px solid \${roles.includes(r)?"#6366f1":"#1f2937"}\`,borderRadius:4,color:roles.includes(r)?"#818cf8":"#4b5563",fontSize:10,padding:"2px 7px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif"}}>
          {r}
        </button>
      ))}
    </div>
  );

  return (
    <div>
      {/* Hidden file input for CSV import */}
      <input ref={fileInputRef} type="file" accept=".csv,text/csv" onChange={handleImport} style={{display:"none"}}/>

      {/* Toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search team…"
          style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"7px 12px",fontSize:13,outline:"none",flex:1,minWidth:160,fontFamily:"'DM Sans',sans-serif"}}/>
        {/* Import CSV */}
        <button onClick={()=>fileInputRef.current?.click()}
          style={{background:"#22c55e15",border:"1px solid #22c55e40",borderRadius:7,color:"#22c55e",padding:"7px 14px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",flexShrink:0}}>
          ↑ Import CSV
        </button>
        {/* Clear names */}
        <button onClick={clearNames}
          style={{background:"#f59e0b15",border:"1px solid #f59e0b40",borderRadius:7,color:"#f59e0b",padding:"7px 14px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",flexShrink:0}}>
          Anonymise
        </button>
        <button onClick={()=>setShowAdd(s=>!s)}
          style={{background:"#6366f1",border:"none",borderRadius:7,color:"#fff",padding:"7px 14px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",flexShrink:0}}>
          {showAdd?"Cancel":"+ Add"}
        </button>
      </div>

      {/* Import feedback */}
      {importMsg&&(
        <div style={{background:importMsg.type==="success"?"#22c55e18":"#ef444418",border:\`1px solid \${importMsg.type==="success"?"#22c55e40":"#ef444440"}\`,borderRadius:8,padding:"9px 14px",marginBottom:12,fontSize:12,color:importMsg.type==="success"?"#22c55e":"#ef4444",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          {importMsg.text}
          <button onClick={()=>setImportMsg(null)} style={{background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>

            Add Member

      )}

      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {filtered.map(m=>(

const AdminSpacesTab = ({spaces, spaceMeta, onUpdateSpaces, onUpdateSpaceMeta}) => {
  const [editId,  setEditId]  = useState(null);
  const [draft,   setDraft]   = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newSpace, setNewSpace] = useState({name:"",isHMU:false,isGreenRoom:false,isPCR:false,suggestHMU:false,linkedGreenRoom:""});

  const save = () => {
    const newName = draft.name;
    const oldName = spaces[editId];
    // Update name in array
    const newSpaces = spaces.map((s,i)=>i===editId?newName:s);
    // Update meta
    const newMeta = {...spaceMeta};
    if(oldName!==newName) { newMeta[newName]=newMeta[oldName]||{}; delete newMeta[oldName]; }
    newMeta[newName] = {...(newMeta[newName]||{}), isHMU:draft.isHMU, isGreenRoom:draft.isGreenRoom, isPCR:draft.isPCR, suggestHMU:draft.suggestHMU, linkedGreenRoom:draft.linkedGreenRoom||undefined};
    onUpdateSpaces(newSpaces);
    onUpdateSpaceMeta(newMeta);
    setEditId(null);
  };
  const del = idx => {
    if(window.confirm(\`Remove "\${spaces[idx]}"?\`)) {
      const name = spaces[idx];
      onUpdateSpaces(spaces.filter((_,i)=>i!==idx));
      const newMeta = {...spaceMeta}; delete newMeta[name]; onUpdateSpaceMeta(newMeta);
    }
  };
  const add = () => {
    if(!newSpace.name.trim()||spaces.includes(newSpace.name.trim())) return;
    const name = newSpace.name.trim();
    onUpdateSpaces([...spaces, name]);
    const meta = {...spaceMeta, [name]:{isHMU:newSpace.isHMU,isGreenRoom:newSpace.isGreenRoom,isPCR:newSpace.isPCR,suggestHMU:newSpace.suggestHMU,linkedGreenRoom:newSpace.linkedGreenRoom||undefined}};
    onUpdateSpaceMeta(meta);
    setNewSpace({name:"",isHMU:false,isGreenRoom:false,isPCR:false,suggestHMU:false,linkedGreenRoom:""});
    setShowAdd(false);
  };

  const MetaToggles = ({vals, onChange}) => {
    const flags = [["isHMU","HMU Station","#ec4899"],["isGreenRoom","Green Room","#22c55e"],["isPCR","PCR","#f97316"],["suggestHMU","Suggest HMU","#8b5cf6"]];
    return (
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {flags.map(([k,l,c])=>(
          <button key={k} onClick={()=>onChange({...vals,[k]:!vals[k]})}
            style={{background:vals[k]?c+"20":"#0a0f1a",border:\`1px solid \${vals[k]?c:"#374151"}\`,borderRadius:5,color:vals[k]?c:"#4b5563",fontSize:10,padding:"3px 9px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
            {l}
          </button>
        ))}
      </div>
    );
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <button onClick={()=>setShowAdd(s=>!s)}
          style={{background:"#6366f1",border:"none",borderRadius:7,color:"#fff",padding:"7px 16px",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>
          {showAdd?"Cancel":"+ Add Space"}
        </button>
      </div>

      {showAdd&&(
        <div style={{background:"#0d1117",border:"1px solid #6366f140",borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:800,color:"#818cf8",marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.08em"}}>New Space</div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:3,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>Space Name</div>
            <input value={newSpace.name} onChange={e=>setNewSpace(p=>({...p,name:e.target.value}))} placeholder="e.g. Studio C, Rooftop Deck…"
              style={{width:"100%",background:"#0a0f1a",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",padding:"6px 10px",fontSize:12,outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#4b5563",marginBottom:5,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>Type Flags</div>
            <MetaToggles vals={newSpace} onChange={v=>setNewSpace(p=>({...p,...v}))}/>
          </div>
          {newSpace.suggestHMU&&(
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"#4b5563",marginBottom:3,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>Linked Green Room</div>
              <select value={newSpace.linkedGreenRoom} onChange={e=>setNewSpace(p=>({...p,linkedGreenRoom:e.target.value}))}
                style={{background:"#0a0f1a",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",padding:"6px 8px",fontSize:12,outline:"none"}}>
                <option value="">None</option>

                      <select value={draft.linkedGreenRoom||""} onChange={e=>setDraft(p=>({...p,linkedGreenRoom:e.target.value}))}

                        <option value="">None</option>

                      </select>
                    </div>

                  <div style={{display:"flex",gap:6}}>

// ── CSV download utility ──
const downloadCSV = (filename, rows) => {
  const escape = v => {
    const s = v==null?"":String(v);
    return s.includes(",")||s.includes('"')||s.includes("\\n") ? \`"\${s.replace(/"/g,'""')}"\` : s;
  };
  const csv = rows.map(r=>r.map(escape).join(",")).join("\\n");
  // Try programmatic download first; fall back to opening in new tab
  try {
    const uri = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    const a = document.createElement("a");
    a.href = uri; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch(e) {
    window.open("data:text/csv;charset=utf-8," + encodeURIComponent(csv), "_blank");
  }
  return csv; // also return so caller can use it
};

// ─── Ingest View ──────────────────────────────────────────────────────────────
// Part 1: Tracking sheet — flat list of all ingests across all projects
// Part 2: Dashboard — charts and metrics

// Flatten all ingests from all projects into one list
const gatherIngests = (projects, team) => {
  const rows = [];
  projects.forEach(p => {
    const producer   = (p.assignees?.Producer||[]).map(id=>team.find(m=>m.id===id)?.name||"").filter(Boolean).join(", ");
    const editor     = (p.assignees?.Editor||[]).map(id=>team.find(m=>m.id===id)?.name||"").filter(Boolean).join(", ");
    const mediaMgr   = (p.assignees?.["Media Manager"]||[]).map(id=>team.find(m=>m.id===id)?.name||"").filter(Boolean).join(", ");
    // Gather from project.ingestDates
    (p.ingestDates||[]).forEach(ig => {
      rows.push({
        _id: ig.id, _projectId: p.id, _source: "ingestDates",
        projectName: p.name, workstream: p.workstream||"", businessUnit: p.businessUnit||"",
        producer, editor, mediaManager: mediaMgr,
        ingestDatetime: ig.datetime||"",
        completedDatetime: ig.completedAt||"",
        location: ig.location||"",
        numFiles: ig.numFiles||"", totalSizeGB: ig.totalSizeGB||"",
        curatorLink: ig.curatorLink||"", transcriptNeeded: ig.transcriptNeeded||false,
        transcriptLink: ig.transcriptLink||"", reviewLink: ig.reviewLink||"",
        mediaSource: ig.mediaSource||"", notes: ig.notes||"",
        completed: !!ig.completedAt,
      });
    });
    // Also gather from productions' ingest objects
    (p.productions||[]).forEach(prod => {
      const ig = prod.ingest;
      if(!ig || !ig.datetime) return;
      const location = prod.location || "";
      rows.push({
        _id: \`prod_\${prod.id}\`, _projectId: p.id, _source: "production", _productionId: prod.id,
        projectName: p.name, workstream: p.workstream||"", businessUnit: p.businessUnit||"",
        producer, editor, mediaManager: mediaMgr,
        ingestDatetime: ig.datetime||"",
        completedDatetime: ig.completedAt||"",
        location,
        numFiles: ig.numFiles||"", totalSizeGB: ig.totalSizeGB||"",
        curatorLink: ig.curatorLink||"", transcriptNeeded: ig.transcriptNeeded||false,
        transcriptLink: ig.transcriptLink||"", reviewLink: ig.reviewLink||"",
        mediaSource: ig.mediaSource||"", notes: ig.notes||"",
        completed: !!ig.completedAt,
      });
    });
  });
  return rows.sort((a,b)=>(b.ingestDatetime||"").localeCompare(a.ingestDatetime||""));
};

    if(!iso) return "—";

const IngestView = ({projects, team, onUpdateProject}) => {
  const [tab, setTab] = useState("sheet");
  const ingests = useMemo(()=>gatherIngests(projects,team),[projects,team]);

  const updateRow = updated => {
    const {_projectId, _source, _productionId} = updated;
    const p = projects.find(x=>x.id===_projectId);
    if(!p) return;
    if(_source==="ingestDates") {
      onUpdateProject(_projectId,"ingestDates",(p.ingestDates||[]).map(ig=>ig.id===updated._id?{
        ...ig,
        datetime:         updated.ingestDatetime,
        completedAt:      updated.completedDatetime,
        numFiles:         updated.numFiles,
        totalSizeGB:      updated.totalSizeGB,
        curatorLink:      updated.curatorLink,
        transcriptNeeded: updated.transcriptNeeded,
        transcriptLink:   updated.transcriptLink,
        reviewLink:       updated.reviewLink,
        mediaSource:      updated.mediaSource,
        location:         updated.location,
        notes:            updated.notes,
      }:ig));
    } else if(_source==="production" && _productionId) {
      onUpdateProject(_projectId,"productions",(p.productions||[]).map(prod=>{
        if(prod.id!==_productionId) return prod;
        return {...prod, location:updated.location, ingest:{...prod.ingest,
          datetime:         updated.ingestDatetime,
          completedAt:      updated.completedDatetime,
          numFiles:         updated.numFiles,
          totalSizeGB:      updated.totalSizeGB,
          curatorLink:      updated.curatorLink,
          transcriptNeeded: updated.transcriptNeeded,
          transcriptLink:   updated.transcriptLink,
          reviewLink:       updated.reviewLink,
          mediaSource:      updated.mediaSource,
          notes:            updated.notes,
        }};
      }));
    }
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:900,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Ingest</div>
          <div style={{fontSize:13,color:"#4b5563"}}>{ingests.length} total ingest{ingests.length!==1?"s":""} across all projects</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:4,background:"#0d1117",borderRadius:9,padding:4,border:"1px solid #1f2937"}}>
          {[{id:"sheet",l:"📋 Tracking Sheet"},{id:"dashboard",l:"📊 Dashboard"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?"#1f2937":"transparent",border:"none",borderRadius:7,color:tab===t.id?"#f1f5f9":"#6b7280",padding:"6px 16px",fontSize:12,fontWeight:tab===t.id?800:600,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>
      {tab==="sheet"     && <IngestTrackingSheet ingests={ingests} onUpdateRow={updateRow}/>}
      {tab==="dashboard" && <IngestDashboard ingests={ingests} projects={projects}/>}
    </div>
  );
};

const AdminView = ({team, onUpdateTeam, gear, onUpdateGear, spaces, spaceMeta, onUpdateSpaces, onUpdateSpaceMeta}) => {
  const [tab, setTab] = useState("team");
  const [csvModal, setCsvModal] = useState(null); // {filename, content}
  const tabs = [{id:"team",l:"👥 Team"},{id:"gear",l:"🎒 Gear"},{id:"spaces",l:"📍 Spaces"}];

  const buildAndDownload = (filename, rows) => {
    const escape = v => {
      const s = v==null?"":String(v);
      return s.includes(",")||s.includes('"')||s.includes("\\n") ? \`"\${s.replace(/"/g,'""')}"\` : s;
    };
    const csv = rows.map(r=>r.map(escape).join(",")).join("\\n");
    // Open in new tab — browser will offer Save As for CSV content
    const w = window.open("","_blank");
    if(w) {
      w.document.write(\`<pre style="font-family:monospace;white-space:pre">\${csv.replace(/</g,"&lt;")}</pre>\`);
      w.document.title = filename;
    }
    // Also show copy modal as fallback
    setCsvModal({filename, content:csv});
  };

  const downloadTeamCSV = () => buildAndDownload("posttrack-team.csv",[
    ["ID","Name","Department","Employee Type","Available","Roles","Email","Phone","Skills"],
    ...team.map(m=>[m.id,m.name,m.department||"",m.employeeType||"",m.available?"Yes":"No",(m.roles||[]).join("; "),m.email||"",m.phone||"",(m.skills||[]).join("; ")]),
  ]);
  const downloadGearCSV = () => buildAndDownload("posttrack-gear.csv",[
    ["Name","Category","Quantity","Notes"],
    ...gear.map(g=>[g.name,g.category,g.quantity,g.notes||""]),
  ]);
  const downloadSpacesCSV = () => buildAndDownload("posttrack-spaces.csv",[
    ["Name","Type","Is HMU","Is Green Room","Is PCR","Suggest HMU","Linked Green Room"],
    ...spaces.map(s=>{
      const m=spaceMeta[s]||{};
      const type=m.isHMU?"HMU Station":m.isGreenRoom?"Green Room":m.isPCR?"PCR":"Shoot Space";
      return [s,type,m.isHMU?"Yes":"No",m.isGreenRoom?"Yes":"No",m.isPCR?"Yes":"No",m.suggestHMU?"Yes":"No",m.linkedGreenRoom||""];
    }),
  ]);

  const downloadFns = {team:downloadTeamCSV, gear:downloadGearCSV, spaces:downloadSpacesCSV};

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>
      {/* CSV modal */}
      {csvModal&&(
        <div style={{position:"fixed",inset:0,zIndex:3000,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={e=>e.target===e.currentTarget&&setCsvModal(null)}>
          <div style={{background:"#111827",border:"1px solid #374151",borderRadius:14,padding:24,width:640,maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px #000c"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>{csvModal.filename}</div>
                <div style={{fontSize:11,color:"#4b5563",marginTop:2}}>Copy the content below and paste into Excel, Google Sheets, or save as a .csv file</div>
              </div>
              <button onClick={()=>setCsvModal(null)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
            </div>
            <textarea readOnly value={csvModal.content}
              style={{flex:1,background:"#0a0f1a",border:"1px solid #374151",borderRadius:8,color:"#9ca3af",padding:"10px 12px",fontSize:11,fontFamily:"monospace",resize:"none",outline:"none",overflowY:"auto",minHeight:200,lineHeight:1.5}}
              onClick={e=>e.target.select()}/>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>{ navigator.clipboard.writeText(csvModal.content).then(()=>{ const b=document.getElementById("csv-copy-btn"); if(b){b.textContent="✓ Copied!"; setTimeout(()=>{b.textContent="Copy to Clipboard";},2000);}}); }}
                id="csv-copy-btn"
                style={{flex:1,background:"#6366f1",border:"none",borderRadius:7,color:"#fff",padding:"8px 0",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                Copy to Clipboard
              </button>
              <button onClick={()=>setCsvModal(null)}
                style={{background:"#1f2937",border:"1px solid #374151",borderRadius:7,color:"#9ca3af",padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                Close
              </button>
            </div>
          </div>
        </div>
      )}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:22,fontWeight:900,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Admin</div>
        <div style={{fontSize:13,color:"#4b5563"}}>Manage your team roster, equipment inventory, and studio spaces.</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:20}}>
        <div style={{display:"flex",gap:4,background:"#0d1117",borderRadius:9,padding:4,border:"1px solid #1f2937"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?"#1f2937":"transparent",border:"none",borderRadius:7,color:tab===t.id?"#f1f5f9":"#6b7280",padding:"6px 18px",fontSize:13,fontWeight:tab===t.id?800:600,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",transition:"all 0.15s"}}>
              {t.l} <span style={{fontSize:10,color:"#374151",marginLeft:4}}>{t.id==="team"?team.length:t.id==="gear"?gear.length:spaces.length}</span>
            </button>
          ))}
        </div>
        {/* CSV download button for active tab */}
        <button onClick={downloadFns[tab]}
          style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,background:"#111827",border:"1px solid #374151",borderRadius:7,color:"#9ca3af",padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}
          onMouseEnter={e=>{e.currentTarget.style.background="#1f2937";e.currentTarget.style.color="#e2e8f0";}}
          onMouseLeave={e=>{e.currentTarget.style.background="#111827";e.currentTarget.style.color="#9ca3af";}}>
          ↓ Export CSV
        </button>
      </div>
      {tab==="team"   &&<AdminTeamTab   team={team}   onUpdateTeam={onUpdateTeam}/>}
      {tab==="gear"   &&<AdminGearTab   gear={gear}   onUpdateGear={onUpdateGear}/>}
      {tab==="spaces" &&<AdminSpacesTab spaces={spaces} spaceMeta={spaceMeta} onUpdateSpaces={onUpdateSpaces} onUpdateSpaceMeta={onUpdateSpaceMeta}/>}
    </div>
  );
};
