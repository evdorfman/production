// ─── Production Schedule Editor ───────────────────────────────────────────────
// Table layout matching the reference photo: Time | Task | Location | Notes
// Content Shoot + Social Content get 8 default rows with auto-populated times.
const SCHEDULE_TABLE_TYPES = ["Content Shoot","Social Content"];

const makeDefaultSchedule = (startTime, endTime) => {
  const fmtT = iso => {
    if(!iso) return "";
    const m = iso.match(/T(\\d{2}):(\\d{2})/);
    if(!m) return "";
    const h=+m[1], mn=+m[2];
    const ampm=h<12?"AM":"PM", h12=h===0?12:h>12?h-12:h;
    return \`\${h12}:\${String(mn).padStart(2,"0")} \${ampm}\`;
  };
  const callStr = fmtT(startTime);
  const wrapStr = fmtT(endTime);
  return [
    {id:uid(), time:callStr, task:"Crew Call",   location:"", notes:"", crew:[]},
    {id:uid(), time:callStr, task:"Set Up",       location:"", notes:"", crew:[]},
    {id:uid(), time:"",      task:"",             location:"", notes:"", crew:[]},
    {id:uid(), time:"",      task:"",             location:"", notes:"", crew:[]},
    {id:uid(), time:"",      task:"",             location:"", notes:"", crew:[]},
    {id:uid(), time:"",      task:"",             location:"", notes:"", crew:[]},
    {id:uid(), time:"",      task:"Breakdown",    location:"", notes:"", crew:[]},
    {id:uid(), time:wrapStr, task:"Wrap",         location:"", notes:"", crew:[]},
  ];
};

const ProductionScheduleEditor = ({schedule=[], productionType, startTime, endTime, secondaryLocations=[], crewInternal=[], crewExternal=[], team=[], onUpdate}) => {
  const isTable = SCHEDULE_TABLE_TYPES.includes(productionType);

  // Build schedule from location bookings
  const buildFromBooking = () => {
    const fmtT = iso => {
      if(!iso) return "";
      const m = iso.match(/T(\\d{2}):(\\d{2})/); if(!m) return "";
      const h=+m[1], mn=+m[2], ampm=h<12?"AM":"PM", h12=h===0?12:h>12?h-12:h;
      return \`\${h12}:\${String(mn).padStart(2,"0")} \${ampm}\`;
    };
    const overallStart = fmtT(startTime);
    const overallEnd   = fmtT(endTime);
    const overallLoc   = (secondaryLocations.find(l=>l.isOverall)||{location:""}).location || "";

    // Find primary shoot from secondaryLocations
    const primaryShoot = (secondaryLocations||[]).find(l=>l._isPrimaryShoot);
    const shootStart   = fmtT(primaryShoot?.startTime||startTime);

    // Find HMU from secondaryLocations
    const hmuLoc = (secondaryLocations||[]).find(l=>l.type==="Hair & Makeup");
    const hmuTime = fmtT(hmuLoc?.startTime||startTime);
    const hmuRoom = hmuLoc?.location||"";

    // Get overall room from production location (passed via secondary with isOverall or fallback)
    const mainRoom = primaryShoot?.location || overallLoc || "";

    const rows = [
      {id:uid(), time:overallStart, task:"Crew Call",     location:mainRoom, notes:"", crew:[]},
      {id:uid(), time:overallStart, task:"Set Up",        location:mainRoom, notes:"", crew:[]},
    ];

    // HMU row if HMU booked
    if(hmuLoc) {
      rows.push({id:uid(), time:hmuTime, task:"Hair & Makeup", location:hmuRoom, notes:"", crew:[]});
    }

    // Primary shoot row
    if(primaryShoot) {
      rows.push({id:uid(), time:shootStart, task:"Primary Shoot", location:primaryShoot.location||mainRoom, notes:"", crew:[]});
    }

    // Add blank rows to reach 8 total (minus wrap)
    const blanksNeeded = Math.max(0, 6 - rows.length);
    for(let i=0;i<blanksNeeded;i++) {
      rows.push({id:uid(), time:"", task:"", location:"", notes:"", crew:[]});
    }

    rows.push({id:uid(), time:"", task:"Breakdown", location:mainRoom, notes:"", crew:[]});
    rows.push({id:uid(), time:overallEnd, task:"Wrap", location:mainRoom, notes:"", crew:[]});

    onUpdate(rows);
  };

  // Do NOT auto-init — schedule starts empty, user clicks "Build from Booking"
  // Only auto-init if type changes and schedule exists (for non-table types switching to table)

  const lastSyncedStart = useRef(startTime);
  const lastSyncedEnd   = useRef(endTime);
  useEffect(()=>{
    if(!isTable || schedule.length===0) return;
    const startChanged = startTime !== lastSyncedStart.current;
    const endChanged   = endTime   !== lastSyncedEnd.current;
    if(!startChanged && !endChanged) return;
    lastSyncedStart.current = startTime;
    lastSyncedEnd.current   = endTime;
    const fmtT = iso => {
      if(!iso) return "";
      const m = iso.match(/T(\\d{2}):(\\d{2})/);
      if(!m) return "";
      const h=+m[1], mn=+m[2];
      const ampm=h<12?"AM":"PM", h12=h===0?12:h>12?h-12:h;
      return \`\${h12}:\${String(mn).padStart(2,"0")} \${ampm}\`;
    };
    const callStr = fmtT(startTime);
    const wrapStr = fmtT(endTime);
    const updated = schedule.map((item,i) => {
      // Row 0 (Crew Call) and 1 (Set Up): sync only if not manually overridden
      if((i===0||i===1) && startChanged && !item._manualTime) return {...item, time:callStr};
      // Last row (Wrap): sync only if not manually overridden
      if(i===schedule.length-1 && endChanged && !item._manualTime) return {...item, time:wrapStr};
      return item;
    });
    if(JSON.stringify(updated)!==JSON.stringify(schedule)) onUpdate(updated);
  },[startTime, endTime]); // eslint-disable-line

  // Sync secondary locations into schedule — upsert rows tagged with loc.id
  useEffect(()=>{
    if(!isTable || schedule.length===0) return;
    const fmtT = iso => {
      if(!iso) return "";
      const m = iso.match(/T(\\d{2}):(\\d{2})/);
      if(!m) return "";
      const h=+m[1], mn=+m[2];
      const ampm=h<12?"AM":"PM", h12=h===0?12:h>12?h-12:h;
      return \`\${h12}:\${String(mn).padStart(2,"0")} \${ampm}\`;
    };
    let s = [...schedule];
    const wrapIdx = s.length - 1;
    secondaryLocations.forEach(loc=>{
      if(!loc.type || (!loc.startTime && !loc.endTime && !loc.location)) return;
      const existIdx = s.findIndex(r=>r._locId===loc.id);
      const task = loc.type==="Hair & Makeup" ? \`Hair & Makeup\${loc.location?" — "+loc.location:""}\` :
                   loc.type==="Green Room"     ? \`Green Room\${loc.location?" — "+loc.location:""}\` :
                   loc.type==="Second Shoot"   ? \`Second Shoot\${loc.location?" — "+loc.location:""}\` :
                   loc.type==="Wardrobe"       ? \`Wardrobe\${loc.location?" — "+loc.location:""}\` :
                   loc.type==="Holding"        ? \`Holding\${loc.location?" — "+loc.location:""}\` :
                   \`\${loc.type}\${loc.location?" — "+loc.location:""}\`;
      const row = {
        id: existIdx>=0 ? s[existIdx].id : uid(),
        _locId: loc.id,
        time: fmtT(loc.startTime)||"",
        task,
        location: loc.location||"",
        notes: "",
        crew: existIdx>=0 ? (s[existIdx].crew||[]) : [],
      };
      if(existIdx>=0) {
        s[existIdx] = row;
      } else {
        // Insert before Wrap
        s.splice(Math.max(wrapIdx,2), 0, row);
      }
    });
    // Remove orphaned loc rows whose loc.id no longer exists
    const locIds = new Set(secondaryLocations.map(l=>l.id));
    s = s.filter(r=>!r._locId || locIds.has(r._locId));
    // Only update if something actually changed
    if(JSON.stringify(s)!==JSON.stringify(schedule)) onUpdate(s);
  },[JSON.stringify(secondaryLocations)]); // eslint-disable-line

  const updItem = (idx, f, v, extra={}) => onUpdate(schedule.map((it,i)=>i!==idx?it:{...it,[f]:v,...extra}));

  // Insert new row before last row (Wrap), except if schedule has <2 rows
  const addRow = () => {
    const newRow = {id:uid(), time:"", task:"New Task", location:"", notes:"", crew:[]};
    if(schedule.length < 2) { onUpdate([...schedule, newRow]); return; }
    const insertAt = schedule.length - 1; // before Wrap
    const s = [...schedule];
    s.splice(insertAt, 0, newRow);
    onUpdate(s);
  };
  const delRow = idx => onUpdate(schedule.filter((_,i)=>i!==idx));

  const TIME_OPTIONS = ["—","5:00 AM","5:30 AM","6:00 AM","6:30 AM","7:00 AM","7:30 AM","8:00 AM","8:30 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM","10:00 PM","11:00 PM","12:00 AM"];
  const ROOMS = [...ALL_STUDIO_LOCATIONS, "Other"];

  // Build crew list from production crew
  const allCrew = [
    ...(crewInternal||[]).map(c=>{const m=team.find(x=>x.id===c.memberId);return m?{id:\`i-\${c.id||m.id}\`,name:m.name}:null;}).filter(Boolean),
    ...(crewExternal||[]).map(c=>c.name?{id:\`e-\${c.id}\`,name:c.name}:null).filter(Boolean),
  ];
  const allCrewIds = allCrew.map(c=>c.id);

  // Time order index for comparison (earlier = lower index)
  const timeIdx = t => TIME_OPTIONS.indexOf(t);

  // Effective crew for a row — Crew Call/Wrap rows default to all, others start empty
  const effectiveRowCrew = (item) => {
    if((item.crew||[]).length>0) return item.crew;
    if(item.task==="Crew Call"||item.task==="Wrap") return allCrewIds;
    return [];
  };

  // Derive call time (earliest task) and wrap time (latest task) per crew member from schedule
  const crewScheduleTimes = useMemo(()=>{
    const result = {};
    allCrew.forEach(c=>{ result[c.id]={call:null,wrap:null}; });
    schedule.forEach(item=>{
      if(!item.time||item.time==="—") return;
      const eff = (item.crew||[]).length>0
        ? item.crew
        : (item.task==="Crew Call"||item.task==="Wrap") ? allCrewIds : [];
      eff.forEach(cid=>{
        if(!result[cid]) result[cid]={call:null,wrap:null};
        const ti = timeIdx(item.time);
        if(ti<0) return;
        if(result[cid].call===null || ti < timeIdx(result[cid].call)) result[cid].call = item.time;
        if(result[cid].wrap===null || ti > timeIdx(result[cid].wrap)) result[cid].wrap = item.time;
      });
    });
    return result;
  }, [schedule, allCrewIds.join(",")]); // recompute when schedule or crew membership changes

  const cellS = {background:"transparent",border:"none",outline:"none",color:"#e2e8f0",fontSize:13,fontFamily:"'DM Sans',sans-serif",width:"100%",padding:"6px 8px",resize:"none"};
  const selCellS = {...cellS,cursor:"pointer",appearance:"none",WebkitAppearance:"none"};
  const thS = {padding:"8px 10px",fontSize:11,fontWeight:800,color:"#f1f5f9",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",textAlign:"left",background:"#0d1117",borderBottom:"1px solid #374151"};
  const trBdr = {borderBottom:"1px solid #1f2937"};

  if(isTable) return (
    <div style={{border:"1px solid #374151",borderRadius:10,overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:"#0d1117",padding:"8px 12px",borderBottom:"1px solid #374151",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div style={{fontSize:12,fontWeight:800,color:"#f1f5f9",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.1em"}}>📋 Schedule</div>
        <div style={{display:"flex",gap:6}}>
          {startTime&&<button onClick={buildFromBooking}
            style={{background:"#6366f120",border:"1px solid #6366f150",borderRadius:5,color:"#818cf8",padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>
            ✦ Build from Booking
          </button>}
          <button onClick={addRow} style={{background:"#1f2937",border:"1px solid #374151",borderRadius:5,color:"#9ca3af",padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>+ Row</button>
        </div>
      </div>
      {schedule.length===0?(
        <div style={{padding:"32px 16px",textAlign:"center",display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          <div style={{fontSize:28}}>📋</div>
          <div style={{fontSize:13,fontWeight:600,color:"#6b7280"}}>No schedule yet</div>
          {startTime
            ? <button onClick={buildFromBooking}
                style={{background:"#6366f1",border:"none",borderRadius:8,color:"#fff",padding:"8px 20px",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                ✦ Build from Booking
              </button>
            : <div style={{fontSize:11,color:"#374151"}}>Set the Overall Production Window first, then build the schedule from it.</div>
          }
          <button onClick={addRow} style={{background:"none",border:"none",color:"#4b5563",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>or add a blank row manually</button>
        </div>
      ) : (
        <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
        <colgroup>
          <col style={{width:"13%"}}/>
          <col style={{width:"22%"}}/>
          <col style={{width:"15%"}}/>
          <col style={{width:"20%"}}/>
          <col style={{width:"26%"}}/>
          <col style={{width:"4%"}}/>
        </colgroup>
        <thead>
          <tr>
            <th style={thS}>Time</th>
            <th style={{...thS,borderLeft:"1px solid #374151"}}>Task</th>
            <th style={{...thS,borderLeft:"1px solid #374151"}}>Room</th>
            <th style={{...thS,borderLeft:"1px solid #374151"}}>Crew</th>
            <th style={{...thS,borderLeft:"1px solid #374151"}}>Notes</th>
            <th style={{...thS,borderLeft:"1px solid #374151"}}/>
          </tr>
        </thead>
        <tbody>
          {schedule.map((item,i)=>{
            const isWrap      = i===schedule.length-1;
            const isCrewCall  = i===0;
            const rowCrew     = effectiveRowCrew(item);
            const isOther     = item.location==="Other" || (item.location&&!ALL_STUDIO_LOCATIONS.includes(item.location));
            const roomSelVal  = isOther ? "Other" : (item.location||"");
            return(
              <tr key={item.id||i} style={{...trBdr,background:isWrap?"#6366f108":isCrewCall?"#3b82f608":"transparent"}}>

                {/* Time — dropdown */}
                <td style={{borderRight:"1px solid #1f2937",padding:0,verticalAlign:"top"}}>
                  <select value={item.time||"—"} onChange={e=>updItem(i,"time",e.target.value==="—"?"":e.target.value, {_manualTime:true})}
                    style={{...selCellS,color:item.time?"#f1f5f9":"#4b5563"}}>
                    {TIME_OPTIONS.map(t=><option key={t} value={t} style={{background:"#111827"}}>{t}</option>)}
                  </select>
                </td>

                {/* Task */}
                <td style={{borderRight:"1px solid #1f2937",padding:0,verticalAlign:"top"}}>
                  <input value={item.task||""} onChange={e=>updItem(i,"task",e.target.value)}
                    style={cellS} placeholder={isWrap?"Wrap":isCrewCall?"Crew Call":"New Task"}/>
                </td>

                {/* Room — dropdown + Other text input */}
                <td style={{borderRight:"1px solid #1f2937",padding:0,verticalAlign:"top"}}>
                  <select value={roomSelVal} onChange={e=>{
                      if(e.target.value==="Other") updItem(i,"location","Other");
                      else updItem(i,"location",e.target.value==="—"?"":e.target.value);
                    }}
                    style={{...selCellS,color:roomSelVal?"#f1f5f9":"#4b5563"}}>
                    <option value="" style={{background:"#111827"}}>—</option>
                    {ALL_STUDIO_LOCATIONS.map(r=><option key={r} value={r} style={{background:"#111827"}}>{r}</option>)}
                    <option value="Other" style={{background:"#111827"}}>Other…</option>
                  </select>
                  {isOther&&(
                    <input value={item.location==="Other"?"":item.location||""} onChange={e=>updItem(i,"location",e.target.value||"Other")}
                      placeholder="Specify…" style={{...cellS,fontSize:11,borderTop:"1px solid #1f2937"}}/>
                  )}
                </td>

                {/* Crew — quick-add chips */}
                <td style={{borderRight:"1px solid #1f2937",padding:"4px 6px",verticalAlign:"top"}}>
                  {allCrew.length>0?(
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                      {allCrew.map(c=>{
                        const sel=rowCrew.includes(c.id);
                        const explicitlyCrew=(item.crew||[]).length>0;
                        const isDefault=(isCrewCall||isWrap)&&!explicitlyCrew;
                        return(
                          <button key={c.id}
                            onClick={()=>{
                              const explicit = (item.crew||[]).length>0;
                              const isDefaultRow = (isCrewCall||isWrap) && !explicit;
                              // Base: default rows start from allCrewIds, others start from []
                              const base = isDefaultRow ? allCrewIds : (item.crew||[]);
                              const next = sel
                                ? base.filter(x=>x!==c.id)
                                : [...base, c.id].filter((x,xi,a)=>a.indexOf(x)===xi);
                              updItem(i,"crew",next);
                            }}
                            title={c.name}
                            style={{background:sel?"#6366f1":"#1f2937",border:\`1px solid \${sel?"#6366f1":"#374151"}\`,
                              borderRadius:4,color:sel?"#fff":"#9ca3af",fontSize:10,padding:"2px 7px",
                              cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",whiteSpace:"nowrap",
                              fontWeight:sel?700:400,opacity:isDefault&&!sel?0.5:1}}>
                            {c.name.split(" ")[0]}
                          </button>
                        );
                      })}
                    </div>
                  ):<span style={{fontSize:10,color:"#374151",padding:"4px 2px"}}>Add crew above</span>}
                </td>

                {/* Notes — textarea that wraps */}
                <td style={{borderRight:"1px solid #1f2937",padding:0,verticalAlign:"top"}}>
                  <textarea value={item.notes||""} onChange={e=>updItem(i,"notes",e.target.value)}
                    rows={1}
                    style={{...cellS,resize:"vertical",minHeight:32,lineHeight:"1.4",overflowY:"hidden"}}
                    onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}
                    placeholder=""/>
                </td>

                {/* Delete */}
                <td style={{textAlign:"center",padding:"4px 2px",verticalAlign:"top"}}>
                  {!isWrap&&!isCrewCall&&(
                    <button onClick={()=>delRow(i)} style={{background:"none",border:"none",color:"#374151",cursor:"pointer",fontSize:14,lineHeight:1,paddingTop:8}}
                      onMouseEnter={e=>e.currentTarget.style.color="#ef4444"}
                      onMouseLeave={e=>e.currentTarget.style.color="#374151"}>×</button>
                  )}
                </td>
              </tr>
            );
          })}
        </tbody>
        </table>
      )}

      {/* Crew summary — call and wrap times derived from schedule */}
      {allCrew.length>0&&(
        <div style={{borderTop:"1px solid #374151",background:"#0d1117",padding:"8px 12px"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#4b5563",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:6}}>Crew Times (from schedule)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {allCrew.map(c=>{
              const times = crewScheduleTimes[c.id]||{call:null,wrap:null};
              return(
                <div key={c.id} style={{background:"#111827",border:"1px solid #1f2937",borderRadius:7,padding:"5px 10px",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>{c.name.split(" ")[0]}</span>
                  <span style={{fontSize:10,color:"#3b82f6"}}>📞 {times.call||"—"}</span>
                  <span style={{fontSize:10,color:"#6b7280"}}>→</span>
                  <span style={{fontSize:10,color:"#8b5cf6"}}>🏁 {times.wrap||"—"}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );

  // Non-table types: original row-based editor
  const allCrew2 = [...(crewInternal||[]).map(c=>{const m=team.find(x=>x.id===c.memberId);return m?{id:\`i-\${c.id}\`,name:m.name,role:c.role}:null;}).filter(Boolean),...(crewExternal||[]).map(c=>c.name?{id:\`e-\${c.id}\`,name:c.name,role:c.role}:null).filter(Boolean)];
  const moveUp  =(idx)=>{ if(idx===0)return; const s=[...schedule]; [s[idx-1],s[idx]]=[s[idx],s[idx-1]]; onUpdate(s); };
  const moveDown=(idx)=>{ if(idx===schedule.length-1)return; const s=[...schedule]; [s[idx],s[idx+1]]=[s[idx+1],s[idx]]; onUpdate(s); };
  const selS={background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:"#e2e8f0",padding:"5px 7px",fontSize:12,outline:"none"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#4b5563",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>📋 Production Schedule</div>
        <Btn small onClick={addRow}>+ Add Item</Btn>
      </div>
      {schedule.length===0&&<div style={{textAlign:"center",padding:"14px 0",color:"#374151",fontSize:13,border:"1px dashed #1f2937",borderRadius:7}}>No schedule items yet.</div>}
      {schedule.map((item,si)=>(
        <div key={item.id||si} style={{background:"#0a0f1a",border:"1px solid #374151",borderRadius:8,padding:"10px 12px"}}>
          <div style={{display:"grid",gridTemplateColumns:"26px 90px 1fr 110px 28px",gap:6,alignItems:"center",marginBottom:7}}>
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              <button onClick={()=>moveUp(si)} disabled={si===0} style={{background:"none",border:"none",color:si===0?"#1f2937":"#4b5563",cursor:si===0?"default":"pointer",fontSize:10,lineHeight:1,padding:0}}>▲</button>
              <button onClick={()=>moveDown(si)} disabled={si===schedule.length-1} style={{background:"none",border:"none",color:si===schedule.length-1?"#1f2937":"#4b5563",cursor:si===schedule.length-1?"default":"pointer",fontSize:10,lineHeight:1,padding:0}}>▼</button>
            </div>
            <select value={item.time||""} onChange={e=>updItem(si,"time",e.target.value)} style={{...selS,color:item.time?"#e2e8f0":"#4b5563"}}>
              <option value="">Time…</option>
              {TIME_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <Inp value={item.task||""} onChange={e=>updItem(si,"task",e.target.value)} placeholder="Task / segment…"/>
            <Inp value={item.location||""} onChange={e=>updItem(si,"location",e.target.value)} placeholder="Location…" style={{fontSize:12}}/>
            <button onClick={()=>delRow(si)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:18,lineHeight:1,textAlign:"center"}}>×</button>
          </div>
          {allCrew2.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
              {allCrew2.map(c=>{const sel=(item.assignedCrew||[]).includes(c.id);return(<button key={c.id} onClick={()=>updItem(si,"assignedCrew",sel?(item.assignedCrew||[]).filter(x=>x!==c.id):[...(item.assignedCrew||[]),c.id])} style={{background:sel?"#6366f120":"#1f2937",border:\`1px solid \${sel?"#6366f1":"#374151"}\`,borderRadius:4,color:sel?"#818cf8":"#9ca3af",fontSize:11,padding:"2px 8px",cursor:"pointer",fontWeight:sel?700:400,fontFamily:"'Barlow Condensed',sans-serif"}}>{c.name.split(" ")[0]}{c.role?\` · \${c.role}\`:""}</button>);})}
            </div>
          )}
          <Inp value={item.notes||""} onChange={e=>updItem(si,"notes",e.target.value)} placeholder="Notes…" style={{fontSize:12}}/>
        </div>
      ))}
    </div>
  );
};

// ─── Social Content Deliverable Form ─────────────────────────────────────────
// Used inside the Social Content production type's Deliverables section.
// Auto-tags every deliverable with: type=Social, workstream=Social, platform=Social Media.
const SOCIAL_ASPECT_RATIOS = ["9:16","1:1","4:5","16:9","4:3","2:3"];
const SocialDeliverableForm = ({onAdd, deliverables=[], onUpdateDeliverable, onDeleteDeliverable}) => {
  const [title,    setTitle]    = useState("");
  const [ar,       setAr]       = useState("9:16");
  const [captions, setCaptions] = useState(false);
  const [srt,      setSrt]      = useState(false);
  const [notes,    setNotes]    = useState("");
  const [deadline, setDeadline] = useState("");
  const [editId,   setEditId]   = useState(null); // id of deliverable being edited inline

  const handleAdd = () => {
    if(!title.trim()) return;
    const d = mkDel(title.trim(), null, null, "Not Started", []);
    d.aspectRatio          = ar;
    d.captionsNeeded       = captions;
    d.srtNeeded            = srt;
    d.notes                = notes;
    d.deadline             = deadline;
    // Auto-tags
    d.deliverableType      = "Social";
    d.workstream           = "Social";
    d.distributionPlatform = "Social Media";
    d.useCaseLimitations   = "Social Ready";
    // 2 default review rounds
    d.rounds = [
      {id:uid(), label:"Round 1", status:"Pending", deadline:"", reviewers:[]},
      {id:uid(), label:"Round 2", status:"Pending", deadline:"", reviewers:[]},
    ];
    onAdd(d);
    setTitle(""); setAr("9:16"); setCaptions(false); setSrt(false); setNotes(""); setDeadline("");
  };

  // Social deliverables list with inline expand/edit
  const socialDels = deliverables.filter(d=>d.deliverableType==="Social"||d.workstream==="Social");

  return (
    <div style={{background:"#0f172a",border:"1px solid #ec489930",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
      <div style={{fontSize:11,fontWeight:800,color:"#ec4899",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:10}}>
        + New Social Deliverable
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <LW label="Title">
          <Inp value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Reel :15, Feed Post, Story…" onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
        </LW>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <LW label="Aspect Ratio">
            <Sel value={ar} onChange={e=>setAr(e.target.value)}>
              {SOCIAL_ASPECT_RATIOS.map(r=><option key={r}>{r}</option>)}
            </Sel>
          </LW>
          <LW label="Final Delivery Date">
            <Inp type="date" value={deadline} onChange={e=>setDeadline(e.target.value)}
              style={{colorScheme:"dark"}}/>
          </LW>
        </div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <Toggle label="Burned-in Captions" value={captions} onChange={setCaptions}/>
          <Toggle label="SRT File Needed"    value={srt}      onChange={setSrt}/>
        </div>
        <LW label="Notes">
          <Inp textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Include intended length (e.g. :15, :30) and rough topic / concept…"
            style={{minHeight:56}}/>
        </LW>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <Btn onClick={handleAdd} disabled={!title.trim()}>+ Add Deliverable</Btn>
          <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif"}}>
            Auto-tagged: Social · Social Media · Social Ready · 2 review rounds
          </div>
        </div>
      </div>

      {/* Existing social deliverables — editable inline */}
      {socialDels.length>0&&(
        <div style={{marginTop:12,borderTop:"1px solid #ec489920",paddingTop:10}}>
          <div style={{fontSize:10,fontWeight:800,color:"#4b5563",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:6}}>Added Social Deliverables</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {socialDels.map(d=>{
              const isEdit = editId===d.id;
              const dc = DCOLOR[d.status]||"#6b7280";
              return(
                <div key={d.id} style={{background:"#111827",border:\`1px solid \${isEdit?"#ec4899":"#1f2937"}\`,borderRadius:8,overflow:"hidden",transition:"border-color 0.15s"}}>
                  {/* Header row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer"}}
                    onClick={()=>setEditId(isEdit?null:d.id)}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:dc,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9",flex:1}}>{d.title}</span>
                    {d.aspectRatio&&<Chip label={d.aspectRatio} color="#374151" xs/>}
                    <Chip label={d.status} color={dc} xs/>
                    {d.deadline&&<span style={{fontSize:11,color:"#6b7280"}}>{fmtDate(d.deadline)}</span>}
                    <span style={{fontSize:11,color:"#ec4899",fontWeight:700}}>{isEdit?"▲":"▼ Edit"}</span>
                  </div>
                  {/* Editable fields — expanded */}
                  {isEdit&&(
                    <div style={{borderTop:"1px solid #1f2937",padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        <LW label="Title"><Inp value={d.title||""} onChange={e=>onUpdateDeliverable({...d,title:e.target.value})}/></LW>
                        <LW label="Status">
                          <Sel value={d.status||"Not Started"} onChange={e=>onUpdateDeliverable({...d,status:e.target.value})}>
                            {DELIVERABLE_STATUSES.map(s=><option key={s}>{s}</option>)}
                          </Sel>
                        </LW>
                        <LW label="Aspect Ratio">
                          <Sel value={d.aspectRatio||"9:16"} onChange={e=>onUpdateDeliverable({...d,aspectRatio:e.target.value})}>
                            {SOCIAL_ASPECT_RATIOS.map(r=><option key={r}>{r}</option>)}
                          </Sel>
                        </LW>
                        <LW label="Final Delivery Date">
                          <Inp type="date" value={d.deadline||""} onChange={e=>onUpdateDeliverable({...d,deadline:e.target.value})} style={{colorScheme:"dark"}}/>
                        </LW>
                      </div>
                      <div style={{display:"flex",gap:20}}>
                        <Toggle label="Burned-in Captions" value={!!d.captionsNeeded} onChange={v=>onUpdateDeliverable({...d,captionsNeeded:v})}/>
                        <Toggle label="SRT Needed" value={!!d.srtNeeded} onChange={v=>onUpdateDeliverable({...d,srtNeeded:v})}/>
                      </div>
                      <LW label="Notes"><Inp textarea value={d.notes||""} onChange={e=>onUpdateDeliverable({...d,notes:e.target.value})} style={{minHeight:48}}/></LW>
                      {/* Review rounds */}
                      {(d.rounds||[]).length>0&&(
                        <div>
                          <div style={{fontSize:10,fontWeight:800,color:"#4b5563",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:5}}>Review Rounds</div>
                          {(d.rounds||[]).map((r,ri)=>(
                            <div key={r.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                              <span style={{fontSize:12,color:"#9ca3af",width:60,flexShrink:0}}>{r.label}</span>
                              <Inp type="date" value={r.deadline||""} onChange={e=>onUpdateDeliverable({...d,rounds:d.rounds.map((x,i)=>i===ri?{...x,deadline:e.target.value}:x)})} style={{colorScheme:"dark",flex:1}}/>
                              <Sel value={r.status} onChange={e=>onUpdateDeliverable({...d,rounds:d.rounds.map((x,i)=>i===ri?{...x,status:e.target.value}:x)})} style={{flex:1}}>
                                {ROUND_STATUSES.map(s=><option key={s}>{s}</option>)}
                              </Sel>
                            </div>
                          ))}
                        </div>
                      )}
                      <div style={{display:"flex",justifyContent:"flex-end"}}>
                        <Btn small variant="danger" onClick={()=>{onDeleteDeliverable(d.id);setEditId(null);}}>Remove</Btn>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Section Panel (collapsible row with expand/collapse) ───────────────────
const SecPanel = ({icon, label, summary, summaryEmpty, open, onOpen, onClose, badge, children, alwaysOpen}) => {
  const isOpen = alwaysOpen || open;
  const [hovered, setHovered] = useState(false);
  return (
    <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:9,overflow:"hidden"}}>
      <div
        onClick={alwaysOpen?undefined:e=>{e.stopPropagation();isOpen?onClose():onOpen();}}
        onMouseEnter={alwaysOpen?undefined:()=>setHovered(true)}
        onMouseLeave={alwaysOpen?undefined:()=>setHovered(false)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",cursor:alwaysOpen?"default":"pointer",userSelect:"none",background:hovered&&!alwaysOpen?"#1a2035":"transparent",transition:"background 0.1s"}}>
        <span style={{fontSize:13,flexShrink:0}}>{icon}</span>
        <div style={{fontWeight:700,fontSize:12,color:"#9ca3af",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.07em",flexShrink:0}}>{label}</div>
        {badge&&<div style={{background:"#6366f120",color:"#818cf8",borderRadius:99,padding:"0 7px",fontSize:11,fontWeight:800}}>{badge}</div>}
        <div style={{flex:1,fontSize:12,color:"#4b5563",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginLeft:4}}>
          {isOpen?"":summary||<span style={{color:"#374151",fontStyle:"italic"}}>{summaryEmpty}</span>}
        </div>
        {!alwaysOpen&&(
          <div style={{fontSize:11,color:"#6366f1",fontWeight:700,flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>
            {isOpen?"▲ Collapse":summary?"▼ Edit":"+ Set"}
          </div>
        )}
      </div>
      {isOpen&&(
        <div onClick={e=>e.stopPropagation()} style={{borderTop:"1px solid #1f2937",padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
          {children}
        </div>
      )}
    </div>
  );
};


const ProductionCard = ({production, idx, projectId, allProductions, allProjectDels, team, studioBookings, mediaCards, allProjects=[], presets=[], onUpdate, onDelete, onDuplicate, onSavePreset, onLoadPreset, onAddDeliverable, onDeleteDeliverable, onSendForApproval, onUnapprove}) => {
  const [exp, setExp] = useState(!production.startTime);
  const [delOpen, setDelOpen] = useState(false);
  const [newDelTitle, setNewDelTitle] = useState("");
  const [gearOpen, setGearOpen] = useState(false);
  const [gearSearch, setGearSearch] = useState("");
  const [hmuPrompt, setHmuPrompt] = useState({s1:false,s2:false,dismissed:false});
  const [confirmDialog, setConfirmDialog] = useState(null);
  const [showSavePreset, setShowSavePreset] = useState(false); // null | {missing: [{section, reason}]}
  // Per-section open states — all default closed for new productions,
  // auto-open sections that already have data
  const [sectOpen, setSectOpen] = useState(()=>({
    details:        !!(production.title),
    dateTime:       !!(production.startTime),
    feedsInto:      !!(production.feedsIntoId),
    hybridPlayback: !!(production.playbackDeliverableId),
    crew:           (production.crewInternal||[]).length>0||(production.crewExternal||[]).length>0,
    schedule:       (production.schedule||[]).length>0,
    gear:           (production.equipmentIds||[]).length>0||(production.externalGear||[]).length>0||(production.mediaCardIds||[]).length>0,
    ingest:         !!(production.ingest?.datetime),
    deliverables:   (production.deliverables||[]).length>0,
    playbackAssets: (production.playbackAssets||[]).length>0,
  }));

  const pColor = PRODUCTION_COLOR[production.type] || "#6366f1";
  // Keep a ref to always-current production so callbacks never close over stale props
  const productionRef = useRef(production);
  useEffect(()=>{ productionRef.current = production; }, [production]);
  const upd = (f,v) => onUpdate({...productionRef.current,[f]:v});
  const hasShoot = SHOOT_TYPES.includes(production.type);
  const isBroadcast = BROADCAST_TYPES.includes(production.type);
  const isPlayback = production.type === "Live Playback" || production.type === "Live Broadcast";
  const isHybrid = production.type === "Hybrid Event";
  const isPreTape = production.type === "Pre-tape";
  const isSocial = production.type === "Social Content";
  const approver = team.find(m=>m.roles.includes("Studio Approver"));
  const pendingApproval = normalizeStage(production.status) === "Tentative";

  // Derive call/wrap time for each crew member — must use EXACT same ID format as schedule editor
  const TIME_ORDER = ["5:00 AM","5:30 AM","6:00 AM","6:30 AM","7:00 AM","7:30 AM","8:00 AM","8:30 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM","10:00 PM","11:00 PM","12:00 AM"];

  // Build allCrew the same way as ProductionScheduleEditor does
  const schedAllCrew = [
    ...(production.crewInternal||[]).map(c=>{const m=team.find(x=>x.id===c.memberId);return m?{id:\`i-\${c.id||m.id}\`,name:m.name}:null;}).filter(Boolean),
    ...(production.crewExternal||[]).map(c=>c.name?{id:\`e-\${c.id}\`,name:c.name}:null).filter(Boolean),
  ];
  const schedAllCrewIds = schedAllCrew.map(c=>c.id);

  const getCrewTimes = (schedCrewId) => {
    const sched = production.schedule||[];
    let call=null, wrap=null;
    sched.forEach(item=>{
      if(!item.time||item.time==="—") return;
      const eff = (item.crew||[]).length>0
        ? item.crew
        : (item.task==="Crew Call"||item.task==="Wrap") ? schedAllCrewIds : [];
      if(!eff.includes(schedCrewId)) return;
      const ti = TIME_ORDER.indexOf(item.time);
      if(ti<0) return;
      if(call===null||ti<TIME_ORDER.indexOf(call)) call=item.time;
      if(wrap===null||ti>TIME_ORDER.indexOf(wrap)) wrap=item.time;
    });
    return {call, wrap};
  };

  // Derive call times from space scheduling for display in crew section
  const fmtIsoT = iso => {
    if(!iso) return null;
    const m=iso.match(/T(\\d{2}):(\\d{2})/); if(!m) return null;
    const h=+m[1],mn=+m[2],ap=h<12?"AM":"PM",h12=h===0?12:h>12?h-12:h;
    return \`\${h12}:\${String(mn).padStart(2,"0")} \${ap}\`;
  };
  const getSpaceCallTime = (crewRole) => {
    const secLocs = production.secondaryLocations||[];
    // Producer → Overall production start
    if(crewRole==="Producer"||crewRole==="Executive Producer") {
      return {call:fmtIsoT(production.startTime), wrap:fmtIsoT(production.endTime)};
    }
    // Hair & Makeup → HMU station start/end
    if(crewRole==="Hair & Makeup") {
      const hmuLoc = secLocs.find(l=>l.type==="Hair & Makeup"&&l.startTime);
      if(hmuLoc) return {call:fmtIsoT(hmuLoc.startTime), wrap:fmtIsoT(hmuLoc.endTime)};
    }
    // Default → Overall start
    return {call:fmtIsoT(production.startTime), wrap:fmtIsoT(production.endTime)};
  };

  // HMU suggestion
  const hmuWindow = hasShoot && production.startTime ? calcHMUWindow(production.startTime) : null;
  const allBookings = studioBookings || [];
  const s1Conflicts = hmuWindow ? detectConflicts("HMU Station 1", hmuWindow.start, hmuWindow.end, allBookings) : [];
  const s2Conflicts = hmuWindow ? detectConflicts("HMU Station 2", hmuWindow.start, hmuWindow.end, allBookings) : [];
  const showHMUSuggest = hasShoot && hmuWindow && LOCATION_META[production.location]?.suggestHMU && !hmuPrompt.dismissed;
  const alreadyHMU1 = allBookings.some(b=>b.parentBookingId===production.id&&b.location==="HMU Station 1");
  const alreadyHMU2 = allBookings.some(b=>b.parentBookingId===production.id&&b.location==="HMU Station 2");

  // Crew call auto-calc
  const crewCallDisplay = production.crewCallTime ? fmtCrewCall(production.crewCallTime) : (production.startTime ? fmtCrewCall(calcCrewCall(production.startTime)) : "—");

  // Gear
  const internalEq = (production.equipmentIds||[]).map(id=>EQUIPMENT.find(e=>e.id===id)).filter(Boolean);
  const addExtGear = () => upd("externalGear",[...(production.externalGear||[]),{id:uid(),name:"",quantity:1,vendor:"",status:"Requested",isExternal:true}]);
  const updExt = (gid,f,v) => upd("externalGear",(production.externalGear||[]).map(g=>g.id!==gid?g:{...g,[f]:v}));
  const delExt = gid => upd("externalGear",(production.externalGear||[]).filter(g=>g.id!==gid));

  // Deliverables
  const addDeliverable = () => {
    if(!newDelTitle.trim()) return;
    const nd = mkDel(newDelTitle.trim(),null,null,"Not Started",[]);
    onAddDeliverable(nd);
    setNewDelTitle(""); setDelOpen(false);
  };

  // Linked productions for "feeds into" + playback picker
  const liveTargets = allProductions.filter(p=>p.id!==production.id&&["Live Event","Live Broadcast","Hybrid Event"].includes(p.type));
  const feedsIntoProduction = allProductions.find(p=>p.id===production.feedsIntoId);
  const playbackDel = allProjectDels.find(d=>d.id===production.playbackDeliverableId) || (production.deliverables||[]).find(d=>d.id===production.playbackDeliverableId);

  // Internal/external crew for shoots
  const addCrewInt = () => upd("crewInternal",[...(production.crewInternal||[]),{id:uid(),role:"",memberId:null,callTime:""}]);
  const addCrewExt = () => upd("crewExternal",[...(production.crewExternal||[]),{id:uid(),role:"",name:"",company:"",callTime:""}]);
  const updCI = (cid,f,v) => upd("crewInternal",(production.crewInternal||[]).map(c=>c.id!==cid?c:{...c,[f]:v}));
  const updCE = (cid,f,v) => upd("crewExternal",(production.crewExternal||[]).map(c=>c.id!==cid?c:{...c,[f]:v}));
  const delCI = cid => upd("crewInternal",(production.crewInternal||[]).filter(c=>c.id!==cid));
  const delCE = cid => upd("crewExternal",(production.crewExternal||[]).filter(c=>c.id!==cid));

  const CREW_ROLES = isBroadcast
    ? ["Live Director","Technical Director","Broadcast Coordinator","Camera Op","Audio Tech","Lighting Director","Producer","EVS Operator","Replay Operator","Graphics Operator"]
    : ["Producer","Director","DP","Gaffer","Camera Op","Sound Mixer","Hair and Makeup","Production Assistant","Assistant Camera"];

  const cs = {background:"#0f172a",border:"1px solid #1f2937",borderRadius:9,padding:"12px 14px"};

  return (
    <div style={{border:\`1px solid \${exp?pColor+"60":"#1f2937"}\`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
      {/* ── Save Preset Modal ── */}
      {showSavePreset&&(
        <SavePresetModal
          production={production}
          onSave={(name,sections)=>{onSavePreset(name,sections);setShowSavePreset(false);}}
          onClose={()=>setShowSavePreset(false)}
        />
      )}
      {/* ── Header ── */}
      <div onClick={()=>setExp(e=>!e)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",background:exp?"#111827":"#0f172a",cursor:"pointer"}}>
        <div style={{width:4,height:36,borderRadius:99,background:pColor,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
            <Chip label={production.type} color={pColor} xs/>
            <span style={{fontWeight:800,fontSize:15,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{production.title||\`\${production.type} \${idx+1}\`}</span>
            {pendingApproval&&<Chip label="⏳ Pending Approval" color="#f59e0b" xs/>}
            {feedsIntoProduction&&<Chip label={\`→ \${feedsIntoProduction.title}\`} color="#8b5cf6" xs/>}
          </div>
          <div style={{display:"flex",gap:10,fontSize:11,color:"#6b7280",flexWrap:"wrap"}}>
            {production.status==="Planning"&&<span style={{color:"#6b7280",fontStyle:"italic"}}>🔒 In Planning — not visible to approvers yet</span>}
            {production.startTime&&<span>📅 {fmtDate(production.startTime)} · {fmtTime(production.startTime)}</span>}
            {production.location&&<span>📍 {production.location}</span>}
            {hasShoot&&<span>📞 Crew call {crewCallDisplay}</span>}
            {(production.deliverables||[]).length>0&&<span>📦 {production.deliverables.length} del.</span>}
            {isHybrid&&playbackDel&&<span style={{color:"#f97316"}}>📼 Playback: {playbackDel.title}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}} onClick={e=>e.stopPropagation()}>
          {/* Preset & duplicate action buttons */}
          <button onClick={()=>setShowSavePreset(true)} title="Save as preset"
            style={{background:"#f59e0b15",border:"1px solid #f59e0b30",borderRadius:6,color:"#f59e0b",padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>
            ⭐
          </button>
          {presets.length>0&&<button onClick={onLoadPreset} title="Apply preset"
            style={{background:"#6366f115",border:"1px solid #6366f130",borderRadius:6,color:"#818cf8",padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>
            Load
          </button>}
          <button onClick={onDuplicate} title="Duplicate production"
            style={{background:"#1f2937",border:"1px solid #374151",borderRadius:6,color:"#6b7280",padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em"}}>
            ⧉
          </button>
          <div onClick={()=>setExp(e=>!e)} style={{cursor:"pointer",padding:"0 2px"}}>
            <Chip label={normalizeStage(production.status)} color={PROD_STATUS_COLOR[normalizeStage(production.status)]||"#6b7280"} xs/>
          </div>
          {production.status==="Planning"&&onSendForApproval&&(
            <button onClick={e=>{
              e.stopPropagation();
              const missing = [];
              if(!production.title?.trim())
                missing.push({section:"Details", reason:"Name required"});
              // Date & Time only required for production types that have a shoot
              if(SHOOT_TYPES.includes(production.type)) {
                const dateTimeMissing = [];
                if(!production.location) dateTimeMissing.push("location");
                if(!production.startTime) dateTimeMissing.push("start time");
                if(!production.endTime) dateTimeMissing.push("end time");
                if(dateTimeMissing.length)
                  missing.push({section:"Date & Time", reason:\`Missing: \${dateTimeMissing.join(", ")}\`});
              }
              setConfirmDialog({missing});
            }}
              style={{background:"#6366f120",border:"1px solid #6366f140",borderRadius:6,color:"#818cf8",padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>
              Send for Approval →
            </button>
          )}
          {normalizeStage(production.status)==="Tentative"&&(
            <button onClick={e=>{e.stopPropagation();onUpdate({...productionRef.current,status:"Planning",rejectionNote:null});}}
              style={{background:"#6b72801a",border:"1px solid #374151",borderRadius:6,color:"#9ca3af",padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>
              ↩ Recall
            </button>
          )}
          <span style={{color:"#4b5563",fontSize:12}}>{exp?"▲":"›"}</span>
        </div>
      </div>

      {/* ── Confirm dialog ── */}
      {confirmDialog&&(
        <div onClick={e=>e.stopPropagation()}
          style={{position:"fixed",inset:0,zIndex:1200,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {confirmDialog.missing.map((m,i)=>(

                        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{m.section}</div>

                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <>
                {/* Optional incomplete sections — vertical list with field counts */}
                {(()=>{
                  const optional = [];
                  const schedItems = (production.schedule||[]).length;
                  const schedTotal = 3; // time, task, notes per item
                  if(!schedItems) optional.push({label:"Production schedule", empty:"No items added yet", count:null});

                  const gearCount = (production.equipmentIds||[]).length + (production.mediaCardIds||[]).length + (production.externalGear||[]).length;
                  if(!gearCount) optional.push({label:"Gear", empty:"No gear selected", count:null});

                  const ig = production.ingest||{};
                  const ingestFields = [ig.datetime, ig.recurringOrOnce, ig.sessionCount].filter(Boolean).length;
                  const ingestTotal = ["Live Event","Live Broadcast","Hybrid Event","Pre-tape"].includes(production.type) ? 3 : 1;
                  if(ingestFields < ingestTotal) optional.push({label:"Media ingest", empty:\`\${ingestTotal - ingestFields} field\${ingestTotal-ingestFields!==1?"s":""} not filled in\`, count:ingestTotal-ingestFields});

                  const crewCount = (production.crewInternal||[]).length + (production.crewExternal||[]).length;
                  if(!crewCount) optional.push({label:"Crew", empty:"No crew assigned", count:null});

                  const delCount = (production.deliverables||[]).length;
                  if(!delCount) optional.push({label:"Deliverables", empty:"No deliverables added", count:null});

                  if(!optional.length) return null;
                  return (
                    <div style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                      <div style={{fontSize:11,fontWeight:800,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>
                        ℹ Incomplete sections — can be filled in later
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {optional.map((o,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"#111827",borderRadius:7}}>
                            <div style={{fontSize:13,color:"#e2e8f0",fontWeight:600}}>{o.label}</div>
                            <div style={{fontSize:11,color:"#9ca3af"}}>{o.empty}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                <div style={{fontSize:13,color:"#9ca3af",marginBottom:20}}>

                </div>
              </>

            {/* Buttons */}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setConfirmDialog(null)}

                {confirmDialog.missing.length>0?"Fix Issues":"Cancel"}
              </button>
              {confirmDialog.missing.length===0&&(
                <button onClick={()=>{setConfirmDialog(null);onSendForApproval();}}
                  style={{background:"#6366f1",border:"none",borderRadius:8,color:"#fff",padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif"}}>
                  Yes, Send for Approval →
                </button>
              )}
            </div>
          </div>
        </div>
      )}


      {/* ── Expanded body ── */}
      {exp&&(
        <div onClick={e=>e.stopPropagation()} style={{padding:"14px 18px",background:"#0d1117",borderTop:\`1px solid \${pColor}30\`,display:"flex",flexDirection:"column",gap:8}}>

          {/* ── Sections ── */}
          <>
                {(production.status==="Planning"||pendingApproval)&&(
                  <div style={{marginBottom:4}}>
                    {production.status==="Planning"&&production.rejectionNote&&(
                      <div style={{background:"#ef444415",border:"1px solid #ef444430",borderRadius:9,padding:"10px 14px",display:"flex",gap:8,alignItems:"flex-start"}}>
                        <span style={{fontSize:13,flexShrink:0}}>↩</span>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>Returned — Approval Denied</div>

                        </div>
                      </div>

                {/* 1. Core Info */}

                  open={sectOpen.details} onOpen={()=>setSectOpen(p=>({...p,details:true}))} onClose={()=>setSectOpen(p=>({...p,details:false}))}
                  summary={production.title||null}
                  summaryEmpty="No title — tap to fill in details">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <LW label="Title"><Inp value={production.title||""} onChange={e=>upd("title",e.target.value)} placeholder={\`\${production.type} title…\`}/></LW>
                    <LW label="Status">
                      {(()=>{
                        const needsGate=["Live Event","Live Broadcast","Hybrid Event","Pre-tape"].includes(production.type);

                          <div>
                            <Sel value={normalizeStage(production.status||"Planning")}

                              {PRODUCTION_STAGES.map(s=>(
                                <option key={s} style={{background:"#0d1117",color:missing.length>0&&s==="Completed"?"#4b5563":"#e2e8f0"}}

                          </div>

                    <LW label="Production Type">

                    </LW>
                    <LW label="Notes" style={{gridColumn:"1/-1"}}><Inp textarea value={production.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="Notes…" style={{minHeight:40}}/></LW>
                  </div>
                </SecPanel>

                {/* 2. Date & Time (shoot types only) */}
                {hasShoot&&(
                  <SecPanel icon="📅" label="Date & Time"

                    <LocationBookingPanel
                      production={{...production, _projectId:projectId}}
                      allProjects={allProjects||[]}
                      onUpdate={updated=>{const {_projectId:_,...rest}=updated; onUpdate({...productionRef.current,...rest});}}
                    />
                  </SecPanel>
                )}

                {/* 3. Feeds Into (Pre-tape only) */}
                {isPreTape&&(
                  <SecPanel icon="🔗" label="Feeds Into"
                    open={sectOpen.feedsInto} onOpen={()=>setSectOpen(p=>({...p,feedsInto:true}))} onClose={()=>setSectOpen(p=>({...p,feedsInto:false}))}
                    summary={feedsIntoProduction?\`\${feedsIntoProduction.title} (\${feedsIntoProduction.type})\`:null}
                    summaryEmpty="Not linked to a Live / Hybrid event">
                    <Sel value={production.feedsIntoId||""} onChange={e=>upd("feedsIntoId",e.target.value?Number(e.target.value):null)}>
                      <option value="">None — standalone pre-tape</option>
                      {liveTargets.map(p=><option key={p.id} value={p.id}>{p.title||p.type} ({p.type})</option>)}
                    </Sel>
                    {feedsIntoProduction&&(
                      <div style={{fontSize:12,color:"#8b5cf6",display:"flex",alignItems:"center",gap:6}}>
                        <span>📼 Will play during:</span><span style={{fontWeight:700}}>{feedsIntoProduction.title}</span>
                        <Chip label={feedsIntoProduction.type} color={PRODUCTION_COLOR[feedsIntoProduction.type]||"#6366f1"} xs/>
                      </div>
                    )}
                  </SecPanel>
                )}

                {/* 4. Playback Slot (Hybrid only) */}
                {isHybrid&&(
                  <SecPanel icon="📼" label="Pre-tape Playback Slot"
                    open={sectOpen.hybridPlayback} onOpen={()=>setSectOpen(p=>({...p,hybridPlayback:true}))} onClose={()=>setSectOpen(p=>({...p,hybridPlayback:false}))}
                    summary={playbackDel?playbackDel.title:null}
                    summaryEmpty="No playback deliverable assigned">

                    <Sel value={production.playbackDeliverableId||""} onChange={e=>upd("playbackDeliverableId",e.target.value?Number(e.target.value):null)}>

                      <div style={{background:"#f9731618",borderRadius:7,padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>

                        <Chip label="Required" color="#f97316" xs/>
                      </div>

                  </SecPanel>

                  <SecPanel icon="👥" label="Crew"

                    badge={(production.crewInternal||[]).length+(production.crewExternal||[]).length||null}
                    summary={(()=>{
                      const names=[...(production.crewInternal||[]).map(c=>team.find(m=>m.id===c.memberId)?.name).filter(Boolean),...(production.crewExternal||[]).map(c=>c.name).filter(Boolean)];

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
