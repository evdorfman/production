              Project Total
            </td>
            <td style={{...B_CELL,textAlign:"right",fontWeight:800,fontSize:14,color:"#e2e8f0",background:B_AUTO_BG}}>{totalBudget?BFMT(totalBudget):"—"}</td>
            <td style={{...B_CELL,textAlign:"right",fontWeight:800,fontSize:14,color:"#60a5fa",background:B_ACT_BG}}>{totalActual?BFMT(totalActual):"—"}</td>
            <td style={{...B_CELL,background:"#111827"}}/>
            <td style={{...B_CELL,textAlign:"right",fontWeight:800,fontSize:14,color:varColor(totalVariance),background:B_AUTO_BG}}>{totalVariance!=null?BFMT(totalVariance):"—"}</td>
            <td style={{...B_CELL,textAlign:"right",fontWeight:700,fontSize:12,color:varColor(totalVariance),background:B_AUTO_BG}}>{totalBudget&&totalActual?BPCT(totalBudget,totalActual):"—"}</td>
          </tr>
        </tbody>
      </table>

      <div style={{padding:"10px 16px 32px",fontSize:10,color:"#374151",fontFamily:"'Barlow Condensed',sans-serif"}}>
        ✦ auto-calculated &nbsp;·&nbsp; Budget = Qty × Days × Rate &nbsp;·&nbsp; Variance = Actual − Budget &nbsp;·&nbsp; 🟢 under budget &nbsp; 🔴 over budget
      </div>
    </div>
  );
};


const ChecklistPanel = ({project, team, activeTab, onClose}) => {

  useEffect(()=>{

    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[]);

  const VICTORIA_ID = 3;   // Victoria LaVilla — Lead Producer
  const DEAN_ID     = 20;  // Dean Mozian — Post PM
  const BRYAN_ID    = 21;  // Bryan Huth — Media Manager

  const deliverables   = project.deliverables || [];
  const ingestDates    = project.ingestDates  || [];
  const productions    = project.productions  || [];

  const hasProducer    = flat("Producer").length > 0;
  const hasPM          = flat("Project Manager").length > 0;
  const hasEditor      = flat("Editor").length > 0 || flat("Animator").length > 0;
  const hasPostPM      = flat("Post Production Manager").length > 0;
  const hasMediaMgr    = flat("Media Manager").length > 0;
  const hasDels        = deliverables.length > 0;
  const hasIngests     = allIngests.length > 0;

  // Status helpers
  const taskStatus = (checks) => {
    const total = checks.length;
    const done  = checks.filter(c=>c.done).length;
    if(done === 0)     return "Not Started";
    if(done === total) return "Complete";
    return "In Progress";
  };
  const STATUS_COLOR = {"Not Started":"#6b7280","In Progress":"#3b82f6","Pending Approval":"#f59e0b","New information required":"#f97316","Complete":"#10b981"};

  // Build tasks
  const TASKS = [
    {
      id:"team",
      label:"Main Team Assigned",
      defaultAssignee:"Victoria LaVilla",
      description:"Assign core team members to this campaign.",
      tabs:["overview","production","deliverables","ingest","closeout"],
      checks:[
        {label:"Producer assigned",                  done:hasProducer},
        {label:"Project Manager assigned",           done:hasPM},
        {label:"Editor assigned",                    done:!hasDels||hasEditor, optional:!hasDels, optionalReason:"(required if deliverables exist)"},
        {label:"Post Production Manager assigned",   done:!hasDels||hasPostPM, optional:!hasDels, optionalReason:"(required if deliverables exist)"},
        {label:"Media Manager assigned",             done:!hasIngests||hasMediaMgr, optional:!hasIngests, optionalReason:"(required if ingests exist)"},
      ],
    },
    {
      id:"info",
      label:"Project Information",
      defaultAssignee:"Producer",
      description:"Fill in core project details.",
      tabs:["overview"],
      checks:[
        {label:"Status set",          done:!!project.status&&project.status!=="Pre-Pro"},
        {label:"Workstream set",      done:!!project.workstream},
        {label:"Final deadline set",  done:!!project.deadline},
        {label:"Keywords added",      done:(project.keywords||[]).length>0},
        {label:"Project brief",       done:!!project.briefNotes},
        {label:"AI summary",          done:!!project.briefSummary, optional:true, optionalReason:"(optional)"},
      ],
    },
    {
      id:"budget",
      label:"Budget Status",
      defaultAssignee:"Project Manager",
      description:"Budget information for this campaign.",
      tabs:["budget"],
      checks:[
        {label:"Budget placeholder — TBD", done:false, optional:true, optionalReason:"(budget tab coming soon)"},
      ],
    },
    {
      id:"production",
      label:"Productions Scheduled",
      defaultAssignee:"Producer",
      description:"At least one production must be approved.",
      tabs:["production"],
      checks:[
        {label:"At least 1 production added",     done:productions.length>0},
        {label:"At least 1 production approved",  done:productions.some(p=>["Approved","Completed","Happening Now","Production Wrapped"].includes(p.status))},
        {label:"No productions in Planning pending >7d", done:!productions.some(p=>{if(p.status!=="Planning"||!p.startTime)return false;const d=new Date(p.startTime);const n=new Date();return(d-n)<7*24*3600000;})},
      ],
    },
    {
      id:"ingest",
      label:"Media Ingest Ready",
      defaultAssignee:"Bryan Huth",
      description:"Ingest dates and details for all shoots.",
      tabs:["ingest","production"],
      checks:[
        {label:"Ingest dates scheduled",          done:allIngests.length>0},
        {label:"All ingests have notes",          done:allIngests.length===0||allIngests.every(ig=>ig.notes&&ig.notes.trim())},
      ],
    },
  ];

  // Filter tasks by tab
  const visibleTasks = TASKS.filter(t=>!activeTab||t.tabs.includes(activeTab));

  const allComplete = visibleTasks.length>0 && visibleTasks.every(t=>{
    const requiredChecks = t.checks.filter(c=>!c.optional);
    return requiredChecks.every(c=>c.done);
  });
  const completedCount = visibleTasks.filter(t=>{
    const req=t.checks.filter(c=>!c.optional);
    return req.length>0 && req.every(c=>c.done);
  }).length;

  return (
    <>
      <div onClick={e=>e.stopPropagation()} style={{
        position:"fixed",top:0,right:0,bottom:0,width:380,zIndex:1100,
        background:"#0d1117",borderLeft:"1px solid #1f2937",
        boxShadow:"-16px 0 48px rgba(0,0,0,0.6)",

        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid #1f2937",background:"#111827",flexShrink:0}}>

          </div>
          {/* Overall progress */}
          <div style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",display:"flex",gap:10,alignItems:"center"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:"#6b7280"}}>Overall</span>
                <span style={{fontSize:11,fontWeight:700,color:allComplete?"#10b981":"#9ca3af"}}>{completedCount}/{visibleTasks.length} tasks complete</span>
              </div>
              <div style={{height:4,background:"#1f2937",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",background:allComplete?"#10b981":"#6366f1",borderRadius:99,width:\`\${visibleTasks.length?completedCount/visibleTasks.length*100:0}%\`,transition:"width 0.3s ease"}}/>
              </div>
            </div>
          </div>
          {activeTab&&<div style={{fontSize:10,color:"#4b5563",marginTop:6,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.08em"}}>Showing tasks for: {activeTab}</div>}
        </div>

        {/* Tasks */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
          {visibleTasks.map(task=>{
            const requiredChecks = task.checks.filter(c=>!c.optional);
            const doneCt = requiredChecks.filter(c=>c.done).length;
            const status = taskStatus(requiredChecks);
            const sc = STATUS_COLOR[status]||"#6b7280";
            const pct = requiredChecks.length ? doneCt/requiredChecks.length*100 : 0;
            return (
              <div key={task.id} style={{background:"#111827",border:\`1px solid \${sc}30\`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
                {/* Task header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:800,color:"#f1f5f9",marginBottom:2}}>{task.label}</div>
                    <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>Default: {task.defaultAssignee}</div>
                  </div>
                  <Chip label={status} color={sc} xs/>
                </div>
                {/* Progress bar */}
                <div style={{height:3,background:"#1f2937",borderRadius:99,overflow:"hidden",marginBottom:8}}>
                  <div style={{height:"100%",background:sc,borderRadius:99,width:\`\${pct}%\`,transition:"width 0.3s ease"}}/>
                </div>
                {/* Checks */}
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {task.checks.map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:7,opacity:c.optional?0.6:1}}>
                      <div style={{width:14,height:14,borderRadius:"50%",border:\`2px solid \${c.done?"#10b981":"#374151"}\`,background:c.done?"#10b981":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {c.done&&<span style={{color:"#fff",fontSize:9,fontWeight:900,lineHeight:1}}>✓</span>}
                      </div>
                      <span style={{fontSize:12,color:c.done?"#9ca3af":"#e2e8f0",textDecoration:c.done?"line-through":"none"}}>{c.label}</span>
                      {c.optional&&<span style={{fontSize:9,color:"#4b5563",fontStyle:"italic"}}>{c.optionalReason}</span>}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div style={{padding:"10px 20px",borderTop:"1px solid #1f2937",background:"#111827",flexShrink:0}}>
          <div style={{fontSize:10,color:"#4b5563",textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.08em"}}>Press Esc or click ✓ Checklist to close</div>
        </div>
      </div>
    </>
  );
};

                    return (
                      <div key={d.id} onClick={()=>{setActiveTab("deliverables");setActiveDelModal(d.id);}}
                        style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"#0f172a",border:\`1px solid \${changes?"#ef444430":inRev?"#f59e0b20":"#1f2937"}\`,borderRadius:10,cursor:"pointer"}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor=changes?"#ef4444":"#374151"}
                        onMouseLeave={e=>e.currentTarget.style.borderColor=changes?"#ef444430":inRev?"#f59e0b20":"#1f2937"}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:DCOLOR[d.status],flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                            <span style={{fontWeight:700,fontSize:17,color:"#f1f5f9"}}>{d.title}</span>
                            {/* Quick status dropdown — stops card click propagation */}
                          <select value={d.status} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onUpdateDel(project.id,d.id,"status",e.target.value);}}
                            style={{background:DCOLOR[d.status]+"18",border:\`1px solid \${DCOLOR[d.status]}40\`,borderRadius:6,color:DCOLOR[d.status],padding:"3px 7px",fontSize:12,fontWeight:700,cursor:"pointer",outline:"none"}}>
                            {DELIVERABLE_STATUSES.map(s=><option key={s} style={{background:"#0d1117",color:"#e2e8f0"}}>{s}</option>)}
                          </select>
                          {d.aspectRatio&&<Chip label={d.aspectRatio} color="#374151" xs/>}
                          {d.srtNeeded&&<Chip label="SRT" color="#06b6d4" xs/>}
                          {allAppr&&<Chip label="✓ Approved" color="#10b981" xs/>}
                          {changes&&<Chip label="↩" color="#ef4444" xs/>}
                        </div>
                          <div style={{display:"flex",gap:10,alignItems:"center",fontSize:14,color:"#6b7280",flexWrap:"wrap"}}>
                            {ed&&<span style={{display:"flex",alignItems:"center",gap:4}}><Av name={ed.name} size={14}/>{ed.name}</span>}
                            <span>Due {fmtDT(d.deadline)}</span>
                            {activeR&&!allAppr&&<span style={{color:RCOLOR[activeR.status]}}>● {activeR.label}: {activeR.status}</span>}
                            <span style={{color:"#374151"}}>{d.rounds.length} round{d.rounds.length!==1?"s":""}</span>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:3,flexShrink:0}}>
                          {d.rounds.map((r,i)=>(
                            <div key={i} title={\`\${r.label}: \${r.status}\`} style={{width:20,height:20,borderRadius:"50%",background:RCOLOR[r.status]+"30",border:\`2px solid \${RCOLOR[r.status]}\`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:RCOLOR[r.status]}}>{i+1}</div>
                          ))}
                        </div>
                        <Dl date={d.deadline}/>
                        <span style={{fontSize:14,color:"#4b5563"}}>›</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* ── DELIVERABLES TAB ── */}
          {activeTab==="deliverables"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {/* ── Add New Deliverable — hidden by default ── */}
              {showAddDel&&<div style={{background:"#0f172a",border:"1px solid #374151",borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#4b5563",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:10}}>New Deliverable</div>
                {/* Title + Add button on same row */}
                <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-end"}}>
                  <LW label="Title" style={{flex:1}}>
                    <Inp value={newDelTitle} onChange={e=>setNewDelTitle(e.target.value)} placeholder="Deliverable title…" onKeyDown={e=>e.key==="Enter"&&newDelTitle.trim()&&addDel()}/>
                  </LW>
                  <Btn onClick={addDel} disabled={!newDelTitle.trim()} style={{flexShrink:0,marginBottom:1}}>+ Add</Btn>
                </div>
                {/* Additional fields */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  <LW label="Aspect Ratio">
                    <Sel value={newDelAR} onChange={e=>setNewDelAR(e.target.value)}>
                      {ASPECT_RATIOS.map(r=><option key={r}>{r}</option>)}
                    </Sel>
                  </LW>
                  <LW label="Final Deadline" style={{gridColumn:"2/4"}}>
                    <DateTimePicker value={newDelDeadline} onChange={v=>setNewDelDeadline(v)} label="Set deadline"/>
                  </LW>
                  <LW label="Editor / Animator" style={{gridColumn:"1/-1"}}>
                    <EditorPicker value={newDelEditor} onChange={v=>setNewDelEditor(v)} deadline={newDelDeadline} allProjects={allProjects} team={team}/>
                  </LW>
                </div>
              </div>}

              {/* Add button + count header */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <Btn small onClick={()=>setShowAddDel(s=>!s)} style={{flexShrink:0}}>
                  {showAddDel?"✕ Cancel":"+ Add Deliverable"}
                </Btn>
                <div style={{fontSize:13,color:"#4b5563"}}>{lp.deliverables.length} deliverable{lp.deliverables.length!==1?"s":""}</div>
              </div>
              {lp.deliverables.length===0&&!showAddDel&&<div style={{textAlign:"center",color:"#374151",padding:"24px 0",fontSize:16}}>No deliverables yet — click "+ Add Deliverable" to create one.</div>}

              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {lp.deliverables.map(d=>{
                  const ed=team.find(m=>m.id===d.editorId);
                  const changes=d.rounds.some(r=>r.status==="Changes Requested");
                  const allAppr=d.rounds.length>0&&d.rounds.every(r=>r.status==="Approved");
                  const isExpanded = activeDelModal===d.id;
                  return (
                    <div key={d.id}>
                    <div onClick={()=>setActiveDelModal(isExpanded?null:d.id)}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:isExpanded?"#1f2937":"#111827",border:\`1px solid \${isExpanded?"#6366f1":changes?"#ef444430":"#1f2937"}\`,borderRadius:isExpanded?"10px 10px 0 0":10,cursor:"pointer"}}
                      onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.borderColor=changes?"#ef4444":"#374151";}}
                      onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.borderColor=changes?"#ef444430":"#1f2937";}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:DCOLOR[d.status],flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        {/* Row 1: title + status chips */}
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2,flexWrap:"wrap"}}>
                          <span style={{fontWeight:700,fontSize:17,color:"#f1f5f9"}}>{d.title}</span>
                          <Chip label={d.status} color={DCOLOR[d.status]} xs/>
                          {d._fromPreset&&<Chip label="Internal Planning" color="#8b5cf6" xs/>}
                          {d.aspectRatio&&<Chip label={d.aspectRatio} color="#374151" xs/>}
                          {d.srtNeeded&&<Chip label="SRT" color="#06b6d4" xs/>}
                          {d.captionsNeeded&&<Chip label="Captions" color="#a855f7" xs/>}
                          {allAppr&&<Chip label="✓ Approved" color="#10b981" xs/>}
                          {changes&&<Chip label="↩ Changes" color="#ef4444" xs/>}
                        </div>
                        {/* Row 2: active round due date — directly under title */}
                        {(()=>{
                          const activeR=d.rounds.find(r=>r.status!=="Approved");
                          if(!activeR||!activeR.deadline) return null;
                          return (
                            <div style={{fontSize:12,fontWeight:600,color:RCOLOR[activeR.status],marginBottom:2}}>
                              {activeR.label} due {fmtDT(activeR.deadline)}
                              <span style={{marginLeft:6}}><Dl date={activeR.deadline} inline/></span>
                            </div>
                          );
                        })()}
                        {/* Row 3: editor */}
                        {ed&&<div style={{fontSize:12,color:"#6b7280"}}>{ed.name}</div>}
                      </div>
                      {/* Right side: round circles + overall due date + days remaining */}
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                        <div style={{display:"flex",gap:3}}>
                          {d.rounds.map((r,i)=>(
                            <div key={i} title={\`\${r.label}: \${r.status}\`} style={{width:20,height:20,borderRadius:"50%",background:RCOLOR[r.status]+"30",border:\`2px solid \${RCOLOR[r.status]}\`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:RCOLOR[r.status]}}>{i+1}</div>
                          ))}
                        </div>
                        {d.deadline&&(
                          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}>
                            <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.08em"}}>Final Due</div>
                            <div style={{fontSize:12,color:"#9ca3af",fontWeight:600}}>{fmtDate(d.deadline)}</div>
                            <Dl date={d.deadline}/>
                          </div>
                        )}
                      </div>
                      {/* Frame.io quick access */}
                      {d.frameLink&&(
                        <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}} onClick={e=>e.stopPropagation()}>
                          {d.framePW&&<span style={{fontSize:11,color:"#4b5563",fontFamily:"monospace"}}>🔒</span>}
                          <a href={d.frameLink} target="_blank" rel="noopener noreferrer"
                            style={{background:"#6366f120",border:"1px solid #6366f140",borderRadius:5,padding:"3px 8px",fontSize:12,color:"#818cf8",textDecoration:"none",fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
                            Frame.io ↗
                          </a>
                          {d.framePW&&(
                            <button onClick={()=>{navigator.clipboard.writeText(d.framePW);}}
                              title={\`Copy PW: \${d.framePW}\`}
                              style={{background:"#374151",border:"none",borderRadius:5,padding:"3px 8px",fontSize:11,color:"#9ca3af",cursor:"pointer",fontWeight:600}}>
                              📋 PW
                            </button>
                          )}
                        </div>
                      )}
                      <span style={{fontSize:14,color:isExpanded?"#6366f1":"#4b5563"}}>{isExpanded?"▲":"›"}</span>
                    </div>
                    {isExpanded&&currentDelData&&currentDelData.id===d.id&&(
                      <div style={{border:"1px solid #6366f1",borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
                        <DeliverableDetailModal
                          del={currentDelData} projectId={project.id} team={team} allProjects={allProjects}
                          project={lp} onUpdateDel={onUpdateDel} onDeleteDel={onDeleteDel}
                          onClose={()=>setActiveDelModal(null)}/>
                      </div>
                    )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── BUDGET TAB (placeholder) ── */}
          {activeTab==="budget"&&(
            <BudgetTab project={lp} onUpdateProject={onUpdateProject}/>
          )}

          {/* ── PRODUCTION TAB ── */}
          {activeTab==="production"&&(
            <ProductionSection
              productions={lp.productions||[]}
              projectDeliverables={lp.deliverables||[]}
              team={team}
              studioBookings={studioBookings}
              mediaCards={mediaCards}
              allProjects={allProjects||[]}
              projectId={project.id}
              projectAssignees={lp.assignees||{}}
              onUpdate={prods=>onUpdateProject(project.id,"productions",prods)}
              onAddToMainDels={del=>onAddDel(project.id,del)}
              onAddIngestDate={entry=>onUpdateProject(project.id,"ingestDates",[...(lp.ingestDates||[]),entry])}
            />
          )}

          {/* ── MEDIA INGEST TAB ── */}
          {activeTab==="ingest"&&(
            <IngestTabContent lp={lp} team={team} addIngest={addIngest} delIngest={delIngest} updIngest={updIngest}
              onUpdateMamLink={v=>onUpdateProject(project.id,"mamProjectLink",v)}/>
          )}

          {/* ── CLOSE OUT TAB ── */}
          {activeTab==="closeout"&&(()=>{
            const validateCompletes = (dels) => {
              const issues = [];
              dels.forEach(d=>{
                const dIssues = [];
                if(!d.frameLink)             dIssues.push("Frame.io link");
                if(!d.framePW)               dIssues.push("Frame.io password");
                if(d.status!=="Delivered")   dIssues.push("Status must be Delivered");
                if(!d.deliverableType)       dIssues.push("Deliverable type");
                if(!d.aspectRatio)           dIssues.push("Aspect ratio");
                if(!d.quality)               dIssues.push("Quality");
                if(d.totalRevisions==null||d.totalRevisions==="") dIssues.push("Total revisions");
                if(!d.workstream)            dIssues.push("Workstream");
                if(!d.businessUnit)          dIssues.push("Business unit");
                if(!d.editorId)              dIssues.push("Editor assigned");
                if(!d.producerId)            dIssues.push("Producer assigned");
                if(!d.frameInternalUrl)      dIssues.push("Frame internal URL");
                if(!d.videoLength)           dIssues.push("Video length");
                if(!d.filePath)              dIssues.push("File path");
                if(!(d.distPlatforms||[]).length) dIssues.push("Distribution platform (at least 1)");
                if(!(d.approvedUses||[]).length)  dIssues.push("Approved uses (at least 1)");
                if(d.containsAI&&!(d.aiTools||[]).length) dIssues.push("AI tools (toggle is on)");
                if(d.srtDelivered&&!d.srtFrameUrl) dIssues.push("SRT Frame URL (toggle is on)");
                if(dIssues.length>0) issues.push({title:d.title,fields:dIssues});
              });
              return issues;
            };

            const handleCompletesToggle = (v) => {
              if(!v) { onUpdateProject(project.id,"addedToCompletes",false); setValidationErrors(null); return; }
              const errors = validateCompletes(lp.deliverables);
              if(errors.length>0) { setValidationErrors(errors); return; }
              setValidationErrors(null);
              onUpdateProject(project.id,"addedToCompletes",true);
            };

            return (
              <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:600}}>
                <div style={{fontSize:15,color:"#9ca3af",marginBottom:4}}>Wrap up the project and keep records for future reference.</div>

                <div style={card}>
                  <SH label="Completes Tracker"/>
                  <Toggle
                    label="Mark as added to Completes Tracker"
                    value={!!lp.addedToCompletes}
                    onChange={handleCompletesToggle}/>
                  {lp.addedToCompletes&&<div style={{fontSize:14,color:"#10b981",marginTop:8,fontWeight:600}}>✓ Added to Completes Tracker</div>}

                  {/* Validation errors */}
                  {validationErrors&&validationErrors.length>0&&(
                    <div style={{marginTop:12,background:"#ef444410",border:"1px solid #ef444440",borderRadius:10,padding:"14px 16px"}}>
                      <div style={{fontSize:14,fontWeight:800,color:"#ef4444",marginBottom:10}}>
                        ⚠ {validationErrors.length} deliverable{validationErrors.length!==1?"s":""} need{validationErrors.length===1?"s":""} info before adding to Completes
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {validationErrors.map((e,i)=>(
                          <div key={i} style={{background:"#0f172a",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>
                              {e.title}
                            </div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                              {e.fields.map(f=>(
                                <span key={f} style={{background:"#ef444420",color:"#ef4444",border:"1px solid #ef444440",
                                  borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600}}>
                                  {f}
                                </span>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={()=>{setActiveTab("deliverables");setValidationErrors(null);}}
                        style={{marginTop:10,background:"none",border:"1px solid #6366f1",borderRadius:7,
                          color:"#818cf8",padding:"6px 16px",fontSize:13,cursor:"pointer",fontWeight:700,
                          fontFamily:"'Barlow Condensed',sans-serif"}}>
                        Go to Deliverables tab →
                      </button>
                    </div>
                  )}
                </div>

                <div style={card}>
                  <SH label="Project Status"/>
                  {!lp.closedAt?(
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{fontSize:14,color:"#9ca3af"}}>Closing the project marks it as inactive. It can be revived at any time.</div>
                      <Btn variant="danger" onClick={()=>{
                        onUpdateProject(project.id,"closedAt",new Date().toISOString());
                        onUpdateProject(project.id,"status","Delivered");
                      }}>Close Out Project</Btn>
                    </div>
                  ):(
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{fontSize:14,color:"#6b7280"}}>Closed: <span style={{color:"#9ca3af"}}>{fmtDT(lp.closedAt)}</span></div>
                      <Btn style={{background:"#10b98118",color:"#10b981",border:"1px solid #10b98130"}} onClick={()=>{
                        onUpdateProject(project.id,"closedAt",null);
                        onUpdateProject(project.id,"status","In Production");
                      }}>Revive Project → Make Active</Btn>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>

        {/* ── Prominent bottom close bar ── */}
        <div style={{borderTop:"1px solid #1f2937",padding:"14px 28px",background:"#0d1117",display:"flex",justifyContent:"flex-end",flexShrink:0}}>
          <button onClick={onClose} style={{background:"#1f2937",border:"1px solid #374151",borderRadius:9,color:"#e2e8f0",padding:"10px 32px",cursor:"pointer",fontSize:17,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em"}}>✕ Close Project</button>
        </div>
      </div>
    </Modal>
    {checklistOpen&&<ChecklistPanel project={lp} team={team} activeTab={activeTab} onClose={()=>setChecklistOpen(false)}/>}
    </>
  );
};

// ─── Add Project Modal ────────────────────────────────────────────────────────
const AddProjectModal = ({team,onClose,onAdd}) => {
  const [name,setName]=useState("");
  const [requester,setRequester]=useState("");
  const [status,setStatus]=useState("Pre-Pro");
  const [deadline,setDeadline]=useState("");
  const [workstream,setWorkstream]=useState("Content Studio");
  const [businessUnit,setBU]=useState("MKT");
  const [briefNotes,setBriefNotes]=useState("");
  const [brief,setBrief]=useState(null);
  const [assignees,setAssignees]=useState({});
  const [deliverables,setDelivs]=useState([]);
  const [showDelivs,setShowDelivs]=useState(false);
  const [ingestDates,setIngest]=useState([]);
  const briefRef=useRef();

  const toggleA=(role,id)=>setAssignees(a=>({...a,[role]:a[role]?.includes(id)?a[role].filter(x=>x!==id):[...(a[role]||[]),id]}));
  const updDel=(i,k,v)=>setDelivs(ds=>ds.map((d,idx)=>idx!==i?d:{...d,[k]:v}));
  const addIngest=()=>setIngest(ig=>[...ig,{id:uid(),datetime:"",notes:"",callSheet:null}]);
  const updIngest=(iid,k,v)=>setIngest(ig=>ig.map(i=>i.id!==iid?i:{...i,[k]:v}));
  const delIngest=iid=>setIngest(ig=>ig.filter(i=>i.id!==iid));

  const handleCreate=() => {
    if(!name.trim()) { alert("Please enter a project name."); return; }
    if(!deadline)    { alert("Please set a final deadline."); return; }
    const dels=deliverables.filter(d=>d.title.trim()).map(d=>
      mkDel(d.title.trim(),d.editorId,d.deadline||null,"Not Started",[],{aspectRatio:d.aspectRatio,srtNeeded:d.srtNeeded,captionsNeeded:d.captionsNeeded,notes:d.notes})
    );
    onAdd({id:Date.now(),name:name.trim(),requester,status,deadline,workstream,businessUnit,assignees,deliverables:dels,projectBrief:brief,briefNotes,ingestDates});
    onClose();
  };

  const LBL={fontSize:12,fontWeight:800,color:"#4b5563",letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:5,display:"block"};

  return (
    <Modal onClose={onClose} wide>
      <div style={{paddingBottom:8}}>
        <h2 style={{fontSize:26,fontWeight:900,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:20}}>New Project</h2>

        {/* Core */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div style={{gridColumn:"1/-1"}}><span style={LBL}>Project Name *</span><Inp value={name} onChange={e=>setName(e.target.value)} placeholder="Project name..."/></div>
          <div><span style={LBL}>Requester</span><Inp value={requester} onChange={e=>setRequester(e.target.value)} placeholder="Who requested this..."/></div>
          <div><span style={LBL}>Status</span><Sel value={status} onChange={e=>setStatus(e.target.value)}>{PROJECT_STATUSES.map(s=><option key={s}>{s}</option>)}</Sel></div>
          <div><span style={LBL}>Work Stream</span><Sel value={workstream} onChange={e=>setWorkstream(e.target.value)}>{WORKSTREAMS.map(s=><option key={s}>{s}</option>)}</Sel></div>
          <div><span style={LBL}>Business Unit</span><Sel value={businessUnit} onChange={e=>setBU(e.target.value)}>{BUSINESS_UNITS.map(s=><option key={s}>{s}</option>)}</Sel></div>
          <div style={{gridColumn:"1/-1"}}><span style={LBL}>Final Deadline *</span><DateTimePicker value={deadline} onChange={v=>setDeadline(v)} label="Set project deadline"/></div>
        </div>

        {/* Brief */}
        <div style={{marginBottom:16}}>
          <span style={LBL}>Project Brief</span>
          <input ref={briefRef} type="file" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)setBrief({name:f.name,size:f.size,attachedAt:new Date().toISOString()});e.target.value="";}}/>
          {brief?(
            <div style={{display:"flex",alignItems:"center",gap:8,background:"#0f172a",border:"1px solid #1f2937",borderRadius:7,padding:"7px 10px",marginBottom:6}}>
              <span style={{fontSize:14,color:"#10b981"}}>📎</span>
              <span style={{fontSize:13,color:"#e2e8f0",flex:1}}>{brief.name}</span>
              <button onClick={()=>setBrief(null)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:17}}>×</button>
            </div>
          ):(
            <button onClick={()=>briefRef.current.click()} style={{background:"#0f172a",border:"1px dashed #374151",borderRadius:7,color:"#6b7280",padding:"7px 12px",fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",marginBottom:6}}>+ Attach Brief</button>
          )}
          <Inp textarea value={briefNotes} onChange={e=>setBriefNotes(e.target.value)} placeholder="Brief notes or link..." style={{minHeight:50}}/>
        </div>

        {/* Team */}
        <div style={{marginBottom:16}}>
          <span style={LBL}>Team</span>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {[
              {label:"Producers & Managers", filter:m=>m.roles.some(r=>["Producer","Executive Producer","Project Manager","Post Production Manager"].includes(r))},
              {label:"Editors & Post",        filter:m=>m.roles.some(r=>["Editor","Animator","Designer","Head of Post Production","Colorist","Audio Mixer"].includes(r))},
              {label:"Production Crew",       filter:m=>m.roles.some(r=>["DP","Camera Op","Gaffer","Media Manager"].includes(r))},
              {label:"Broadcast",             filter:m=>m.department==="Broadcast"},
            ].map(grp=>{
              const members=team.filter(grp.filter);
              if(!members.length) return null;
              const DEPT_COLORS={"Producers & Managers":"#3b82f6","Editors & Post":"#8b5cf6","Production Crew":"#06b6d4","Broadcast":"#ef4444"};
              const gc=DEPT_COLORS[grp.label]||"#6b7280";
              const selCount=members.filter(m=>Object.values(assignees).flat().includes(m.id)).length;
              return (
                <div key={grp.label}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                    <div style={{width:3,height:14,borderRadius:99,background:gc,flexShrink:0}}/>
                    <div style={{fontSize:10,color:gc,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",textTransform:"uppercase"}}>{grp.label}</div>
                    {selCount>0&&<Chip label={\`\${selCount} selected\`} color={gc} xs/>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {members.map(m=>{
                      const role=m.roles[0];
                      const sel=Object.values(assignees).flat().includes(m.id)||Object.entries(assignees).some(([r,ids])=>ids.includes(m.id));
                      const selRole=Object.entries(assignees).find(([r,ids])=>ids.includes(m.id))?.[0]||role;
                      return (
                        <button key={m.id} onClick={()=>toggleA(role,m.id)}
                          style={{display:"flex",alignItems:"center",gap:5,background:sel?gc+"20":"#0f172a",border:\`1px solid \${sel?gc:"#1f2937"}\`,borderRadius:6,padding:"4px 9px",cursor:"pointer"}}>
                          <Av name={m.name} size={18}/>
                          <span style={{fontSize:13,color:sel?"#e2e8f0":"#6b7280",fontWeight:600}}>{m.name}</span>
                          <Dot on={m.available}/>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Media Ingest */}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={LBL}>Media Ingest Dates</span>
            <Btn small onClick={addIngest}>+ Add</Btn>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ingestDates.map((ig,i)=>(
              <div key={ig.id} style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#6b7280"}}>Ingest #{i+1}</span>
                  <button onClick={()=>delIngest(ig.id)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:17}}>×</button>
                </div>
                <DateTimePicker value={ig.datetime||""} onChange={v=>updIngest(ig.id,"datetime",v)} label="Expected arrival time"/>
                <Inp value={ig.notes||""} onChange={e=>updIngest(ig.id,"notes",e.target.value)} placeholder="Notes (media type, source...)"/>
              </div>
            ))}
          </div>
        </div>

        {/* Deliverables — collapsed by default */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={LBL}>Deliverables {deliverables.length>0&&\`(\${deliverables.length})\`}</span>
            <div style={{display:"flex",gap:6}}>
              {showDelivs&&<Btn small onClick={()=>setDelivs(d=>[...d,{id:d.length,title:"",deadline:"",aspectRatio:"16:9",editorId:null,srtNeeded:false,captionsNeeded:false,notes:""}])}>+ Add</Btn>}
              <Btn small variant="ghost" onClick={()=>setShowDelivs(s=>!s)}>{showDelivs?"▲ Collapse":"▼ Add Deliverables"}</Btn>
            </div>
          </div>
          {!showDelivs&&deliverables.length===0&&(
            <div style={{background:"#0f172a",border:"1px dashed #374151",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#4b5563",textAlign:"center"}}>
              Click "Add Deliverables" to add deliverables to this project.
            </div>
          )}
          {!showDelivs&&deliverables.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {deliverables.map(d=><Chip key={d.id} label={d.title||"Untitled"} color="#6b7280" xs/>)}
            </div>
          )}
          {showDelivs&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {deliverables.map((d,i)=>(
                <div key={d.id} style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:9,padding:"12px"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
                    <Inp value={d.title} onChange={e=>updDel(i,"title",e.target.value)} placeholder={\`Deliverable \${i+1} title...\`} style={{flex:1}}/>
                    <Sel value={d.aspectRatio} onChange={e=>updDel(i,"aspectRatio",e.target.value)} style={{width:"auto",flexShrink:0}}>
                      {ASPECT_RATIOS.map(r=><option key={r}>{r}</option>)}
                    </Sel>
                    <button onClick={()=>setDelivs(ds=>ds.filter((_,idx)=>idx!==i))} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:22,lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <LW label="Deadline"><DateTimePicker value={d.deadline} onChange={v=>updDel(i,"deadline",v)} label="Set deadline"/></LW>
                    <LW label="Editor / Animator">
                      <EditorPicker value={d.editorId} onChange={v=>updDel(i,"editorId",v)} deadline={d.deadline} allProjects={[]} team={team}/>
                    </LW>
                  </div>
                  <div style={{display:"flex",gap:16}}>
                    <Toggle label="SRT" value={d.srtNeeded} onChange={v=>updDel(i,"srtNeeded",v)}/>
                    <Toggle label="Captions" value={d.captionsNeeded} onChange={v=>updDel(i,"captionsNeeded",v)}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{display:"flex",gap:10,paddingTop:4}}>
          <Btn onClick={handleCreate}>Create Project</Btn>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        </div>
      </div>
    </Modal>
  );
};

// ─── Projects View (grouped, filterable) ──────────────────────────────────────
const ACTIVE_STAGES = [
  {key:"Ideation",     statuses:["Ideation"],       color:"#a78bfa"},
  {key:"Pre-Pro",      statuses:["Pre-Pro"],         color:"#f59e0b"},
  {key:"In Production",statuses:["In Production"],   color:"#3b82f6"},
  {key:"Post",         statuses:["Post"],            color:"#8b5cf6"},
  {key:"On Hold",      statuses:["On Hold"],         color:"#6b7280"},
];

const ProjectsView = ({projects, team, onOpenProject, onUpdateProject}) => {
  const [search,setSearch]       = useState("");
  const [fsWS,setFsWS]           = useState("All");
  const [fsBU,setFsBU]           = useState("All");
  const [fsYear,setFsYear]       = useState("All");
  const [fsProducer,setFsProducer]= useState("All");
  const [fsEditor,setFsEditor]   = useState("All");
  const [fsStatus,setFsStatus]   = useState("All");
  const [showInactive,setShowInactive] = useState(false);
  const [groupMode,setGroupMode] = useState("stage"); // stage | producer | editor

  const producers = team.filter(m=>m.roles.some(r=>["Producer","Project Manager"].includes(r)));
  const editors   = team.filter(m=>m.roles.some(r=>["Editor","Animator","Designer"].includes(r)));
  const years = [...new Set(projects.map(p=>p.year||new Date(p.deadline||Date.now()).getFullYear()))].sort((a,b)=>b-a);

  const filtered = useMemo(()=>projects.filter(p=>{
    const q = search.toLowerCase();
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.requester||"").toLowerCase().includes(q) || (p.keywords||[]).some(k=>k.includes(q));
    const matchWS = fsWS==="All" || p.workstream===fsWS;
    const matchBU = fsBU==="All" || p.businessUnit===fsBU;
    const matchY  = fsYear==="All" || (p.year||new Date(p.deadline||Date.now()).getFullYear())===Number(fsYear);
    const matchP  = fsProducer==="All" ||
      (p.assignees?.Producer||[]).includes(Number(fsProducer)) ||
      (p.assignees?.["Project Manager"]||[]).includes(Number(fsProducer));
    const matchE  = fsEditor==="All" ||
      p.deliverables.some(d=>d.editorId===Number(fsEditor)||d.animatorId===Number(fsEditor));
    const matchSt = fsStatus==="All" || p.status===fsStatus;
    return matchQ && matchWS && matchBU && matchY && matchP && matchE && matchSt;
  }),[projects,search,fsWS,fsBU,fsYear,fsProducer,fsStatus]);

  const active   = filtered.filter(p=>["Ideation","Pre-Pro","In Production","Post"].includes(p.status) && !p.closedAt);
  const onHold   = filtered.filter(p=>p.status==="On Hold" && !p.closedAt);
  const inactive = filtered.filter(p=>["Delivered","Canceled"].includes(p.status) || p.closedAt);

  const selStyle = {background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"7px 11px",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"};

  return (
    <div>
      {/* Filter bar */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, requester, keyword…"
          style={{...selStyle,flex:"1 1 200px",minWidth:180}}/>
        <select value={fsStatus} onChange={e=>setFsStatus(e.target.value)} style={selStyle}>
          <option value="All">All Statuses</option>
          {PROJECT_STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={fsWS} onChange={e=>setFsWS(e.target.value)} style={selStyle}>
          <option value="All">All Workstreams</option>
          {WORKSTREAMS.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={fsBU} onChange={e=>setFsBU(e.target.value)} style={selStyle}>
          <option value="All">All BUs</option>
          {BUSINESS_UNITS.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={fsYear} onChange={e=>setFsYear(e.target.value)} style={selStyle}>
          <option value="All">All Years</option>
          {years.map(y=><option key={y}>{y}</option>)}
        </select>
        <select value={fsProducer} onChange={e=>setFsProducer(e.target.value)} style={selStyle}>
          <option value="All">All Producers</option>
          {producers.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={fsEditor} onChange={e=>setFsEditor(e.target.value)} style={selStyle}>
          <option value="All">All Editors</option>
          {editors.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
        </select>
      </div>

      {/* Group by toggle */}
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:13,color:"#6b7280",fontWeight:600}}>Group by:</span>
        {[["stage","Stage"],["producer","Producer"],["editor","Editor"]].map(([mode,label])=>(
          <button key={mode} onClick={()=>setGroupMode(mode)}
            style={{padding:"5px 14px",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer",border:"none",
              background:groupMode===mode?"#6366f1":"#1f2937",color:groupMode===mode?"#fff":"#9ca3af",
              fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Active projects by stage */}
      {groupMode==="stage"&&ACTIVE_STAGES.slice(0,4).map(stage=>{
        const stageProjects = active.filter(p=>stage.statuses.includes(p.status));
        if(!stageProjects.length) return null;
        return (
          <div key={stage.key} style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{width:3,height:22,borderRadius:99,background:stage.color,flexShrink:0}}/>
              <div style={{fontWeight:900,fontSize:17,color:stage.color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>{stage.key}</div>
              <div style={{background:stage.color+"22",color:stage.color,borderRadius:99,padding:"2px 11px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{stageProjects.length}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
              {stageProjects.map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
            </div>
          </div>
        );
      })}

      {/* On Hold */}
      {groupMode==="stage"&&onHold.length>0&&(
        <div style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{width:3,height:22,borderRadius:99,background:"#6b7280",flexShrink:0}}/>
            <div style={{fontWeight:900,fontSize:17,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>On Hold</div>
            <div style={{background:"#6b728022",color:"#6b7280",borderRadius:99,padding:"2px 11px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{onHold.length}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
            {onHold.map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
          </div>
        </div>
      )}

      {groupMode==="stage"&&active.length===0&&onHold.length===0&&<div style={{textAlign:"center",color:"#4b5563",padding:"40px 0",fontSize:15}}>No active projects match</div>}

      {/* Group by Producer */}
      {groupMode==="producer"&&(()=>{
        const prods=team.filter(m=>m.roles.some(r=>["Producer","Project Manager"].includes(r)));
        const STAGE_ORD=["Ideation","Pre-Pro","In Production","Post","On Hold"];
        const sortS=ps=>[...ps].sort((a,b)=>STAGE_ORD.indexOf(a.status)-STAGE_ORD.indexOf(b.status));
        const activeFiltered=filtered.filter(p=>!p.closedAt&&!["Delivered","Canceled"].includes(p.status));
        return (
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            {prods.map(prod=>{
              const pp=activeFiltered.filter(p=>(p.assignees?.Producer||[]).includes(prod.id)||(p.assignees?.["Project Manager"]||[]).includes(prod.id));
              if(!pp.length) return null;
              return (
                <div key={prod.id}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <Av name={prod.name} size={30} email={prod.email}/>
                    <div style={{fontWeight:900,fontSize:16,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{prod.name}</div>
                    <Chip label={prod.roles[0]} color="#6b7280" xs/>
                    <div style={{background:"#6366f120",color:"#818cf8",borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:800}}>{pp.length}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
                    {sortS(pp).map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
                  </div>
                </div>
              );
            })}
            {activeFiltered.filter(p=>!prods.some(pr=>(p.assignees?.Producer||[]).includes(pr.id)||(p.assignees?.["Project Manager"]||[]).includes(pr.id))).length>0&&(
              <div>
                <div style={{fontWeight:900,fontSize:15,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:12}}>No Producer Assigned</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
                  {activeFiltered.filter(p=>!prods.some(pr=>(p.assignees?.Producer||[]).includes(pr.id)||(p.assignees?.["Project Manager"]||[]).includes(pr.id))).map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* Group by Editor */}
      {groupMode==="editor"&&(()=>{
        const eds=team.filter(m=>m.roles.some(r=>["Editor","Animator","Designer"].includes(r)));
        const STAGE_ORD=["Ideation","Pre-Pro","In Production","Post","On Hold"];
        const sortS=ps=>[...ps].sort((a,b)=>STAGE_ORD.indexOf(a.status)-STAGE_ORD.indexOf(b.status));
        const activeFiltered=filtered.filter(p=>!p.closedAt&&!["Delivered","Canceled"].includes(p.status));
        return (
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            {eds.map(ed=>{
              const ep=activeFiltered.filter(p=>p.deliverables.some(d=>d.editorId===ed.id||d.animatorId===ed.id));
              if(!ep.length) return null;
              return (
                <div key={ed.id}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <Av name={ed.name} size={30} email={ed.email}/>
                    <div style={{fontWeight:900,fontSize:16,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{ed.name}</div>
                    <Chip label={ed.roles.join(", ")} color="#6b7280" xs/>
                    <div style={{background:"#8b5cf620",color:"#a78bfa",borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:800}}>{ep.length}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
                    {sortS(ep).map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Completed / Inactive — collapsible */}
      <div style={{borderTop:"1px solid #1f2937",paddingTop:16,marginTop:4}}>
        <button onClick={()=>setShowInactive(s=>!s)}
          style={{display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",marginBottom:showInactive?14:0,padding:"4px 0"}}>
          <span style={{color:"#6b7280",fontSize:16}}>{showInactive?"▼":"►"}</span>
          <span style={{fontWeight:800,fontSize:15,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>
            Completed & Inactive
          </span>
          <span style={{background:"#1f2937",color:"#6b7280",borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{inactive.length}</span>
        </button>
        {showInactive&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:12}}>
            {inactive.map(p=><ProjectCard key={p.id} project={p} team={team} onClick={onOpenProject} onUpdateProject={onUpdateProject}/>)}
          </div>
        )}
      </div>
    </div>
  );
};

// ─── Quick Note System ────────────────────────────────────────────────────────
const QuickNoteButton = ({project, team, onAddNote, onClick}) => {
  const noteCount = (project.notes||[]).length;
  return (
    <button
      onClick={e=>{e.stopPropagation();onClick();}}
      title={noteCount>0?\`\${noteCount} note\${noteCount!==1?"s":""} — click to add\`:"Add quick note"}
      style={{background:noteCount>0?"#f59e0b18":"#1f293780",border:\`1px solid \${noteCount>0?"#f59e0b40":"#374151"}\`,
        borderRadius:6,padding:"3px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4,
        color:noteCount>0?"#f59e0b":"#6b7280",fontSize:11,fontWeight:700,
        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>
      💬{noteCount>0?\` \${noteCount}\`:""}
    </button>
  );
};

const QuickNoteModal = ({project, team, onClose, onUpdateProject}) => {
  const [text, setText] = useState("");
  const [author, setAuthor] = useState(team[0]?.id||"");
  const [tagging, setTagging] = useState(false);
  const [tagSearch, setTagSearch] = useState("");
  const inputRef = useRef();

  const addNote = () => {
    const t = text.trim();
    if(!t) return;
    const member = team.find(m=>m.id===Number(author));
    const newNote = {
      id:uid(), text:t, authorId:Number(author),
      authorName: member?.name||"Unknown",
      createdAt: new Date().toISOString(),
      tags: [...(t.match(/@(\\w+)/g)||[])],
    };
    onUpdateProject(project.id, "notes", [...(project.notes||[]), newNote]);
    setText(""); setTagging(false);
    onClose();
  };

  const insertTag = (name) => {
    const firstName = name.split(" ")[0];
    setText(t => t + \`@\${firstName} \`);
    setTagging(false); setTagSearch("");
    inputRef.current?.focus();
  };

  const matchedTeam = tagSearch
    ? team.filter(m=>m.name.toLowerCase().includes(tagSearch.toLowerCase()))
    : team.slice(0,8);

  return (
    <Modal onClose={onClose} maxWidth={560}>
      <div style={{paddingBottom:4}}>
        <h3 style={{fontSize:20,fontWeight:900,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>
          💬 Quick Notes — {project.name}
        </h3>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>Capture status updates, call notes, and reminders. Use @name to tag someone.</div>

        {/* Add note */}
        <div style={{background:"#0f172a",border:"1px solid #374151",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <select value={author} onChange={e=>setAuthor(e.target.value)}
              style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:"#e2e8f0",padding:"5px 8px",fontSize:13,outline:"none",flex:"0 0 170px"}}>
              {team.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
            <div style={{fontSize:12,color:"#4b5563",display:"flex",alignItems:"center"}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
          </div>
          <div style={{position:"relative"}}>
            <textarea ref={inputRef} value={text}
              onChange={e=>{
                setText(e.target.value);
                const lastWord = e.target.value.split(/\\s/).pop();
                if(lastWord.startsWith("@")){ setTagging(true); setTagSearch(lastWord.slice(1)); }
                else setTagging(false);
              }}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();}}}
              placeholder="Type a note… Use @name to tag. Enter to save, Shift+Enter for new line."
              style={{width:"100%",background:"#0a0f1a",border:"1px solid #374151",borderRadius:7,color:"#e2e8f0",padding:"12px 14px",fontSize:15,outline:"none",resize:"vertical",minHeight:100,fontFamily:"'DM Sans',sans-serif"}}/>
            {tagging&&(
