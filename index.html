// ─── Calendar ─────────────────────────────────────────────────────────────────
const CalendarView = ({projects,team,onOpenProject,onCalEventClick}) => {
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const [calView,setCalView]=useState("month"); // month | week | day
  const [filterEditor,setFilterEditor]=useState("all");
  const [filterProject,setFilterProject]=useState("all");
  const [calFilters,setCalFilters]=useState({showDeadlines:true,showReviews:true,showShoots:true,showIngest:true});
  const calTypeColors={deadline:"#ef4444",review:"#f59e0b",shoot:"#3b82f6",ingest:"#06b6d4"};
  const [tooltip,setTooltip]=useState(null);
  const [selDate,setSelDate]=useState(null);

  const editors=team.filter(m=>m.roles.some(r=>["Editor","Animator","Designer"].includes(r)));

  const allItems=useMemo(()=>{
    let items=[];
    projects.forEach(p=>{
      if(filterProject!=="all"&&p.id!==Number(filterProject)) return;
      p.deliverables.forEach(d=>{
        if(filterEditor!=="all"&&d.editorId!==Number(filterEditor)) return;
        const ed=team.find(m=>m.id===d.editorId);
        if(calFilters.showDeadlines&&d.deadline)
          items.push({...d,projectName:p.name,projectId:p.id,editorName:ed?.name,isRound:false,isIngest:false,isShoot:false,calType:"deadline"});
        if(calFilters.showReviews) d.rounds.forEach(r=>{
          if(r.deadline)
            items.push({...r,delTitle:d.title,projectName:p.name,projectId:p.id,editorName:ed?.name,isRound:true,isIngest:false,isShoot:false,calType:"review"});
        });
      });
      (p.shoots||[]).forEach(s=>{
        if(calFilters.showShoots&&s.startTime)
          items.push({id:\`shoot-\${s.id}\`,title:s.title||"Shoot",deadline:s.startTime,projectName:p.name,projectId:p.id,isRound:false,isIngest:false,isShoot:true,calType:"shoot",status:"Shoot",location:s.location,endTime:s.endTime,crew:{crewInternal:s.crewInternal||[],crewExternal:s.crewExternal||[]}});
        if(calFilters.showIngest&&s.ingest?.datetime)
          items.push({id:\`ingest-\${s.id}\`,title:\`📥 \${s.title||"Media"}\`,deadline:s.ingest.datetime,projectName:p.name,projectId:p.id,isRound:false,isIngest:true,isShoot:false,calType:"ingest",status:"Ingest"});
      });
    });
    return items;
  },[projects,filterEditor,filterProject,calFilters,team]);

  const byDay=useMemo(()=>{
    const m={};
    allItems.forEach(item=>{
      const dt=new Date(item.deadline);
      if(dt.getFullYear()===year&&dt.getMonth()===month){
        const k=dt.getDate();if(!m[k])m[k]=[];m[k].push(item);
      }
    });
    return m;
  },[allItems,year,month]);

  const dim=getDIM(year,month),fd=getFDOM(year,month);
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);while(cells.length%7!==0)cells.push(null);
  const todayD=now.getFullYear()===year&&now.getMonth()===month?now.getDate():null;
  const pm=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nm=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  // Week view helpers
  const getWeekDays=()=>{
    const d=selDate?new Date(selDate):new Date(year,month,now.getDate());
    const day=d.getDay();
    const start=new Date(d);start.setDate(d.getDate()-day);
    return Array.from({length:7},(_,i)=>{const dd=new Date(start);dd.setDate(start.getDate()+i);return dd;});
  };

  // Day view
  const getDayItems=(date)=>{
    if(!date) return [];
    const dt=typeof date==="string"?new Date(date):date;
    return allItems.filter(item=>{
      const id=new Date(item.deadline);
      return id.getFullYear()===dt.getFullYear()&&id.getMonth()===dt.getMonth()&&id.getDate()===dt.getDate();
    });
  };

  const ViewToggle=()=>(
    <div style={{display:"flex",gap:2,background:"#0f172a",borderRadius:7,padding:3,border:"1px solid #1f2937"}}>
      {["month","week","day"].map(v=>(
        <button key={v} onClick={()=>setCalView(v)} style={{padding:"4px 12px",borderRadius:5,fontWeight:700,fontSize:12,cursor:"pointer",border:"none",background:calView===v?"#1f2937":"transparent",color:calView===v?"#e2e8f0":"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.07em",textTransform:"uppercase"}}>{v}</button>
      ))}
    </div>
  );

  const CAL_COLORS = {
    deadline:"#ef4444",   // final deliverable deadline
    review:"#f59e0b",     // review round deadline
    shoot:"#3b82f6",      // shoot times
    ingest:"#06b6d4",     // ingest times
  };
  const getCalColor = item => {
    if(item.isIngest)  return CAL_COLORS.ingest;
    if(item.isShoot)   return CAL_COLORS.shoot;
    if(item.isRound)   return CAL_COLORS.review;
    return CAL_COLORS.deadline;
  };
  const ItemPill=({item,compact})=>{
    const color=getCalColor(item);
    const typeLabel = item.isIngest?"📥 Ingest":item.isShoot?"🎬 Shoot":item.isRound?"↺ Review":"🔴 Final Due";
    return (
      <div
        onMouseEnter={e=>{const r=e.currentTarget.getBoundingClientRect();setTooltip({item,x:Math.min(r.right+4,window.innerWidth-290),y:Math.max(8,r.top-8)});}}
        onMouseLeave={e=>{const rt=e.relatedTarget;if(rt&&rt.closest&&rt.closest('[data-tooltip]'))return;setTooltip(null);}}
        onClick={e=>{e.stopPropagation();
          setTooltip(null);
          if(onCalEventClick) { onCalEventClick({...item, projectId: item.projectId}); return; }
          const p=projects.find(proj=>proj.id===item.projectId);
          if(!p) return;
          if(item.isShoot)       onOpenProject(p,"production",item.id);
          else if(item.isIngest) onOpenProject(p,"ingest",item.id);
          else if(item.isRound)  onOpenProject(p,"deliverables",item.delId||item.id);
          else                   onOpenProject(p,"deliverables",item.id);
        }}
        style={{background:color+"28",borderLeft:\`2px solid \${color}\`,borderRadius:"0 4px 4px 0",
          padding:compact?"2px 4px":"3px 6px",cursor:"pointer",
          overflow:"hidden",lineHeight:1.2}}>
        {/* Campaign name — most prominent */}
        <div style={{fontSize:compact?8:10,fontWeight:800,color,fontFamily:"'Barlow Condensed',sans-serif",
          whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:"0.04em",textTransform:"uppercase"}}>
          {item.projectName}
        </div>
        {/* Deliverable title */}
        <div style={{fontSize:compact?7:9,color:color+"cc",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {item.isRound?item.delTitle:item.isIngest?item.title:item.title}
        </div>
        {/* Type of deadline */}
        {!compact&&<div style={{fontSize:8,color:color+"88",fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>
          {item.isRound?"↺ "+item.label:typeLabel}
        </div>}
      </div>
    );
  };

  return (
    <div>
      {/* Controls */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={pm} style={{background:"#1f2937",border:"none",borderRadius:7,color:"#e2e8f0",width:30,height:30,cursor:"pointer",fontSize:19,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",minWidth:180,textAlign:"center"}}>{MONTHS_LONG[month]} {year}</div>
        <button onClick={nm} style={{background:"#1f2937",border:"none",borderRadius:7,color:"#e2e8f0",width:30,height:30,cursor:"pointer",fontSize:19,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        <button onClick={()=>{setYear(now.getFullYear());setMonth(now.getMonth());setSelDate(null);}} style={{background:"#1f2937",border:"none",borderRadius:7,color:"#9ca3af",padding:"0 10px",height:30,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.06em",textTransform:"uppercase"}}>Today</button>
        <ViewToggle/>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <select value={filterEditor} onChange={e=>setFilterEditor(e.target.value)} style={{background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"5px 10px",fontSize:13,outline:"none"}}>
            <option value="all">All Editors</option>
            {editors.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
          <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} style={{background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"5px 10px",fontSize:13,outline:"none"}}>
            <option value="all">All Projects</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:2}}>
          {[["showDeadlines","🔴 Final Due","deadline"],["showReviews","🟡 Reviews","review"],["showShoots","🔵 Shoots","shoot"],["showIngest","🩵 Ingest","ingest"]].map(([key,label,type])=>(
            <button key={key} onClick={()=>setCalFilters(f=>({...f,[key]:!f[key]}))}
              style={{padding:"4px 11px",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",
                border:\`1px solid \${calFilters[key]?calTypeColors[type]+"80":"#374151"}\`,
                background:calFilters[key]?calTypeColors[type]+"22":"transparent",
                color:calFilters[key]?calTypeColors[type]:"#6b7280",
                fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.05em",textTransform:"uppercase",transition:"all 0.15s"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Month View */}
      {calView==="month"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
            {DAYS_SHORT.map(d=><div key={d} style={{textAlign:"center",fontSize:12,fontWeight:800,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",padding:"3px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {cells.map((day,i)=>{
              const items=day?(byDay[day]||[]):[];
              const dels=items.filter(x=>!x.isRound);
              const rounds=items.filter(x=>x.isRound);
              const isT=day===todayD;
              const sk=day?\`\${year}-\${month}-\${day}\`:null;
              const isSel=selDate===sk;
              return (
                <div key={i} onClick={()=>{if(day){setSelDate(sk);setCalView("day");}}}
                  style={{background:isT?"#1e3a5f":isSel?"#1f2937":"#0f172a",border:\`1px solid \${isT?"#3b82f6":isSel?"#374151":"#1f2937"}\`,borderRadius:8,padding:"6px 5px",minHeight:90,cursor:day?"pointer":"default"}}>
                  {day&&<>
                    <div style={{fontSize:13,fontWeight:isT?800:500,color:isT?"#60a5fa":"#6b7280",marginBottom:3,textAlign:"right",fontFamily:"'Barlow Condensed',sans-serif"}}>{day}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      {items.slice(0,5).map((item,ii)=><ItemPill key={ii} item={item} compact/>)}
                      {items.length>5&&<div style={{fontSize:10,color:"#4b5563",paddingLeft:3}}>+{items.length-5}</div>}
                    </div>
                  </>}
                </div>
              );
            })}
          </div>
          {/* Selected day panel */}
          {selDate&&(()=>{
            const [,,sd]=selDate.split("-").map(Number);
            const items=byDay[sd]||[];
            return items.length>0?(
              <div style={{marginTop:12,background:"#111827",border:"1px solid #1f2937",borderRadius:12,padding:14}}>
                <div style={{fontWeight:800,fontSize:16,color:"#f1f5f9",marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>{MONTHS_LONG[month]} {sd} — {items.length} deadline{items.length!==1?"s":""}</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {items.map((item,i)=>(
                    <div key={i} onClick={()=>{setTooltip(null);const p=projects.find(proj=>proj.id===item.projectId);if(p){if(item.isShoot)onOpenProject(p,"production",item.id);else onOpenProject(p);}}}
                      style={{display:"flex",gap:10,padding:"8px 10px",background:"#0f172a",borderRadius:7,borderLeft:\`3px solid \${item.isRound?"#f59e0b":DCOLOR[item.status]}\`,alignItems:"center",cursor:item.isRound?"default":"pointer"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{item.isRound?item.label:item.title}</div>
                        <div style={{fontSize:12,color:"#6b7280"}}>{item.projectName}{item.isRound?" · "+item.delTitle:""}{item.editorName?" · "+item.editorName:""}</div>
                        <div style={{fontSize:12,color:"#4b5563"}}>{fmtDT(item.deadline)}</div>
                      </div>
                      <Chip label={item.isRound?item.status:item.status} color={item.isRound?RCOLOR[item.status]:DCOLOR[item.status]} xs/>
                      {!item.isRound&&<span style={{fontSize:12,color:"#6366f1",fontWeight:700}}>Open →</span>}
                    </div>
                  ))}
                </div>
              </div>
            ):null;
          })()}
        </>
      )}

      {/* Week View */}
      {calView==="week"&&(()=>{
        const refDateW = selDate ? new Date(selDate.split("-").map(Number).reduce((acc,v,i)=>i===0?new Date(v,0,1):acc)) : new Date(year, month, now.getDate());
        // Safer: build from year/month or selDate
        const baseDate = selDate ? (() => { const [sy,sm,sd]=selDate.split("-").map(Number); return new Date(sy,sm,sd); })() : new Date(year,month,now.getDate());
        const day=baseDate.getDay();
        const start=new Date(baseDate);start.setDate(baseDate.getDate()-day);
        const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
        const hours=Array.from({length:24},(_,i)=>i);
        const getItemsForDayHour=(d,h)=>getDayItems(d).filter(item=>new Date(item.deadline).getHours()===h);
        const isToday=d=>d.toDateString()===now.toDateString();
        return (
          <div style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:12,overflow:"hidden"}}>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"50px repeat(7,1fr)",borderBottom:"1px solid #1f2937",background:"#111827"}}>
              <div style={{borderRight:"1px solid #1f2937"}}/>
              {weekDays.map((d,i)=>{
                const iT=isToday(d);
                return (
                  <div key={i} onClick={()=>{setSelDate(\`\${d.getFullYear()}-\${d.getMonth()}-\${d.getDate()}\`);setCalView("day");}}
                    style={{padding:"8px 4px",textAlign:"center",cursor:"pointer",borderRight:i<6?"1px solid #1f2937":"none",
                      background:iT?"#1e3a5f":"transparent"}}
                    onMouseEnter={e=>e.currentTarget.style.background=iT?"#1e4a7f":"#1f2937"}
                    onMouseLeave={e=>e.currentTarget.style.background=iT?"#1e3a5f":"transparent"}>
                    <div style={{fontSize:11,fontWeight:700,color:iT?"#60a5fa":"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{d.toLocaleDateString("en-US",{weekday:"short"})}</div>
                    <div style={{fontSize:15,fontWeight:iT?900:700,color:iT?"#60a5fa":"#9ca3af",fontFamily:"'Barlow Condensed',sans-serif"}}>{d.getDate()}</div>
                  </div>
                );
              })}
            </div>
            {/* Hourly grid */}
            <div style={{maxHeight:520,overflowY:"auto"}}>
              {hours.map(h=>(
                <div key={h} style={{display:"grid",gridTemplateColumns:"50px repeat(7,1fr)",borderBottom:"1px solid #1f293730",minHeight:40}}>
                  <div style={{padding:"5px 6px",fontSize:11,color:"#374151",fontWeight:700,textAlign:"right",borderRight:"1px solid #1f2937",fontFamily:"'Barlow Condensed',sans-serif",flexShrink:0}}>
                    {h===0?"12am":h<12?\`\${h}am\`:h===12?"12pm":\`\${h-12}pm\`}
                  </div>
                  {weekDays.map((d,di)=>{
                    const items=getItemsForDayHour(d,h);
                    const iT=isToday(d);
                    return (
                      <div key={di} style={{borderRight:di<6?"1px solid #1f293730":"none",padding:"2px 3px",background:iT?"#1e3a5f08":"transparent",display:"flex",flexDirection:"column",gap:2}}>
                        {items.map((item,ii)=><ItemPill key={ii} item={item} compact/>)}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {calView==="day"&&(()=>{
        const d=selDate?(()=>{const p=selDate.split("-").map(Number);return new Date(p[0],p[1],p[2]);})():new Date(now.getFullYear(),now.getMonth(),now.getDate());
        const items=getDayItems(d);
        const hours=Array.from({length:24},(_,i)=>i);
        const getHourItems=h=>items.filter(item=>new Date(item.deadline).getHours()===h);
        const prevDay=()=>{const nd=new Date(d);nd.setDate(nd.getDate()-1);setSelDate(\`\${nd.getFullYear()}-\${nd.getMonth()}-\${nd.getDate()}\`);};
        const nextDay=()=>{const nd=new Date(d);nd.setDate(nd.getDate()+1);setSelDate(\`\${nd.getFullYear()}-\${nd.getMonth()}-\${nd.getDate()}\`);};
        const goToday=()=>setSelDate(\`\${now.getFullYear()}-\${now.getMonth()}-\${now.getDate()}\`);
        return (
          <div style={{background:"#0f172a",border:"1px solid #1f2937",borderRadius:12,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderBottom:"1px solid #1f2937"}}>
              <button onClick={prevDay} style={{background:"#1f2937",border:"none",borderRadius:6,color:"#e2e8f0",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
              <div style={{flex:1,fontWeight:800,fontSize:15,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textAlign:"center"}}>
                {d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
              </div>
              <button onClick={nextDay} style={{background:"#1f2937",border:"none",borderRadius:6,color:"#e2e8f0",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
              <button onClick={goToday} style={{background:"#1f2937",border:"none",borderRadius:6,color:"#9ca3af",padding:"0 8px",height:28,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>Today</button>
            </div>
            <div style={{maxHeight:500,overflowY:"auto"}}>
              {hours.map(h=>{
                const hItems=getHourItems(h);
                return (
                  <div key={h} style={{display:"flex",borderBottom:"1px solid #1f293730",minHeight:44}}>
                    <div style={{width:50,flexShrink:0,padding:"10px 8px",fontSize:12,color:"#374151",fontWeight:700,textAlign:"right",borderRight:"1px solid #1f2937",fontFamily:"'Barlow Condensed',sans-serif"}}>{h===0?"12am":h<12?\`\${h}am\`:h===12?"12pm":\`\${h-12}pm\`}</div>
                    <div style={{flex:1,padding:"6px 8px",display:"flex",flexDirection:"column",gap:3}}>
                      {hItems.map((item,i)=><ItemPill key={i} item={item}/>)}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Tooltip */}
      {tooltip&&(
        <div
          data-tooltip="true"
          onMouseEnter={()=>{}} onMouseLeave={()=>setTooltip(null)}
          style={{position:"fixed",
            left:tooltip.x+290<window.innerWidth ? tooltip.x : tooltip.x-300,
            top:Math.max(8,Math.min(tooltip.y, window.innerHeight-400)),
            zIndex:500,
          background:"#1a2235",border:\`1px solid \${tooltip.item.isShoot?"#3b82f6":tooltip.item.isIngest?"#06b6d4":tooltip.item.isRound?"#f59e0b":"#ef4444"}50\`,
          borderRadius:12,padding:"13px 15px",width:280,boxShadow:"0 12px 40px #000c",pointerEvents:"auto"}}>
          {(() => {
            const item = tooltip.item;
            const typeColor = item.isShoot?"#3b82f6":item.isIngest?"#06b6d4":item.isRound?"#f59e0b":"#ef4444";
            const typeLabel = item.isShoot?"🎬 Shoot":item.isIngest?"📥 Ingest":item.isRound?"↺ Review Round":"🔴 Final Due";
            const idLabel = item.id?String(item.id).slice(-4):item.isRound?String(item.id).slice(-4):"—";

            return (
              <>
                {/* Header bar with type + ID */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:800,color:typeColor,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",textTransform:"uppercase"}}>{typeLabel}</div>
                  <div style={{background:typeColor+"22",color:typeColor,borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>#{idLabel}</div>
                </div>

                {/* Campaign name — always shown */}
                <div style={{fontSize:13,fontWeight:800,color:"#818cf8",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>{item.projectName}</div>

                {/* Review Round */}
                {item.isRound&&!item.isShoot&&!item.isIngest&&(
                  <>
                    <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{item.label}</div>
                    <div style={{fontSize:13,color:"#9ca3af",marginBottom:6}}>{item.delTitle}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                      <Chip label={item.status} color={RCOLOR[item.status]||"#6b7280"} xs/>
                      {item.delStatus&&<Chip label={item.delStatus} color={DCOLOR[item.delStatus]||"#6b7280"} xs/>}
                    </div>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:3}}>📅 Due: {fmtDT(item.deadline)}</div>
                    {item.reviewers?.length>0&&<div style={{fontSize:12,color:"#6b7280",marginBottom:3}}>👥 {item.reviewers.slice(0,3).join(", ")}{item.reviewers.length>3?\` +\${item.reviewers.length-3}\`:""}</div>}
                  </>
                )}

                {/* Final Deliverable Deadline */}
                {!item.isRound&&!item.isShoot&&!item.isIngest&&(
                  <>
                    <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{item.title}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                      <Chip label={item.status||"—"} color={DCOLOR[item.status]||"#6b7280"} xs/>
                      {item.aspectRatio&&<Chip label={item.aspectRatio} color="#4b5563" xs/>}
                    </div>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:3}}>📅 Due: {fmtDT(item.deadline)}</div>
                    {item.editorName&&<div style={{fontSize:12,color:"#6b7280",marginBottom:3}}>✏️ {item.editorName}</div>}
                  </>
                )}

                {/* Shoot */}
                {item.isShoot&&(
                  <>
                    <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{item.title}</div>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:2}}>🕐 {fmtDT(item.deadline)}{item.endTime?" → "+fmtTime(item.endTime):""}</div>
                    {item.location&&<div style={{fontSize:12,color:"#6b7280",marginBottom:2}}>📍 {item.location}</div>}
                    {item.crew&&(()=>{
                      const crewItems = [
                        ...(item.crew.crewInternal||[]).map(c=>{const m=team.find(t=>t.id===c.memberId);return m?\`\${m.name} (\${c.role||"Crew"})\`:null;}).filter(Boolean),
                        ...(item.crew.crewExternal||[]).map(c=>c.name?\`\${c.name} (\${c.role||"Crew"})\`:null).filter(Boolean),
                      ];
                      return crewItems.length>0&&<div style={{fontSize:12,color:"#6b7280",marginBottom:2}}>👥 {crewItems.slice(0,3).join(", ")}{crewItems.length>3?\` +\${crewItems.length-3}\`:""}</div>;
                    })()}
                  </>
                )}

                {/* Ingest */}
                {item.isIngest&&(
                  <>
                    <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{item.title}</div>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:2}}>🕐 {fmtDT(item.deadline)}</div>
                    {item.notes&&<div style={{fontSize:12,color:"#6b7280",marginBottom:2}}>📋 {item.notes.slice(0,60)}{item.notes.length>60?"…":""}</div>}
                  </>
                )}

                <div style={{borderTop:"1px solid #1f293760",marginTop:8,paddingTop:7,fontSize:11,color:typeColor,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em"}}>
                  Click to open project →
                </div>
              </>
            );
          })()}
        </div>
      )}
    </div>
  );
};

// ─── Team View ────────────────────────────────────────────────────────────────
const TeamMemberCard = ({m, projects, onOpenProject}) => {
  const [expanded, setExpanded] = useState(false);

  // Deliverables this person is associated with
  const myD = projects.flatMap(p=>p.deliverables.filter(d=>
    d.editorId===m.id||d.animatorId===m.id||d.producerId===m.id
  ).map(d=>({...d,projectName:p.name,workstream:p.workstream})));
  const active    = myD.filter(d=>!["Delivered","On Hold"].includes(d.status));
  const changes   = myD.filter(d=>d.rounds.some(r=>r.status==="Changes Requested"));
  const inRev     = myD.filter(d=>d.rounds.some(r=>["In Review","Sent"].includes(r.status)));
  const delivered = myD.filter(d=>d.status==="Delivered");

  // Projects where this person is assigned in any role
  const myProjects = projects.filter(p=>{
    const assignees = p.assignees||{};
    return Object.values(assignees).some(ids=>(ids||[]).includes(m.id));
  });

  // For each assigned project, compute incomplete checklist tasks for this person's role
  const getMyIncomplete = (project) => {
    const assignees   = project.assignees||{};
    const myRoles     = Object.entries(assignees)
      .filter(([,ids])=>(ids||[]).includes(m.id))
      .map(([role])=>role);
    const deliverables = project.deliverables||[];
    const ingestDates  = project.ingestDates||[];
    const productions  = project.productions||[];
    const allIngests   = [...ingestDates,...productions.filter(p=>p.ingest?.datetime).map(p=>p.ingest)];

    const ROLE_TASKS = {
      "Producer":[
        {label:"Project brief",            done:!!project.briefNotes},
        {label:"Workstream set",           done:!!project.workstream},
        {label:"Final deadline set",       done:!!project.deadline},
        {label:"Production added",         done:productions.length>0},
      ],
      "Project Manager":[
        {label:"Keywords added",           done:(project.keywords||[]).length>0},
        {label:"Status current",           done:!!project.status&&project.status!=="Pre-Pro"},
      ],
      "Editor":[
        {label:"Deliverables assigned",    done:deliverables.some(d=>d.editorId===m.id)},
        {label:"Frame links entered",      done:deliverables.filter(d=>d.editorId===m.id).every(d=>d.frameLink)},
      ],
      "Post Production Manager":[
        {label:"Post workflow confirmed",  done:deliverables.length>0&&deliverables.every(d=>d.status!=="Not Started")},
      ],
      "Media Manager":[
        {label:"Ingest scheduled",         done:allIngests.length>0&&allIngests.every(i=>i.datetime)},
      ],
    };

    const incomplete = [];
    myRoles.forEach(role=>{
      const tasks = ROLE_TASKS[role];
      if(!tasks) return;
      tasks.forEach(t=>{ if(!t.done) incomplete.push({role, label:t.label}); });
    });
    return {project, myRoles, incomplete};
  };

  const projectAlerts = myProjects
    .map(p=>getMyIncomplete(p))
    .filter(x=>x.incomplete.length>0 && !["Delivered","Canceled","Completed"].includes(x.project.status));

  const totalIncomplete = projectAlerts.reduce((s,a)=>s+a.incomplete.length, 0);

  return (
    <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:12,overflow:"hidden",transition:"border-color 0.15s"}}

const TeamView = ({team,projects,onOpenProject}) => {
  const [roleFilter,setRoleFilter]=useState("All");
  const [deptFilter,setDeptFilter]=useState("All");
  const [sortBy,setSortBy]=useState("name");
  const departments=[...new Set(team.map(m=>m.department).filter(Boolean))].sort();

  const filtered=useMemo(()=>{
    let t=team;
    if(roleFilter!=="All") t=t.filter(m=>m.roles.includes(roleFilter));
    if(deptFilter!=="All") t=t.filter(m=>m.department===deptFilter);
    if(sortBy==="name")     t=[...t].sort((a,b)=>a.name.localeCompare(b.name));
    if(sortBy==="role")     t=[...t].sort((a,b)=>a.roles[0].localeCompare(b.roles[0]));
    if(sortBy==="dept")     t=[...t].sort((a,b)=>(a.department||"").localeCompare(b.department||""));
    if(sortBy==="workload") t=[...t].sort((a,b)=>{
      const wl=m=>projects.flatMap(p=>p.deliverables.filter(d=>(d.editorId===m.id||d.animatorId===m.id)&&!["Delivered","On Hold"].includes(d.status))).length;
      return wl(b)-wl(a);
    });
    return t;
  },[team,projects,roleFilter,deptFilter,sortBy]);

  const selS={background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"6px 10px",fontSize:13,outline:"none"};

  // Group by department when no filters active
  const DEPT_ORDER = ["Production","Post Production","Creative","Broadcast"];
  const byDept = {};
  filtered.forEach(m=>{const d=m.department||"Other";if(!byDept[d])byDept[d]=[];byDept[d].push(m);});
  const deptColors = {"Production":"#3b82f6","Post Production":"#8b5cf6","Creative":"#06b6d4","Broadcast":"#ef4444","Other":"#6b7280"};
  const showGrouped = roleFilter==="All" && deptFilter==="All" && sortBy==="name";

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <select value={roleFilter} onChange={e=>setRoleFilter(e.target.value)} style={selS}>
          <option value="All">All Roles</option>
          {ALL_ROLES.map(r=><option key={r}>{r}</option>)}
          <option value="Broadcast Manager">Broadcast Manager</option>
          <option value="Technical Director">Technical Director</option>
          <option value="Live Director">Live Director</option>
          <option value="Broadcast Coordinator">Broadcast Coordinator</option>
        </select>
        <select value={deptFilter} onChange={e=>setDeptFilter(e.target.value)} style={selS}>
          <option value="All">All Departments</option>
          {departments.map(d=><option key={d}>{d}</option>)}
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={selS}>
          <option value="name">Sort: Name</option>
          <option value="role">Sort: Role</option>
          <option value="dept">Sort: Department</option>
          <option value="workload">Sort: Workload ↓</option>
        </select>
        <div style={{fontSize:13,color:"#4b5563"}}>{filtered.length} member{filtered.length!==1?"s":""}</div>
      </div>

      {showGrouped ? (
        <div>
          {[...DEPT_ORDER,...Object.keys(byDept).filter(d=>!DEPT_ORDER.includes(d))].map(dept=>{
            const members = byDept[dept];
            if(!members||members.length===0) return null;
            const dc = deptColors[dept]||"#6b7280";
            return (
              <div key={dept} style={{marginBottom:28}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{width:3,height:20,borderRadius:99,background:dc,flexShrink:0}}/>
                  <div style={{fontWeight:900,fontSize:16,color:dc,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase"}}>{dept}</div>
                  <div style={{background:dc+"22",color:dc,borderRadius:99,padding:"2px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{members.length}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
                  {members.map(m=><TeamMemberCard key={m.id} m={m} projects={projects} onOpenProject={onOpenProject}/>)}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
          {filtered.map(m=><TeamMemberCard key={m.id} m={m} projects={projects} onOpenProject={onOpenProject}/>)}
        </div>
      )}
    </div>
  );
};

// ─── Deliverables Tab (global) ────────────────────────────────────────────────
const DeliverablesTab = ({projects, team, onOpenProject}) => {
  const [subTab, setSubTab] = useState("active");
  const [search, setSearch] = useState("");
  const [groupBy, setGroupBy] = useState("editor"); // editor | producer
  const [popupDel, setPopupDel] = useState(null);

  const getQuarter = d => { if(!d) return "Unknown"; const m=new Date(d).getMonth(); return \`Q\${Math.floor(m/3)+1}\`; };

  const allDels = useMemo(()=>{
    const projectDels = projects.flatMap(p=>p.deliverables.map(d=>({
      ...d,
      projectName:p.name, projectId:p.id,
      workstream:p.workstream||"—",
      businessUnit:p.businessUnit||"—",
      year:p.year||new Date(p.deadline||Date.now()).getFullYear(),
      quarter:getQuarter(d.deadline),
    })));
    // Also include deliverables from productions[] that have been added
    const prodDels = projects.flatMap(p=>(p.productions||[]).flatMap(prod=>(prod.deliverables||[]).map(d=>({
      ...d,
      projectName:p.name, projectId:p.id,
      workstream:p.workstream||"—",
      businessUnit:p.businessUnit||"—",
      year:p.year||new Date(p.deadline||Date.now()).getFullYear(),
      quarter:getQuarter(d.deadline),
      _fromProduction:prod.id, _productionTitle:prod.title,
    }))));
    // Deduplicate by id (project-level deliverables take precedence)
    const seen = new Set(projectDels.map(d=>d.id));
    return [...projectDels, ...prodDels.filter(d=>!seen.has(d.id))];
  },[projects]);

  const editors   = team.filter(m=>m.roles.some(r=>["Editor","Animator","Designer"].includes(r)));
  const producers = team.filter(m=>m.roles.some(r=>["Producer","Project Manager","Post Project Manager"].includes(r)));
  const active    = allDels.filter(d=>!["Delivered","On Hold"].includes(d.status));
  const completed = [...allDels.filter(d=>d.status==="Delivered")]
    .sort((a,b)=>new Date(b.deadline)-new Date(a.deadline));

  const filtCompleted = completed.filter(d=>{
    const q=search.toLowerCase();
    return !q||d.title.toLowerCase().includes(q)||d.projectName.toLowerCase().includes(q)||(d.workstream||"").toLowerCase().includes(q)||(d.businessUnit||"").toLowerCase().includes(q);
  });

  // Bar chart helper
  const countBy=(arr,key)=>{
    const m={};arr.forEach(d=>{const k=d[key]||"Unknown";m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  };
  const Bar=({label,count,max,color})=>(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
      <div style={{width:130,fontSize:14,color:"#9ca3af",textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
      <div style={{flex:1,height:22,background:"#1f2937",borderRadius:5,overflow:"hidden"}}>
        <div style={{height:"100%",width:\`\${Math.max((count/max)*100,8)}%\`,background:color,borderRadius:5,display:"flex",alignItems:"center",paddingLeft:8,transition:"width 0.4s",minWidth:28}}>
          <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{count}</span>
        </div>
      </div>
    </div>
  );

  const tabS=a=>({padding:"5px 16px",borderRadius:7,fontWeight:800,fontSize:13,cursor:"pointer",border:"none",background:a?"#6366f1":"transparent",color:a?"#fff":"#6b7280",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.07em",textTransform:"uppercase"});

  const DelRow = ({d, showProject=true}) => {
    const changes=d.rounds.some(r=>r.status==="Changes Requested");
    const inRev=d.rounds.some(r=>["In Review","Sent"].includes(r.status));
    const activeR=d.rounds.find(r=>!["Approved"].includes(r.status));
    const c=changes?"#ef4444":inRev?"#f59e0b":DCOLOR[d.status];
    return (
      <div onClick={()=>setPopupDel(d)}
        style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:"#111827",border:\`1px solid \${changes?"#ef444430":"#1f2937"}\`,borderRadius:9,cursor:"pointer"}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=changes?"#ef4444":"#374151"}
        onMouseLeave={e=>e.currentTarget.style.borderColor=changes?"#ef444430":"#1f2937"}>
        <div style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</div>
          {showProject&&<div style={{fontSize:12,color:"#6b7280"}}>{d.projectName}</div>}
        </div>
        <Chip label={d.status} color={c} xs/>
        {d.aspectRatio&&<Chip label={d.aspectRatio} color="#374151" xs/>}

                            {ed&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><Av name={ed.name} size={18}/><span style={{fontSize:12,color:"#9ca3af"}}>{ed.name}</span></div>}
                            <Chip label={d.aspectRatio||"16:9"} color="#374151" xs/>

                            <span style={{fontSize:12,color:"#4b5563"}}>›</span>

                ))}

            ));
          })()}
        </div>
      )}

      {/* ── Metrics ── */}
      {subTab==="metrics"&&(()=>{
        const CHART_COLORS=["#6366f1","#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#06b6d4","#f97316"];
        const charts=[
          {title:"By Workstream", data:countBy(allDels,"workstream")},
          {title:"By Business Unit", data:countBy(allDels,"businessUnit")},
          {title:"By Quarter", data:countBy(allDels,"quarter")},
          {title:"By Status", data:countBy(allDels,"status")},

        return (

// ── Shared: Mini weekly calendar for role views ──────────────────────────────
const RoleCalendar = ({memberId, projects, onOpenProject, team=[]}) => {
  const [calView,setCalView] = useState("week");
  const [selDate,setSelDate] = useState(null);
  const now = new Date();

  // Gather all items for this member
  const allItems = useMemo(()=>{
    const items=[];
    projects.forEach(p=>{
      const member = team?.find(m=>m.id===memberId);
      const memberName = member?.name||"";

      const isMember = Object.values(p.assignees||{}).flat().includes(memberId) ||
        p.deliverables.some(d=>d.editorId===memberId||d.animatorId===memberId||d.producerId===memberId);

      // Check if member is on any shoot (internal or external by name)
      const isOnAnyShoot = (p.shoots||[]).some(s=>
        (s.crewInternal||[]).some(c=>c.memberId===memberId)||
        (s.crewExternal||[]).some(c=>c.name===memberName)
      );

      if(!isMember&&!isOnAnyShoot) return;

      if(isMember){
        p.deliverables.forEach(d=>{
          if(d.deadline) items.push({...d,projectName:p.name,projectId:p.id,isRound:false,isIngest:false,isShoot:false,calType:"deadline"});
          d.rounds.forEach(r=>{if(r.deadline) items.push({...r,delTitle:d.title,projectName:p.name,projectId:p.id,isRound:true,isIngest:false,isShoot:false,calType:"review"});});
        });
      }

      (p.shoots||[]).forEach(s=>{
        const isOnShoot = (s.crewInternal||[]).some(c=>c.memberId===memberId)||
          (s.crewExternal||[]).some(c=>c.name===memberName);
        if(!isOnShoot&&!isMember) return;
        // Get this member's specific call time
        const myCrewEntry = (s.crewInternal||[]).find(c=>c.memberId===memberId)||
          (s.crewExternal||[]).find(c=>c.name===memberName);
        const myCallTime = myCrewEntry?.callTime||null;
        if(s.startTime) items.push({id:\`shoot-\${s.id}\`,title:s.title||"Shoot",
          deadline:s.startTime,projectName:p.name,projectId:p.id,
          isRound:false,isIngest:false,isShoot:true,calType:"shoot",
          location:s.location,endTime:s.endTime,myCallTime,shootCallTime:fmtTime(s.startTime)});
        if(s.ingest?.datetime) items.push({id:\`ingest-\${s.id}\`,title:\`📥 \${s.title||"Ingest"}\`,deadline:s.ingest.datetime,projectName:p.name,projectId:p.id,isRound:false,isIngest:true,isShoot:false,calType:"ingest"});
      });
    });
    return items;
  },[projects,memberId]);

  const CAL_COLORS={deadline:"#ef4444",review:"#f59e0b",shoot:"#3b82f6",ingest:"#06b6d4"};
  const getColor=item=>CAL_COLORS[item.calType]||"#6b7280";

  // Week helpers
  const getWeekDays=(refDate)=>{
    const d=refDate?new Date(refDate):new Date(now);
    const day=d.getDay();
    const start=new Date(d);start.setDate(d.getDate()-day);
    return Array.from({length:7},(_,i)=>{const dd=new Date(start);dd.setDate(start.getDate()+i);return dd;});
  };
  const [weekOffset,setWeekOffset]=useState(0);
  const refDate=new Date(now);refDate.setDate(now.getDate()+weekOffset*7);
  const weekDays=getWeekDays(refDate);

  const getDayItems=date=>allItems.filter(item=>{
    const id=new Date(item.deadline);
    return id.getFullYear()===date.getFullYear()&&id.getMonth()===date.getMonth()&&id.getDate()===date.getDate();
  });

  const sB={background:"#1f2937",border:"none",borderRadius:6,color:"#e2e8f0",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"};

  return (
    <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:12,overflow:"hidden",marginBottom:20}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:"1px solid #1f2937"}}>
        <button onClick={()=>setWeekOffset(w=>w-1)} style={sB}>‹</button>
        <div style={{flex:1,fontWeight:700,fontSize:14,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",textAlign:"center"}}>
          {weekDays[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} — {weekDays[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
        </div>
        <button onClick={()=>setWeekOffset(w=>w+1)} style={sB}>›</button>
        <button onClick={()=>setWeekOffset(0)} style={{...sB,width:"auto",padding:"0 8px",fontSize:10,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>Now</button>
      </div>
      {/* Week grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,padding:"8px"}}>
        {weekDays.map((d,i)=>{
          const items=getDayItems(d);
          const isT=d.toDateString()===now.toDateString();
          return (
            <div key={i} style={{background:isT?"#1e3a5f":"#0f172a",border:\`1px solid \${isT?"#3b82f640":"#1f2937"}\`,borderRadius:8,padding:"6px 4px",minHeight:80}}>
              <div style={{fontSize:11,fontWeight:isT?800:600,color:isT?"#60a5fa":"#6b7280",textAlign:"center",marginBottom:4,fontFamily:"'Barlow Condensed',sans-serif"}}>
                {d.toLocaleDateString("en-US",{weekday:"short"})[0]} {d.getDate()}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {items.slice(0,4).map((item,ii)=>(
                  <div key={ii} onClick={()=>onOpenProject(projects.find(p=>p.id===item.projectId))}
                    style={{background:getColor(item)+"25",borderLeft:\`2px solid \${getColor(item)}\`,borderRadius:"0 3px 3px 0",padding:"1px 3px",fontSize:9,color:getColor(item),fontWeight:700,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Barlow Condensed',sans-serif"}}>
                    {item.isRound?"↺ ":item.isShoot?"🎬 ":item.isIngest?"📥 ":""}{item.isRound?item.label:item.title}
                  </div>
                ))}
                {items.length>4&&<div style={{fontSize:8,color:"#4b5563",textAlign:"center"}}>+{items.length-4}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Shared: Mentions feed ─────────────────────────────────────────────────────
const MentionsFeed = ({member, projects, onUpdateProject, onOpenProject}) => {
  const [replyNote,setReplyNote]=useState(null); // {projectId, originalNote}
  const [replyText,setReplyText]=useState("");

  const firstName=member.name.split(" ")[0];
  // Not memoized so replies appear immediately
  const mentions=(()=>{
    const results=[];
    projects.forEach(p=>{
      (p.notes||[]).forEach(note=>{
        if(note.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)){
          results.push({...note,projectId:p.id,projectName:p.name});
        }
      });
    });
    return results.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  })();

  const sendReply=(proj,originalNote)=>{
    if(!replyText.trim()) return;
    const originalAuthorName=(originalNote.authorName||"").split(" ")[0];
    const newNote={
      id:uid(),text:\`@\${originalAuthorName} \${replyText.trim()}\`,
      authorId:member.id,authorName:member.name,
      createdAt:new Date().toISOString(),tags:[\`@\${originalAuthorName}\`]
    };
    const p=projects.find(x=>x.id===proj.projectId||x.id===proj);
    if(p) onUpdateProject(p.id,"notes",[...(p.notes||[]),newNote]);
    setReplyNote(null);setReplyText("");
  };

  if(mentions.length===0) return (
    <div style={{textAlign:"center",padding:"24px 0",color:"#374151",fontSize:14}}>No @mentions yet.</div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {mentions.slice(0,12).map(note=>{
        const author=projects.flatMap(p=>p.notes||[]).find(n=>n.id===note.id);
        const isReplyOpen=replyNote?.id===note.id;
        return (
          <div key={note.id} style={{background:"#111827",border:"1px solid #1f293780",borderRadius:10,padding:"10px 13px"}}>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>
              <span style={{color:"#9ca3af",fontWeight:700}}>{note.authorName}</span> · {note.projectName} · {fmtDT(note.createdAt)}
            </div>
            <div style={{fontSize:14,color:"#e2e8f0",marginBottom:8,lineHeight:1.4}}>
              {note.text.split(/(@\\w+)/g).map((p,i)=>p.startsWith("@")?<span key={i} style={{color:"#6366f1",fontWeight:700}}>{p}</span>:p)}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
              <button onClick={()=>onOpenProject&&onOpenProject(projects.find(p=>p.id===note.projectId))}
                style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:11,fontWeight:700,padding:0,textDecoration:"underline"}}>
                {note.projectName} →
              </button>
              {!isReplyOpen&&(
                <button onClick={()=>{setReplyNote(note);setReplyText(\`@\${note.authorName.split(" ")[0]} \`);}}
                  style={{background:"#1f2937",border:"none",borderRadius:5,color:"#6b7280",padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>
                  ↩ Reply
                </button>
              )}
            </div>
            {isReplyOpen&&(
              <div style={{display:"flex",gap:6,marginTop:6}}>
                <input value={replyText} onChange={e=>setReplyText(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")sendReply(note,note);}}
                  placeholder={\`Reply to @\${note.authorName.split(" ")[0]}…\`}
                  style={{flex:1,background:"#0a0f1a",border:"1px solid #374151",borderRadius:6,color:"#e2e8f0",padding:"5px 9px",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"}}
                  autoFocus/>
                <button onClick={()=>sendReply(note,note)} style={{background:"#6366f1",border:"none",borderRadius:6,color:"#fff",padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>Send</button>
                <button onClick={()=>{setReplyNote(null);setReplyText("");}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:16}}>×</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── Section header helper ─────────────────────────────────────────────────────
const RVSec = ({title,count,color="#6366f1",action,children,defaultOpen=true}) => {
  const [open,setOpen]=useState(defaultOpen);
  return (
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:open?12:0,cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div style={{width:3,height:20,borderRadius:99,background:color,flexShrink:0}}/>
        <div style={{fontWeight:900,fontSize:16,color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",textTransform:"uppercase",flex:1}}>{title}</div>
        {count!=null&&<div style={{background:color+"22",color,borderRadius:99,padding:"1px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>{count}</div>}
        {action&&<div onClick={e=>e.stopPropagation()}>{action}</div>}
        <span style={{color:"#4b5563",fontSize:12}}>{open?"▲":"▼"}</span>
      </div>
      {open&&children}
    </div>
  );
};

// ── My Task Alerts — shared component used by all dashboards ─────────────────
// Shows incomplete checklist items for this person across all their projects.
const MY_ROLE_TASKS = {
  "Producer":[
    {label:"Project brief filled in",         check:p=>!!p.briefNotes},
    {label:"Workstream set",                  check:p=>!!p.workstream},
    {label:"Final deadline set",              check:p=>!!p.deadline},
    {label:"Production added",                check:p=>(p.productions||[]).length>0},
    {label:"Main team assigned",              check:p=>{const a=p.assignees||{};return !!(a.Producer?.length&&a["Project Manager"]?.length);}},
  ],
  "Executive Producer":[
    {label:"Project brief filled in",         check:p=>!!p.briefNotes},
    {label:"Main team assigned",              check:p=>{const a=p.assignees||{};return !!(a.Producer?.length&&a["Project Manager"]?.length);}},
  ],
  "Project Manager":[
    {label:"Keywords added",                  check:p=>(p.keywords||[]).length>0},
    {label:"Status set",                      check:p=>!!p.status&&p.status!=="Ideation"},
  ],
  "Post Production Manager":[
    {label:"Deliverables added",              check:p=>(p.deliverables||[]).length>0},
    {label:"Editors assigned to deliverables",check:p=>(p.deliverables||[]).every(d=>d.editorId)},
  ],
  "Media Manager":[
    {label:"Ingest dates confirmed",          check:p=>{const prods=p.productions||[];return prods.some(pr=>pr.ingest?.datetime)||(p.ingestDates||[]).length>0;}},
  ],
  "Editor":[
    {label:"Frame links entered",             check:(p,m)=>{const myDels=(p.deliverables||[]).filter(d=>d.editorId===m.id);return myDels.length===0||myDels.every(d=>!!d.frameLink);}},
    {label:"Deliverable info added",          check:(p,m)=>{const myDels=(p.deliverables||[]).filter(d=>d.editorId===m.id);return myDels.length===0||myDels.every(d=>!!d.deadline);}},
  ],
  "Animator":[
    {label:"Frame links entered",             check:(p,m)=>{const myDels=(p.deliverables||[]).filter(d=>d.animatorId===m.id);return myDels.length===0||myDels.every(d=>!!d.frameLink);}},
  ],
};

const MyTaskAlerts = ({member, projects, onOpenProject}) => {
  const SKIP_STATUSES = ["Delivered","Canceled","On Hold","Ideation"];

  const alerts = useMemo(()=>{
    return projects
      .filter(p=>!SKIP_STATUSES.includes(p.status))
      .map(p=>{
        const assignees = p.assignees||{};
        const myRoles = Object.entries(assignees)
          .filter(([,ids])=>(ids||[]).includes(member.id))
          .map(([role])=>role);
        if(!myRoles.length) return null;
        const incomplete = [];
        myRoles.forEach(role=>{
          const tasks = MY_ROLE_TASKS[role];
          if(!tasks) return;
          tasks.forEach(t=>{ if(!t.check(p,member)) incomplete.push(t.label); });
        });
        if(!incomplete.length) return null;
        return {project:p, myRoles, incomplete};
      })
      .filter(Boolean);
  }, [projects, member.id]);

  if(!alerts.length) return null;

  const total = alerts.reduce((s,a)=>s+a.incomplete.length,0);

  return (
    <div style={{marginBottom:20,background:"#0f172a",border:"1px solid #f9741625",borderRadius:10,overflow:"hidden"}}>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderBottom:"1px solid #1f2937"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:13}}>⚠️</span>
          <span style={{fontSize:11,fontWeight:800,color:"#f97316",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.1em"}}>
            Action Required
          </span>
        </div>
        <span style={{fontSize:11,color:"#6b7280",fontFamily:"'Barlow Condensed',sans-serif"}}>{total} incomplete task{total!==1?"s":""} across {alerts.length} project{alerts.length!==1?"s":""}</span>
      </div>
      {/* One compact row per project */}
      {alerts.map(({project,myRoles,incomplete},idx)=>(
        <div key={project.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 14px",borderBottom:idx<alerts.length-1?"1px solid #1a2035":"none",transition:"background 0.1s"}}
          onMouseEnter={e=>e.currentTarget.style.background="#ffffff06"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          {/* Project + role */}
          <div style={{minWidth:0,flex:"0 0 220px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
            <div style={{fontSize:10,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>{myRoles[0]}</div>
          </div>
          {/* Incomplete tasks as inline chips */}
          <div style={{flex:1,display:"flex",flexWrap:"wrap",gap:4}}>
            {incomplete.map((label,i)=>(
              <span key={i} style={{background:"#f9741612",border:"1px solid #f9741628",borderRadius:4,padding:"1px 7px",fontSize:10,color:"#fb923c",fontFamily:"'Barlow Condensed',sans-serif",whiteSpace:"nowrap"}}>
                {label}
              </span>
            ))}
          </div>
          {/* Open button */}
          {onOpenProject&&(
            <button onClick={()=>onOpenProject(project)}
              style={{background:"transparent",border:"1px solid #374151",borderRadius:5,color:"#6b7280",padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.04em",flexShrink:0,whiteSpace:"nowrap"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#fb923c";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#374151";e.currentTarget.style.color="#6b7280";}}>
              Open →
            </button>
          )}
        </div>
      ))}
    </div>
  );
};

// ── Editor Dashboard ──────────────────────────────────────────────────────────
const EditorDashboard = ({member, projects, team=[], onOpenProject, onUpdateProject, onUpdateDel}) => {
  const STAGE_ORDER=["Ideation","Pre-Pro","In Production","Post","On Hold"];

  const myDels = useMemo(()=>
    projects.flatMap(p=>p.deliverables
      .filter(d=>d.editorId===member.id||d.animatorId===member.id)
      .map(d=>({...d,projectId:p.id,projectName:p.name,workstream:p.workstream,projectStatus:p.status}))
    ).sort((a,b)=>{if(!a.deadline)return 1;if(!b.deadline)return -1;return new Date(a.deadline)-new Date(b.deadline);}),
    [projects,member.id]);

  const active    = myDels.filter(d=>d.status!=="Delivered");
  const completed = myDels.filter(d=>d.status==="Delivered");

  // Group active by project
  const byProject = useMemo(()=>{
    const m={};
    active.forEach(d=>{if(!m[d.projectName])m[d.projectName]={projectId:d.projectId,projectStatus:d.projectStatus,dels:[]};m[d.projectName].dels.push(d);});
    return Object.entries(m).sort((a,b)=>{
      const earliest=g=>g.dels.reduce((mn,d)=>d.deadline&&(!mn||new Date(d.deadline)<new Date(mn))?d.deadline:mn,null);
      const ea=earliest(a[1]),eb=earliest(b[1]);
      if(!ea)return 1;if(!eb)return -1;return new Date(ea)-new Date(eb);
    });
  },[active]);

  // Group completed by quarter
  const completedByQ = useMemo(()=>{
    const m={};
    completed.forEach(d=>{
      if(!d.deadline)return;
      const dt=new Date(d.deadline);
      const k=\`\${dt.getFullYear()} Q\${Math.floor(dt.getMonth()/3)+1}\`;
      if(!m[k])m[k]=[];m[k].push(d);
    });
    return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
  },[completed]);

  const nowQ=(()=>{const n=new Date();return \`\${n.getFullYear()} Q\${Math.floor(n.getMonth()/3)+1}\`;})();
  const [showAllCompletes,setShowAllCompletes]=useState(false);
  const visibleQ=showAllCompletes?completedByQ:completedByQ.filter(([q])=>q===nowQ);

  const [expandedDel,setExpandedDel]=useState(null);

  const DelCard=({d})=>{
    const changes=d.rounds.some(r=>r.status==="Changes Requested");
    const c=changes?"#ef4444":DCOLOR[d.status];
    const isExp=expandedDel===d.id;
    const proj=projects.find(p=>p.id===d.projectId);
    return (
      <div style={{border:\`1px solid \${isExp?"#6366f1":changes?"#ef444430":"#1f2937"}\`,borderRadius:9,overflow:"hidden",marginBottom:4}}>
        <div onClick={()=>setExpandedDel(isExp?null:d.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:isExp?"#1f2937":"#111827",cursor:"pointer"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</div>
            <div style={{fontSize:12,color:"#6b7280"}}>{d.projectName} · <Dl date={d.deadline} inline/></div>
          </div>
          <Chip label={d.status} color={c} xs/>
          {changes&&<Chip label="↩" color="#ef4444" xs/>}
          {d.frameLink&&<a href={d.frameLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:"#6366f1",textDecoration:"none",fontWeight:700}}>Frame ↗</a>}
          <span style={{color:"#4b5563",fontSize:12}}>{isExp?"▲":"›"}</span>
        </div>
        {isExp&&proj&&(
          <div style={{padding:"12px 14px",background:"#0d1117",borderTop:"1px solid #1f2937",display:"flex",flexDirection:"column",gap:10}}>
            {/* Quick status change */}
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{fontSize:11,fontWeight:800,color:"#4b5563",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",flexShrink:0}}>Status</div>
              <select value={d.status} onChange={e=>onUpdateDel(d.projectId,d.id,"status",e.target.value)}
                style={{background:DCOLOR[d.status]+"18",border:\`1px solid \${DCOLOR[d.status]}40\`,borderRadius:6,color:DCOLOR[d.status],padding:"4px 8px",fontSize:13,outline:"none",fontWeight:700}}>
                {DELIVERABLE_STATUSES.map(s=><option key={s} style={{background:"#0d1117",color:"#e2e8f0"}}>{s}</option>)}
              </select>
              <Btn small onClick={()=>onOpenProject(proj,"deliverables",d.id)}>Open full detail →</Btn>
            </div>
            {/* Frame link quick edit */}
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{fontSize:11,fontWeight:800,color:"#4b5563",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",flexShrink:0,width:80}}>Frame.io</div>
              <input value={d.frameLink||""} onChange={e=>onUpdateDel(d.projectId,d.id,"frameLink",e.target.value)}
                placeholder="https://frame.io/…"
                style={{flex:1,background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:6,color:"#e2e8f0",padding:"5px 8px",fontSize:12,outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
              {d.framePW&&<span style={{fontSize:11,color:"#6b7280"}}>PW: <span style={{fontFamily:"monospace",color:"#9ca3af"}}>{d.framePW}</span></span>}
            </div>
            {/* Active round summary */}
            {d.rounds.length>0&&(()=>{
              const ar=d.rounds.find(r=>r.status!=="Approved");
              return ar&&<div style={{background:"#1e3a5f22",border:"1px solid #3b82f640",borderRadius:7,padding:"7px 10px",fontSize:12}}>
                <span style={{color:"#60a5fa",fontWeight:700}}>{ar.label}</span> <span style={{color:"#4b5563"}}>· {ar.status} · Due {fmtDate(ar.deadline)}</span>
              </div>;
            })()}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>
          👋 {member.name}
        </div>
        <div style={{fontSize:14,color:"#6b7280"}}>{member.roles.join(" · ")} · {active.length} active deliverable{active.length!==1?"s":""}</div>
      </div>

      <MyTaskAlerts member={member} projects={projects} onOpenProject={onOpenProject}/>

      {/* Calendar */}
      <RVSec title="My Calendar" color="#6366f1">
        <RoleCalendar memberId={member.id} projects={projects} onOpenProject={p=>onOpenProject(p)} team={team||[]}/>
      </RVSec>

      {/* Mentions */}
      <RVSec title="My Mentions" count={projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${member.name.split(" ")[0].toLowerCase()}\`)).length} color="#f59e0b">
        <MentionsFeed member={member} projects={projects} onUpdateProject={onUpdateProject} onOpenProject={onOpenProject}/>
      </RVSec>

      {/* Active Deliverables */}
      <RVSec title="My Active Deliverables" count={active.length} color="#10b981">
        {active.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No active deliverables.</div>}
        {byProject.map(([projName,{projectId,dels}])=>(
          <div key={projName} style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:800,color:"#4b5563",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6,paddingLeft:2}}>{projName}</div>
            {dels.map(d=><DelCard key={d.id} d={d}/>)}
          </div>
        ))}
      </RVSec>

      {/* Completes */}
      <RVSec title="My Completes" count={completed.length} color="#6b7280" defaultOpen={false}>
        {completed.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No completed deliverables yet.</div>}
        {visibleQ.map(([q,dels])=>(
          <div key={q} style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:800,color:"#6366f1",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:6}}>{q} <span style={{color:"#374151",fontWeight:400}}>({dels.length})</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {dels.map(d=>(
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#111827",border:"1px solid #1f2937",borderRadius:8}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:"#10b981",flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</div>
                    <div style={{fontSize:11,color:"#6b7280"}}>{d.projectName}</div>
                  </div>
                  {d.frameLink&&<a href={d.frameLink} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#6366f1",textDecoration:"none",fontWeight:700}}>Frame ↗</a>}
                  <span style={{fontSize:11,color:"#4b5563"}}>{fmtDate(d.deadline)}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
        {completedByQ.length>1&&(
          <button onClick={()=>setShowAllCompletes(s=>!s)} style={{background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:13,fontWeight:700,padding:"4px 0"}}>
            {showAllCompletes?"Show less ▲":\`Show all \${completed.length} completes ▼\`}
          </button>
        )}
      </RVSec>
    </div>
  );
};

// ── Producer Dashboard ────────────────────────────────────────────────────────
const ProducerDashboard = ({member, projects, team=[], onOpenProject, onUpdateProject}) => {
  const myProjects = useMemo(()=>
    projects.filter(p=>
      (p.assignees?.Producer||[]).includes(member.id)||
      (p.assignees?.["Project Manager"]||[]).includes(member.id)||
      Object.values(p.assignees||{}).flat().includes(member.id)
    ),[projects,member.id]);

  const STAGE_ORDER=["Ideation","Pre-Pro","In Production","Post","On Hold"];
  const active=myProjects.filter(p=>!p.closedAt&&!["Delivered","Canceled"].includes(p.status))
    .sort((a,b)=>STAGE_ORDER.indexOf(a.status)-STAGE_ORDER.indexOf(b.status));
  const completed=myProjects.filter(p=>p.closedAt||["Delivered","Canceled"].includes(p.status))
    .sort((a,b)=>new Date(b.closedAt||b.deadline)-new Date(a.closedAt||a.deadline));

  const upcomingShoots=useMemo(()=>{
    const now=new Date();
    return myProjects.flatMap(p=>(p.shoots||[])
      .filter(s=>s.startTime&&new Date(s.startTime)>=now)
      .map(s=>({...s,projectName:p.name,projectId:p.id}))
    ).sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  },[myProjects]);

  const firstName=member.name.split(" ")[0];
  const mentionCount=projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)).length;

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>👋 {member.name}</div>
        <div style={{fontSize:14,color:"#6b7280"}}>{member.roles.join(" · ")} · {active.length} active project{active.length!==1?"s":""}</div>
      </div>

      <MyTaskAlerts member={member} projects={projects} onOpenProject={onOpenProject}/>

      {/* Calendar */}
      <RVSec title="My Calendar" color="#6366f1">
        <RoleCalendar memberId={member.id} projects={projects} onOpenProject={p=>onOpenProject(p)} team={team||[]}/>
      </RVSec>

      {/* Mentions */}
      <RVSec title="My Mentions" count={mentionCount} color="#f59e0b">
        <MentionsFeed member={member} projects={projects} onUpdateProject={onUpdateProject} onOpenProject={onOpenProject}/>
      </RVSec>

      {/* Active Projects */}
      <RVSec title="My Active Projects" count={active.length} color="#3b82f6">
        {active.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No active projects.</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
          {active.map(p=>{
            const done=p.deliverables.filter(d=>d.status==="Delivered").length;
            const pct=p.deliverables.length?Math.round(done/p.deliverables.length*100):0;
            const changes=p.deliverables.some(d=>d.rounds.some(r=>r.status==="Changes Requested"));
            const nextDel=[...p.deliverables].filter(d=>d.deadline&&d.status!=="Delivered").sort((a,b)=>new Date(a.deadline)-new Date(b.deadline))[0];
            return (
              <div key={p.id} onClick={()=>onOpenProject(p)} style={{background:"#111827",border:\`1px solid \${changes?"#ef444440":"#1f2937"}\`,borderRadius:12,padding:"14px 16px",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=changes?"#ef4444":"#374151"}
                onMouseLeave={e=>e.currentTarget.style.borderColor=changes?"#ef444440":"#1f2937"}>
                <div style={{display:"flex",justifyContent:"space-between",gap:6,marginBottom:8}}>
                  <div style={{fontWeight:800,fontSize:15,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",flex:1}}>{p.name}</div>
                  <Chip label={p.status} color={PCOLOR[p.status]} xs/>
                </div>
                <div style={{height:3,borderRadius:99,background:"#1f2937",marginBottom:6}}>
                  <div style={{height:3,borderRadius:99,width:\`\${pct}%\`,background:pct===100?"#10b981":"linear-gradient(90deg,#6366f1,#8b5cf6)"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280"}}>
                  <span>{done}/{p.deliverables.length} delivered</span>

                </div>
                {changes&&<div style={{fontSize:11,color:"#ef4444",marginTop:4,fontWeight:700}}>↩ Changes requested</div>}
              </div>
            );
