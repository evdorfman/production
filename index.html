        </div>
      </RVSec>

      {/* Upcoming Shoots */}
      <RVSec title="Upcoming Shoots" count={upcomingShoots.length} color="#06b6d4">
        {upcomingShoots.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No upcoming shoots.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {upcomingShoots.slice(0,8).map(s=>(
            <div key={s.id} onClick={()=>onOpenProject(projects.find(p=>p.id===s.projectId),"production",s.id)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:"#111827",border:"1px solid #3b82f630",borderRadius:10,cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#3b82f630"}>
              <div style={{width:36,height:36,borderRadius:8,background:"#3b82f620",border:"1px solid #3b82f640",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🎬</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{s.title||"Shoot"}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{s.projectName} · {s.location||"TBD"}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:"#3b82f6"}}>{fmtDate(s.startTime)}</div>
                <div style={{fontSize:11,color:"#4b5563"}}>{fmtTime(s.startTime)}{s.endTime?" → "+fmtTime(s.endTime):""}</div>
              </div>
            </div>
          ))}
        </div>
      </RVSec>

      {/* Completed Projects */}
      <RVSec title="Completed Projects" count={completed.length} color="#6b7280" defaultOpen={false}>
        {completed.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No completed projects.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {completed.map(p=>(
            <div key={p.id} onClick={()=>onOpenProject(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#0f172a",border:"1px solid #1f2937",borderRadius:9,cursor:"pointer",opacity:0.85}}
              onMouseEnter={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.borderColor="#374151";}}
              onMouseLeave={e=>{e.currentTarget.style.opacity="0.85";e.currentTarget.style.borderColor="#1f2937";}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#9ca3af"}}>{p.name}</div>
                <div style={{fontSize:11,color:"#4b5563"}}>{p.workstream} · Closed {fmtDate(p.closedAt||p.deadline)}</div>
              </div>
              <Chip label="Delivered" color="#10b981" xs/>
            </div>
          ))}
        </div>
      </RVSec>
    </div>
  );
};

// ── Media Manager Dashboard ───────────────────────────────────────────────────
const MediaManagerDashboard = ({member, projects, team=[], onOpenProject, onUpdateProject}) => {
  const firstName=member.name.split(" ")[0];
  const mentionCount=projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)).length;
  const now=new Date();
  const twoWeeks=new Date(now.getTime()+14*24*60*60*1000);
  const [mediaList, setMediaList] = useState(MEDIA_CARDS_SEED);
  const [invSearch, setInvSearch] = useState("");
  const [invCat, setInvCat] = useState("All");
  const [invStat, setInvStat] = useState("All");

  // Stats
  const totalMedia = mediaList.length;
  const byStatus = MEDIA_CARD_STATUSES.reduce((a,s)=>({...a,[s]:mediaList.filter(m=>m.status===s).length}),{});
  const miaItems = mediaList.filter(m=>m.notes?.toLowerCase().includes("mia"));
  const holdItems = mediaList.filter(m=>m.status==="Hold");

  // Filtered inventory
  const invFiltered = mediaList.filter(m=>
    (!invSearch || m.label.toLowerCase().includes(invSearch.toLowerCase()) || (m.folderName||"").toLowerCase().includes(invSearch.toLowerCase()) || (m.projectRef||"").toLowerCase().includes(invSearch.toLowerCase()) || (m.assignedTo||"").toLowerCase().includes(invSearch.toLowerCase()))&&
    (invCat==="All" || m.category===invCat)&&
    (invStat==="All" || m.status===invStat)
  );
  const invByCategory={};
  MEDIA_CATEGORIES.forEach(c=>{invByCategory[c]=[];});
  invFiltered.forEach(m=>{if(invByCategory[m.category])invByCategory[m.category].push(m);});

  // Upcoming ingests from productions[]
  const upcomingIngests = useMemo(()=>{
    const items=[];
    projects.forEach(p=>{
      (p.productions||[]).forEach(prod=>{
        if(prod.ingest?.datetime){
          const dt=new Date(prod.ingest.datetime);
          if(dt>=now&&dt<=twoWeeks) items.push({...prod.ingest,shootTitle:prod.title,shootId:prod.id,projectId:p.id,projectName:p.name,id:\`ig-\${prod.id}\`});
        }
      });
      // legacy shoots
      (p.shoots||[]).forEach(s=>{
        if(s.ingest?.datetime){
          const dt=new Date(s.ingest.datetime);
          if(dt>=now&&dt<=twoWeeks) items.push({...s.ingest,shootTitle:s.title,shootId:s.id,projectId:p.id,projectName:p.name,id:\`ig-s-\${s.id}\`});
        }
      });
      (p.ingestDates||[]).forEach(ig=>{
        if(ig.datetime){
          const dt=new Date(ig.datetime);
          if(dt>=now&&dt<=twoWeeks) items.push({...ig,projectId:p.id,projectName:p.name});
        }
      });
    });
    return items.sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  },[projects]);

  const INGEST_STATUSES=["Not Received","Media Received","Media Processing","Media Ingested"];
  const statusColor={"Not Received":"#ef4444","Media Received":"#3b82f6","Media Processing":"#f59e0b","Media Ingested":"#10b981"};

  const selS={background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"5px 9px",fontSize:12,outline:"none"};

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>👋 {member.name}</div>
        <div style={{fontSize:14,color:"#6b7280"}}>{member.roles.join(" · ")} · {upcomingIngests.length} ingests in the next 14 days · {byStatus["Available"]||0} items available</div>
      </div>

      <MyTaskAlerts member={member} projects={projects} onOpenProject={onOpenProject}/>

      {/* Storage summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:20}}>
        {[["Total",totalMedia,"#6366f1"],["Available",byStatus["Available"]||0,"#10b981"],["In Use",byStatus["In Use"]||0,"#3b82f6"],["On Hold",byStatus["Hold"]||0,"#f59e0b"],["MIA",miaItems.length,"#a855f7"],["Offloaded",byStatus["Offloaded"]||0,"#6b7280"]].map(([l,n,c])=>(
          <div key={l} style={{background:"#111827",border:\`1px solid \${c}30\`,borderRadius:10,padding:"10px",textAlign:"center",cursor:"pointer"}} onClick={()=>setInvStat(l==="Total"?"All":l==="MIA"?"In Use":l)}>
            <div style={{fontSize:20,fontWeight:900,color:c,fontFamily:"'Barlow Condensed',sans-serif"}}>{n}</div>
            <div style={{fontSize:10,color:"#6b7280",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* MIA / Hold alerts */}
      {(miaItems.length>0||holdItems.length>0)&&(
        <div style={{marginBottom:20,display:"flex",flexDirection:"column",gap:6}}>
          {miaItems.map(m=>(
            <div key={m.id} style={{background:"#a855f710",border:"1px solid #a855f730",borderRadius:8,padding:"8px 14px",display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:14}}>⚠️</span>
              <div style={{flex:1}}>
                <span style={{fontSize:13,fontWeight:700,color:"#a855f7"}}>{m.label}</span>
                <span style={{fontSize:12,color:"#6b7280",marginLeft:8}}>{m.notes}</span>
              </div>
              <Chip label="MIA" color="#a855f7" xs/>
              {m.assignedTo&&<span style={{fontSize:11,color:"#6b7280"}}>Last seen: {m.assignedTo}</span>}
            </div>
          ))}
          {holdItems.map(m=>(
            <div key={m.id} style={{background:"#f59e0b10",border:"1px solid #f59e0b30",borderRadius:8,padding:"8px 14px",display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:14}}>🔒</span>
              <div style={{flex:1}}>
                <span style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>{m.label}</span>
                {m.notes&&<span style={{fontSize:12,color:"#6b7280",marginLeft:8}}>{m.notes}</span>}
              </div>
              <Chip label="Hold" color="#f59e0b" xs/>
            </div>
          ))}
        </div>
      )}

      {/* Full inventory */}
      <RVSec title="Media Inventory" count={\`\${byStatus["Available"]||0}/\${totalMedia} available\`} color="#06b6d4" defaultOpen>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
          <input value={invSearch} onChange={e=>setInvSearch(e.target.value)} placeholder="Search label, folder, project, person…" style={{...selS,flex:"1 1 200px"}}/>
          <select value={invCat} onChange={e=>setInvCat(e.target.value)} style={selS}>
            <option value="All">All Categories</option>
            {MEDIA_CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
          <select value={invStat} onChange={e=>setInvStat(e.target.value)} style={selS}>
            <option value="All">All Statuses</option>
            {MEDIA_CARD_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
          {(invSearch||invCat!=="All"||invStat!=="All")&&<button onClick={()=>{setInvSearch("");setInvCat("All");setInvStat("All");}} style={{background:"none",border:"1px solid #374151",borderRadius:6,color:"#6b7280",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Clear</button>}
          <div style={{fontSize:12,color:"#4b5563"}}>{invFiltered.length} items</div>
        </div>
        {MEDIA_CATEGORIES.map(cat=>{
          const items=invByCategory[cat]||[];
          if(!items.length) return null;
          const avail=items.filter(m=>m.status==="Available").length;
          return(
            <div key={cat} style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontWeight:900,fontSize:13,color:"#06b6d4",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>{cat}</div>

              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {items.map(m=>{

                  return(
                    <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",background:"#111827",border:\`1px solid \${isMIA?"#a855f730":m.status==="Hold"?"#f59e0b30":"#1f2937"}\`,borderRadius:8}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:sc,flexShrink:0}}/>
                      <div style={{minWidth:140,flexShrink:0}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{m.label}</div>
                        {m.folderName&&<div style={{fontSize:9,color:"#4b5563",fontFamily:"monospace"}}>{m.folderName}</div>}
                      </div>
                      <div style={{fontSize:11,color:"#9ca3af",fontWeight:600,flexShrink:0,width:50,textAlign:"right"}}>{m.capacityGB>=1000?\`\${m.capacityGB/1000}TB\`:\`\${m.capacityGB}GB\`}</div>
                      <div style={{flex:1,minWidth:0}}>
                        {m.projectRef&&<div style={{fontSize:11,color:"#6366f1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📁 {m.projectRef}</div>}
                        {m.assignedTo&&<div style={{fontSize:10,color:"#6b7280"}}>👤 {m.assignedTo}</div>}
                      </div>
                      {m.notes&&<div style={{fontSize:10,color:isMIA?"#a855f7":"#f59e0b",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0,fontStyle:"italic"}}>{m.notes}</div>}
                      <Chip label={m.status} color={sc} xs/>
                      {/* Quick status update */}
                      <select value={m.status} onChange={e=>{const ns=e.target.value;setMediaList(prev=>prev.map(x=>x.id!==m.id?x:{...x,status:ns}));}}
                        style={{background:"transparent",border:"none",color:"#4b5563",fontSize:11,cursor:"pointer",outline:"none",flexShrink:0}}>
                        {MEDIA_CARD_STATUSES.map(s=><option key={s} style={{background:"#0d1117",color:"#e2e8f0"}}>{s}</option>)}
                      </select>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {invFiltered.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:"#374151",fontSize:13}}>No items match the current filters.</div>}
      </RVSec>

      {/* Upcoming ingests */}
      <RVSec title="Upcoming Ingests (Next 14 Days)" count={upcomingIngests.length} color="#06b6d4">
        {upcomingIngests.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No ingests scheduled in the next 14 days.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {upcomingIngests.map(ig=>(
            <div key={ig.id} onClick={()=>onOpenProject(projects.find(p=>p.id===ig.projectId),"ingest",ig.id)}
              style={{background:"#111827",border:"1px solid #06b6d430",borderRadius:10,padding:"12px 16px",cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#06b6d4"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#06b6d430"}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:22,flexShrink:0}}>📥</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{ig.projectName}</div>
                  <div style={{fontSize:12,color:"#6b7280"}}>{ig.shootTitle||"Manual ingest"} · {fmtDT(ig.datetime)}</div>
                  {ig.notes&&<div style={{fontSize:12,color:"#4b5563",marginTop:2}}>{ig.notes}</div>}
                </div>
                <select value={ig.status||"Not Received"} onClick={e=>e.stopPropagation()} onChange={e=>e.stopPropagation()}
                  style={{background:(statusColor[ig.status||"Not Received"])+"18",border:\`1px solid \${statusColor[ig.status||"Not Received"]}40\`,borderRadius:6,color:statusColor[ig.status||"Not Received"],padding:"3px 8px",fontSize:12,fontWeight:700,outline:"none"}}>
                  {INGEST_STATUSES.map(s=><option key={s} style={{background:"#0d1117",color:"#e2e8f0"}}>{s}</option>)}
                </select>
              </div>
            </div>
          ))}
        </div>
      </RVSec>

      {/* ── Asset Requests from Productions ── */}
      {(()=>{
        const allRequests = projects.flatMap(p=>
          (p.productions||[]).flatMap(prod=>
            (prod.assetRequests||[]).map(r=>({...r,projectName:p.name,productionTitle:prod.title,projectId:p.id}))
          )
        );
        const pending=allRequests.filter(r=>r.status==="Pending");
        const fulfilled=allRequests.filter(r=>r.status==="Fulfilled");
        if(allRequests.length===0) return null;
        return(
          <RVSec title="📦 Asset Requests" count={pending.length>0?\`\${pending.length} pending\`:allRequests.length} color="#a855f7" defaultOpen={pending.length>0}>
            {pending.length===0&&fulfilled.length===0&&<div style={{textAlign:"center",padding:"14px 0",color:"#374151",fontSize:13}}>No asset requests.</div>}
            {pending.length>0&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:800,color:"#a855f7",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:6}}>Pending ({pending.length})</div>
                {pending.map(r=>(
                  <div key={r.id} style={{background:"#111827",border:"1px solid #a855f730",borderRadius:9,padding:"10px 14px",marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{r.title}</div>
                        <div style={{fontSize:11,color:"#6b7280"}}>↗ {r.projectName} / {r.productionTitle} · {fmtDate(r.requestedAt)}</div>
                        {r.format&&<div style={{fontSize:11,color:"#6b7280"}}>Format: {r.format}</div>}
                        {r.notes&&<div style={{fontSize:11,color:"#6b7280",fontStyle:"italic"}}>{r.notes}</div>}
                      </div>
                      <Chip label="Pending" color="#f59e0b" xs/>
                    </div>
                    <button onClick={()=>{
                      // Mark as fulfilled (in a real app would update the project)
                    }} style={{background:"#10b98120",border:"1px solid #10b98140",borderRadius:6,color:"#10b981",padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>
                      Mark Fulfilled
                    </button>
                  </div>
                ))}
              </div>
            )}
            {fulfilled.length>0&&(
              <div>
                <div style={{fontSize:10,fontWeight:800,color:"#6b7280",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em",marginBottom:6}}>Fulfilled ({fulfilled.length})</div>
                {fulfilled.map(r=>(
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#0f172a",borderRadius:7,opacity:0.7,marginBottom:3}}>
                    <span style={{fontSize:12,color:"#9ca3af",flex:1}}>{r.title}</span>
                    <span style={{fontSize:10,color:"#4b5563"}}>{r.projectName}</span>
                    <Chip label="Fulfilled" color="#10b981" xs/>
                  </div>
                ))}
              </div>
            )}
          </RVSec>
        );
      })()}

      <RVSec title="My Mentions" count={mentionCount} color="#f59e0b">
        <MentionsFeed member={member} projects={projects} onUpdateProject={onUpdateProject} onOpenProject={onOpenProject}/>
      </RVSec>
    </div>
  );
};
const ProjectManagerDashboard = ({member, projects, team=[], onOpenProject, onUpdateProject}) => {
  const firstName=member.name.split(" ")[0];
  const mentionCount=projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)).length;
  const STAGE_ORDER=["Ideation","Pre-Pro","In Production","Post","On Hold"];

  const myProjects=useMemo(()=>projects.filter(p=>
    Object.values(p.assignees||{}).flat().includes(member.id)
  ),[projects,member.id]);

  const active=myProjects.filter(p=>!p.closedAt&&!["Delivered","Canceled"].includes(p.status))
    .sort((a,b)=>STAGE_ORDER.indexOf(a.status)-STAGE_ORDER.indexOf(b.status));
  const completed=myProjects.filter(p=>p.closedAt||["Delivered","Canceled"].includes(p.status))
    .sort((a,b)=>new Date(b.closedAt||b.deadline)-new Date(a.closedAt||a.deadline));

  // Projects with unassigned key roles
  const unassignedProjects=useMemo(()=>projects.filter(p=>{
    if(p.closedAt||["Delivered","Canceled"].includes(p.status)) return false;
    const a=p.assignees||{};
    const missingEditor=p.deliverables.some(d=>!d.editorId&&!d.animatorId&&d.status!=="Delivered");
    const missingProducer=!(a.Producer||[]).length&&!(a["Project Manager"]||[]).length;
    return missingEditor||missingProducer;
  }),[projects]);

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>👋 {member.name}</div>
        <div style={{fontSize:14,color:"#6b7280"}}>{member.roles.join(" · ")} · {active.length} active project{active.length!==1?"s":""}</div>
      </div>

      <MyTaskAlerts member={member} projects={projects} onOpenProject={onOpenProject}/>

      <RVSec title="My Calendar" color="#6366f1">
        <RoleCalendar memberId={member.id} projects={projects} onOpenProject={p=>onOpenProject(p)} team={team||[]}/>
      </RVSec>

      <RVSec title="My Mentions" count={mentionCount} color="#f59e0b">
        <MentionsFeed member={member} projects={projects} onUpdateProject={onUpdateProject} onOpenProject={onOpenProject}/>
      </RVSec>

      <RVSec title="My Active Projects" count={active.length} color="#3b82f6">
        {active.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No active projects.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {active.map(p=>{
            const done=p.deliverables.filter(d=>d.status==="Delivered").length;
            const pct=p.deliverables.length?Math.round(done/p.deliverables.length*100):0;
            return (
              <div key={p.id} onClick={()=>onOpenProject(p)} style={{background:"#111827",border:"1px solid #1f2937",borderRadius:10,padding:"12px 16px",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#374151"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#1f2937"}>
                <div style={{display:"flex",justifyContent:"space-between",gap:6,marginBottom:6}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{p.name}</div>
                  <Chip label={p.status} color={PCOLOR[p.status]} xs/>
                </div>
                <div style={{height:3,borderRadius:99,background:"#1f2937"}}>
                  <div style={{height:3,borderRadius:99,width:\`\${pct}%\`,background:pct===100?"#10b981":"linear-gradient(90deg,#6366f1,#8b5cf6)"}}/>
                </div>
                <div style={{fontSize:12,color:"#4b5563",marginTop:4}}>{done}/{p.deliverables.length} delivered</div>
              </div>
            );
          })}
        </div>
      </RVSec>

      {/* Unassigned Roles */}
      <RVSec title={\`⚠ Needs Assignment\`} count={unassignedProjects.length} color="#ef4444" defaultOpen={unassignedProjects.length>0}>

// ── DP Dashboard (similar to Producer) ───────────────────────────────────────
const DPDashboard = ({member, projects, team=[], onOpenProject, onUpdateProject}) => {
  const firstName=member.name.split(" ")[0];
  const mentionCount=projects.flatMap(p=>p.notes||[]).filter(n=>n.text.toLowerCase().includes(\`@\${firstName.toLowerCase()}\`)).length;
  const now=new Date();

  const myShootsRaw=useMemo(()=>{
    const items=[];
    projects.forEach(p=>{
      (p.shoots||[]).forEach(s=>{
        const isOnShoot=(s.crewInternal||[]).some(c=>c.memberId===member.id)||
          (s.crewExternal||[]).some(c=>c.name===member.name);
        if(isOnShoot) items.push({...s,projectId:p.id,projectName:p.name});
      });
    });
    return items;
  },[projects,member]);

  const upcomingShoots=myShootsRaw.filter(s=>s.startTime&&new Date(s.startTime)>=now)
    .sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const prevShoots=myShootsRaw.filter(s=>s.startTime&&new Date(s.startTime)<now)
    .sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>👋 {member.name}</div>
        <div style={{fontSize:14,color:"#6b7280"}}>{member.roles.join(" · ")} · {upcomingShoots.length} upcoming shoot{upcomingShoots.length!==1?"s":""}</div>
      </div>

      <MyTaskAlerts member={member} projects={projects} onOpenProject={onOpenProject}/>

      <RVSec title="My Calendar" color="#6366f1">
        <RoleCalendar memberId={member.id} projects={projects} onOpenProject={p=>onOpenProject(p)} team={team||[]}/>
      </RVSec>

      <RVSec title="My Mentions" count={mentionCount} color="#f59e0b">
        <MentionsFeed member={member} projects={projects} onUpdateProject={onUpdateProject} onOpenProject={onOpenProject}/>
      </RVSec>

      <RVSec title="Upcoming Shoots" count={upcomingShoots.length} color="#3b82f6">
        {upcomingShoots.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#374151",fontSize:14}}>No upcoming shoots assigned.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {upcomingShoots.map(s=>(
            <div key={s.id} onClick={()=>onOpenProject(projects.find(p=>p.id===s.projectId),"production",s.id)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#111827",border:"1px solid #3b82f630",borderRadius:10,cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#3b82f630"}>
              <div style={{fontSize:22,flexShrink:0}}>🎬</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{s.title||"Shoot"}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{s.projectName} · {s.location||"TBD"}</div>
                {/* Personal call time vs shoot call time */}
                {(()=>{
                  const myEntry=(s.crewInternal||[]).find(c=>c.memberId===member.id)||(s.crewExternal||[]).find(c=>c.name===member.name);
                  const myCall=myEntry?.callTime;
                  return (
                    <div style={{fontSize:11,marginTop:3}}>
                      {myCall&&myCall!==fmtTime(s.startTime)&&(
                        <span style={{color:"#60a5fa",fontWeight:700}}>Your call: {myCall} · </span>
                      )}

                    </div>

    <div>
      <div style={{marginBottom:20}}>

        <div style={{fontSize:14,color:"#6b7280"}}>Manager Overview · {active.length} active projects · {allActiveDels.length} active deliverables</div>

        {[["Active Projects",active.length,"#3b82f6"],["Active Deliverables",allActiveDels.length,"#6366f1"],["Changes Needed",changesNeeded.length,"#ef4444"],["Completed Projects",completed.length,"#10b981"]].map(([label,val,color])=>(

              {members.map(m=>(
                <button key={m.id} onClick={()=>setSelectedMember(m.id)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"#111827",border:"1px solid #1f2937",borderRadius:10,cursor:"pointer",textAlign:"left",width:"100%"}}

                    <div style={{fontSize:11,color:"#6b7280"}}>{m.roles[0]}</div>
                    <div style={{fontSize:10,color:"#374151"}}>{m.employeeType}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );

  const isEditor = member.roles.some(r=>["Editor","Animator","Designer","Head of Post Production","Media Manager"].includes(r));
  const isProducer= member.roles.some(r=>["Producer","Executive Producer","Project Manager","Post Production Manager"].includes(r));

  return (
    <div>
      {/* Back + member header */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,paddingBottom:16,borderBottom:"1px solid #1f2937"}}>
        <button onClick={()=>setSelectedMember(null)} style={{background:"#1f2937",border:"none",borderRadius:7,color:"#9ca3af",padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>← Back</button>
        <Av name={member.name} size={40}/>
        <div>
          <div style={{fontWeight:900,fontSize:20,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif"}}>{member.name}</div>
          <div style={{fontSize:13,color:"#6b7280"}}>{member.roles.join(" · ")} · {member.employeeType}</div>
        </div>
        {/* Switch to another person */}
        <select value={selectedMember} onChange={e=>setSelectedMember(Number(e.target.value))}
          style={{marginLeft:"auto",background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"6px 10px",fontSize:13,outline:"none"}}>

      </div>

      {(()=>{
        const roles=member.roles;
        const isEditor   = roles.some(r=>["Editor","Animator","Designer","Head of Post Production"].includes(r));
        const isProducer = roles.some(r=>["Producer","Executive Producer"].includes(r));
        const isMediaMgr = roles.some(r=>["Media Manager"].includes(r));
        const isPM       = roles.some(r=>["Project Manager","Post Production Manager"].includes(r));
        const isDP       = roles.some(r=>["DP","Camera Op","Gaffer"].includes(r))&&!isEditor&&!isProducer;
        const isManager  = roles.some(r=>["Executive Producer"].includes(r));
        const isBroadcast= member.department==="Broadcast";

        if(isBroadcast)
          return <BroadcastDashboard member={member} projects={projects} team={team} studioBookings={studioBookings} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject} onUpdateStudioBookings={onUpdateStudioBookings} showToast={showToast}/>;
        if(isManager&&!isEditor&&!isProducer)
          return <ManagerDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
        if(isEditor)
          return <EditorDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject} onUpdateDel={onUpdateDel}/>;
        if(isProducer)
          return <ProducerDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
        if(isMediaMgr)
          return <MediaManagerDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
        if(isPM)
          return <ProjectManagerDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
        if(isDP)
          return <DPDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
        return <ManagerDashboard member={member} projects={projects} team={team} onOpenProject={onOpenProject} onUpdateProject={onUpdateProject}/>;
      })()}
    </div>
  );
};

const calcHMUWindow = st => { if(!st)return null; return {start:calcCrewCall(st),end:st}; };

const makeHMUBooking = (parent, station) => { const w=calcHMUWindow(parent.startTime); if(!w)return null; return {id:uid(),title:\`\${parent.title} — HMU Prep\`,projectId:parent.projectId||null,parentBookingId:parent.id,bookingStatus:"Tentative",productionType:parent.productionType||"Content Filming",location:station,startTime:w.start,endTime:w.end,crewCallTime:null,notes:\`Auto-created: HMU prep for "\${parent.title}".\`,equipmentIds:[],confirmations:[],crewInternal:[],crewExternal:[{id:uid(),role:"Hair & Makeup Artist",name:"",company:"",callTime:fmtCrewCall(w.start)}]}; };
const detectConflicts = (location,startTime,endTime,allBookings,excludeId=null) => { if(!location||!startTime||!endTime)return []; const st=new Date(startTime).getTime(),et=new Date(endTime).getTime(); return allBookings.filter(b=>{if(b.id===excludeId||b.location!==location||["Cancelled","Completed"].includes(b.bookingStatus)||!b.startTime||!b.endTime)return false; const bst=new Date(b.startTime).getTime(),bet=new Date(b.endTime).getTime(); return !(bet<=st||bst>=et);}); };

// ─── Calendar Event Drawer ────────────────────────────────────────────────────
// Slide-in from right, overlays the calendar without pushing it.
const CalEventDrawer = ({item, projects, team, onClose, onUpdateProject, onOpenProject}) => {
  const [vis, setVis] = useState(false);
  const [aiSummary, setAiSummary] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const backdropRef = useRef();

  useEffect(()=>{ requestAnimationFrame(()=>setVis(true)); },[]);

  const close = () => { setVis(false); setTimeout(onClose, 220); };

  // Close on Escape
  useEffect(()=>{
    const h = e=>{ if(e.key==="Escape") close(); };
    document.addEventListener("keydown",h);
    return ()=>document.removeEventListener("keydown",h);
  },[]);

  if(!item) return null;

  const proj = projects.find(p=>p.id===item.projectId);

  // Check for existing AI summary on project
  useEffect(()=>{
    if(proj?.briefSummary) setAiSummary(proj.briefSummary);
  },[proj?.id]);

  const generateAISummary = async () => {
    if(!proj) return;
    setAiLoading(true);
    const prompt = \`You are a post-production project manager. Write a 2-sentence summary of this campaign that captures: client/project name, type of content, key deadlines and current status. Be concise and specific.\\n\\nProject: \${proj.name}\\nStatus: \${proj.status}\\nWorkstream: \${proj.workstream||"—"}\\nBusiness Unit: \${proj.businessUnit||"—"}\\nDeadline: \${proj.deadline||"TBD"}\\nBrief notes: \${proj.briefNotes||"No brief yet."}\\nDeliverables: \${(proj.deliverables||[]).map(d=>d.title).join(", ")||"None yet."}\`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:120,messages:[{role:"user",content:prompt}]})});
      const data = await res.json();
      const summary = data.content?.[0]?.text || "";
      setAiSummary(summary);
      if(onUpdateProject && proj) onUpdateProject(proj.id,"briefSummary",summary);
    } catch(e){ setAiSummary("Could not generate summary."); }
    setAiLoading(false);
  };

  // Colors and labels
  const typeColor = item.isShoot?"#3b82f6":item.isIngest?"#06b6d4":item.isRound?"#f59e0b":"#ef4444";
  const typeLabel = item.isShoot?"🎬 Shoot":item.isIngest?"📥 Ingest":item.isRound?"↺ Review Round":"🔴 Final Due";

  // Crew for shoot
  const crewList = item.isShoot && item.crew ? [
    ...(item.crew.crewInternal||[]).map(c=>{const m=team.find(t=>t.id===c.memberId);return m?{name:m.name,role:c.role,callTime:c.callTime}:null;}).filter(Boolean),
    ...(item.crew.crewExternal||[]).map(c=>c.name?{name:c.name,role:c.role,callTime:c.callTime}:null).filter(Boolean),
  ] : [];

  // Deliverable + round info
  const del = !item.isRound && !item.isShoot && !item.isIngest ? proj?.deliverables?.find(d=>d.id===item.id) : null;
  const roundDel = item.isRound ? proj?.deliverables?.find(d=>d.rounds?.some(r=>r.id===item.id)) : null;
  const ed  = team.find(m=>m.id===(del||roundDel)?.editorId);
  const an  = team.find(m=>m.id===(del||roundDel)?.animatorId);
  const pr  = team.find(m=>m.id===(del||roundDel)?.producerId);
  const prodMember = team.find(m=>m.id===item.producerId);

  // Quick notes
  const projNotes = (proj?.notes||[]).slice(-3).reverse();

  const Sec = ({title,children})=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:10,fontWeight:800,color:"#4b5563",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.1em",marginBottom:8,paddingBottom:4,borderBottom:"1px solid #1f2937"}}>{title}</div>
      {children}
    </div>
  );

  const Row = ({label,val,color,mono,link,pw})=>{
    if(!val) return null;
    return (
      <div style={{display:"flex",gap:8,padding:"5px 0",alignItems:"flex-start"}}>
        <div style={{width:100,fontSize:11,color:"#6b7280",flexShrink:0,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em",paddingTop:1}}>{label}</div>
        <div style={{fontSize:13,color:color||"#e2e8f0",flex:1,wordBreak:"break-word",fontFamily:mono?"monospace":"inherit"}}>
          {link?<a href={link} target="_blank" rel="noopener noreferrer" style={{color:"#6366f1",textDecoration:"none",fontWeight:700}}>{val} ↗</a>:val}
          {pw&&<span style={{marginLeft:8,fontSize:11,color:"#6b7280"}}>PW: <span style={{fontFamily:"monospace",color:"#9ca3af",cursor:"pointer"}} onClick={()=>navigator.clipboard?.writeText(pw)} title="Click to copy">{pw}</span></span>}
        </div>
      </div>
    );
  };

  const PersonRow = ({label,member})=>{
    if(!member) return null;
    return (
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
        <div style={{width:100,fontSize:11,color:"#6b7280",flexShrink:0,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
        <Av name={member.name} size={20}/>
        <span style={{fontSize:13,color:"#e2e8f0"}}>{member.name}</span>
      </div>
    );
  };

  return (
    <>
      {/* Click-outside backdrop — full screen, transparent, closes drawer */}
      <div ref={backdropRef} onClick={close}
        style={{position:"fixed",inset:0,zIndex:490,background:"transparent",cursor:"default"}}/>

      {/* Drawer — stops propagation so clicking inside doesn't close */}
      <div onClick={e=>e.stopPropagation()} style={{
        position:"fixed",top:0,right:0,bottom:0,width:400,zIndex:500,
        background:"#0d1117",borderLeft:"1px solid #1f2937",
        boxShadow:"-16px 0 48px rgba(0,0,0,0.6)",
        transform:vis?"translateX(0)":"translateX(100%)",
        transition:"transform 0.22s cubic-bezier(0.4,0,0.2,1)",
        display:"flex",flexDirection:"column",
      }}>
        {/* Header */}
        <div style={{padding:"16px 20px",borderBottom:"1px solid #1f2937",background:"#111827",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <Chip label={typeLabel} color={typeColor}/>
            <button onClick={close} style={{background:"#1f2937",border:"none",borderRadius:6,color:"#9ca3af",width:28,height:28,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
          </div>
          {/* Campaign name — clickable */}
          {proj&&(
            <div onClick={()=>{close();onOpenProject&&onOpenProject(proj);}}
              style={{fontSize:12,color:"#6366f1",fontWeight:700,cursor:"pointer",marginBottom:6,display:"flex",alignItems:"center",gap:4}}
              onMouseEnter={e=>e.currentTarget.style.color="#818cf8"}
              onMouseLeave={e=>e.currentTarget.style.color="#6366f1"}>
              ↗ {proj.name}
              <Chip label={proj.status} color={PCOLOR[proj.status]||"#6b7280"} xs/>
            </div>
          )}
          <div style={{fontWeight:900,fontSize:18,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.2}}>
            {item.isRound ? item.label : item.title}
          </div>
          {item.isRound&&<div style={{fontSize:13,color:"#9ca3af",marginTop:3}}>{item.delTitle}</div>}
        </div>

        {/* Scrollable body */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

          {/* ── FINAL DUE DATE panel ── */}
          {!item.isRound&&!item.isShoot&&!item.isIngest&&(
            <>
              <Sec title="Deliverable">
                <Row label="Status" val={item.status} color={DCOLOR[item.status]}/>
                <Row label="Due" val={fmtDT(item.deadline)}/>
                <Row label="Type" val={del?.deliverableType}/>
                <Row label="Aspect Ratio" val={del?.aspectRatio}/>
                <Row label="Length" val={del?.videoLength}/>
                <Row label="Quality" val={del?.quality}/>
              </Sec>
              <Sec title="Team">
                <PersonRow label="Producer" member={pr}/>
                <PersonRow label="Editor" member={ed}/>
                {an&&<PersonRow label="Animator" member={an}/>}
              </Sec>
              {del?.frameLink&&(
                <Sec title="Frame.io">
                  <Row label="Link" val="Open in Frame.io" link={del.frameLink} pw={del.framePW}/>
                  {del.framePW&&(
                    <button onClick={()=>navigator.clipboard?.writeText(del.framePW)}

                      <span style={{fontSize:11,color:"#6b7280",width:60,flexShrink:0}}>{s.time||"—"}</span>

                <Row label="Due" val={fmtDT(item.deadline)}/>

              </Sec>
              {roundDel&&(
                <Sec title="Deliverable Being Reviewed">
                  <Row label="Title" val={roundDel.title}/>
                  <Row label="Status" val={roundDel.status} color={DCOLOR[roundDel.status]}/>
                  <Row label="Aspect Ratio" val={roundDel.aspectRatio}/>

                      style={{background:"#6366f120",border:"1px solid #6366f140",borderRadius:6,color:"#818cf8",padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",marginTop:4}}>

            <Sec title={\`Campaign Notes (\${(proj.notes||[]).length})\`}>
              {projNotes.length===0&&<div style={{fontSize:12,color:"#374151"}}>No notes yet.</div>}
              {projNotes.map(note=>{

};

const PROD_STATUS_COLOR = PROD_STAGE_COLOR;

const INTERSTITIAL_TYPES = ["Holding slide","Disclaimer","Title page","Speaker intro"];

const LivePlaybackAssetPicker = ({production, allProjectDels, allProjects=[], onUpdate, onAddDeliverable}) => {
  const [collapsed, setCollapsed] = useState(true);
  const [addType, setAddType] = useState(null); // "campaign"|"existing"|"interstitial"
  const [intForm, setIntForm] = useState({type:"Holding slide",copy:"",music:false,vog:false,vogUrl:"",notes:""});
  const [reqTitle, setReqTitle] = useState("");
  const [reqNotes, setReqNotes] = useState("");
  const [searchQ, setSearchQ] = useState("");
  const [reqSent, setReqSent] = useState(false);

  const assets = production.playbackAssets || [];
  const updAssets = a => onUpdate("playbackAssets", a);

  const removeAsset = id => updAssets(assets.filter(a=>a.id!==id));

  const addCampaignDel = (delId) => {
    const d = allProjectDels.find(x=>x.id===delId);
    if(!d) return;
    updAssets([...assets,{id:uid(), assetType:"campaign", delId, title:d.title, status:d.status, frameLink:d.frameLink||"", framePW:d.framePW||""}]);
    setAddType(null);
  };

  const addExistingDel = (d, isRequest=false) => {
    if(isRequest) {
      const newReq = {id:uid(), assetType:"request", title:reqTitle, notes:reqNotes, status:"Pending"};
      updAssets([...assets, newReq]);
      onUpdate("assetRequests",[...(production.assetRequests||[]),{id:newReq.id, title:reqTitle, notes:reqNotes, status:"Pending", requestedAt:new Date().toISOString()}]);
      setReqTitle(""); setReqNotes(""); setReqSent(true);
      setTimeout(()=>setReqSent(false), 3000);
    } else {
      updAssets([...assets, {id:uid(), assetType:"existing", delId:d.id, title:d.title, status:d.status||"—", frameLink:d.frameLink||"", framePW:d.framePW||"", projectName:d._proj||""}]);

    setAddType(null);
  };

  const addInterstitial = () => {
    const newDel = mkDel(\`Interstitial — \${intForm.type}\`, null, null, "Not Started", []);

      intForm.copy && \`Copy: \${intForm.copy}\`,
      intForm.music && "Music: Yes",
      intForm.vog && \`VOG: Yes\${intForm.vogUrl?\` — \${intForm.vogUrl}\`:""}\`,
      intForm.notes,

  const globalSearch = searchQ.length>=2
    ? allProjects.flatMap(p=>(p.deliverables||[]).map(d=>({...d,_proj:p.name}))).filter(d=>d.title?.toLowerCase().includes(searchQ.toLowerCase())).slice(0,15)

        <div style={{fontSize:11,fontWeight:800,color:"#10b981",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.08em"}}>
          📼 Playback Assets {assets.length>0&&<span style={{background:"#10b98122",borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:800}}>{assets.length}</span>}
        </div>
        <button onClick={()=>setCollapsed(c=>!c)}

          {collapsed?"▼ Expand":"▲ Collapse"}
        </button>

      {/* Collapsed summary — only shown when collapsed */}

                      </div>}
                      {a.projectName&&<div style={{fontSize:10,color:"#6366f1"}}>{a.projectName}</div>}
                      {a.frameLink&&(
                        <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4}}>
                          <a href={a.frameLink} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#6366f1",fontWeight:700,textDecoration:"none"}}>Frame.io ↗</a>
                          {a.framePW&&<span style={{fontSize:10,color:"#6b7280"}}>PW: <span style={{fontFamily:"monospace",cursor:"pointer"}} onClick={()=>navigator.clipboard?.writeText(a.framePW)} title="Copy">{a.framePW}</span></span>}
                        </div>
                      )}
                    </div>
                    <Chip label={a.status||"—"} color={sc} xs/>
                    <button onClick={()=>removeAsset(a.id)} style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:15,lineHeight:1,flexShrink:0}}>×</button>

          {/* Campaign deliverable picker */}
          {addType==="campaign"&&(

                    <Chip label={d.status||"—"} color={STATUS_COLOR[d.status]||"#6b7280"} xs/>

          {/* Search existing / Request */}
