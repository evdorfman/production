      try { if(s?.value) setStudioSpaces(JSON.parse(s.value)); } catch(e){}
      try { if(m?.value) setStudioSpaceMeta(JSON.parse(m.value)); } catch(e){}
    }).catch(()=>{});
  },[]);

  // Show a toast for 3 seconds
  const showToast = useCallback(({msg, color="#10b981"}) => {
    setToast({msg, color});
    setTimeout(()=>setToast(null), 3000);
  },[]);
  const [kanbanMode,setKanbanMode]=useState("status");
  const [filterStatus,setFilterStatus]=useState("All");
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [addingProject,setAddingProject]=useState(false);

  const updateDel=useCallback((projectId,delId,field,value)=>{
    setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,deliverables:p.deliverables.map(d=>d.id!==delId?d:{...d,[field]:value})}));
  },[]);

  const addDel=useCallback((projectId,newDel)=>{
    setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,deliverables:[...p.deliverables,newDel]}));
  },[]);

  const deleteDel=useCallback((projectId,delId)=>{
    setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,deliverables:p.deliverables.filter(d=>d.id!==delId)}));
  },[]);

  const updateProject=useCallback((projectId,field,value)=>{
    setProjects(prev=>prev.map(p=>p.id!==projectId?p:{...p,[field]:value}));
  },[]);

  const addProject=useCallback(proj=>{
    setProjects(prev=>[proj,...prev]);
  },[]);

  const openProject=useCallback((p,tab,itemId)=>{setSelected(p);setInitialTab(tab?{tab,itemId}:null);},[]);
  const [initialTab,setInitialTab]=useState(null);

  const filtered=useMemo(()=>projects,[projects]);

  const liveSelected=selected?projects.find(p=>p.id===selected.id)||null:null;

  const VIEWS=[{id:"projects",l:"Projects"},{id:"studio",l:"Studio"},{id:"kanban",l:"Kanban"},{id:"calendar",l:"Calendar"},{id:"team",l:"Team"},{id:"deliverables",l:"Deliverables"},{id:"ingest",l:"Ingest"},{id:"myview",l:"My View"},{id:"admin",l:"⚙ Admin"}];
  const inp={background:"#111827",border:"1px solid #1f2937",borderRadius:7,color:"#e2e8f0",padding:"6px 10px",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"};
  const tabS=a=>({padding:"5px 14px",borderRadius:7,fontWeight:800,fontSize:13,cursor:"pointer",border:"none",background:a?"#6366f1":"transparent",color:a?"#fff":"#6b7280",transition:"all 0.18s",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.07em",textTransform:"uppercase"});

  return (
    <>
      <style>{\`@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap');*{box-sizing:border-box;margin:0;padding:0;}body{background:#080c14;}::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:#0f172a;}::-webkit-scrollbar-thumb{background:#374151;border-radius:99px;}select option{background:#0d1117;color:#e2e8f0;}\`}</style>
      <div style={{minHeight:"100vh",background:"#080c14",fontFamily:"'DM Sans',sans-serif",color:"#e2e8f0"}}>
        <div style={{background:"#0d1117",borderBottom:"1px solid #1f2937",padding:"0 24px",position:"sticky",top:0,zIndex:20}}>
          <div style={{maxWidth:1600,margin:"0 auto",display:"flex",alignItems:"center",gap:14,height:52}}>
            <div style={{fontWeight:900,fontSize:22,color:"#f1f5f9",fontFamily:"'Barlow Condensed',sans-serif",flexShrink:0,letterSpacing:"-0.01em"}}><span style={{color:"#6366f1"}}>POST</span>TRACK</div>
            <div style={{height:16,width:1,background:"#1f2937"}}/>
            <div style={{display:"flex",gap:2}}>{VIEWS.map(v=><button key={v.id} style={{...tabS(view===v.id),...(v.id==="studio"&&view!=="studio"?{color:"#818cf8"}:{})}} onClick={()=>setView(v.id)}>{v.l}</button>)}</div>
            {view==="kanban"&&(
              <div style={{display:"flex",gap:2,background:"#0f172a",borderRadius:7,padding:3,border:"1px solid #1f2937"}}>
                <button style={{...tabS(kanbanMode==="status"),background:kanbanMode==="status"?"#1f2937":"transparent",color:kanbanMode==="status"?"#e2e8f0":"#6b7280",fontSize:12}} onClick={()=>setKanbanMode("status")}>By Status</button>
                <button style={{...tabS(kanbanMode==="editor"),background:kanbanMode==="editor"?"#1f2937":"transparent",color:kanbanMode==="editor"?"#e2e8f0":"#6b7280",fontSize:12}} onClick={()=>setKanbanMode("editor")}>By Editor</button>
              </div>
            )}
            <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
              {view==="kanban"&&<>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{...inp,width:150}}/>
                <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={inp}>
                  <option>All</option>{PROJECT_STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
              </>}
              <Btn onClick={()=>setAddingProject(true)}>+ New Project</Btn>
            </div>
          </div>
        </div>

        <div style={{maxWidth:1600,margin:"0 auto",padding:"20px 24px"}}>
          <StatsBar projects={projects} team={teamRoster}/>
          {view==="projects"&&<ProjectsView projects={projects} team={teamRoster} onOpenProject={openProject} onUpdateProject={updateProject}/>}
          {view==="studio"&&<StudioTab projects={projects} studioBookings={studioBookings} onUpdateStudioBookings={setStudioBookings} team={teamRoster}/>}
          {view==="kanban"&&kanbanMode==="status"&&<KanbanStatus projects={filtered} team={teamRoster} onUpdateDel={updateDel}/>}
          {view==="kanban"&&kanbanMode==="editor"&&<KanbanEditor projects={filtered} team={teamRoster} onUpdateDel={updateDel}/>}
          {view==="calendar"&&<CalendarView projects={projects} team={teamRoster} onOpenProject={openProject} onCalEventClick={item=>setCalDrawerItem(item)}/>}
          {view==="team"&&<TeamView team={teamRoster} projects={projects} onOpenProject={openProject}/>}
          {view==="deliverables"&&<DeliverablesTab projects={projects} team={teamRoster} onOpenProject={openProject}/>}
          {view==="ingest"&&<IngestView projects={projects} team={teamRoster} onUpdateProject={updateProject}/>}
          {view==="myview"&&<MyView projects={projects} team={teamRoster} studioBookings={studioBookings} onUpdateStudioBookings={setStudioBookings} onOpenProject={openProject} onUpdateProject={updateProject} onUpdateDel={updateDel} showToast={showToast}/>}
          {view==="admin"&&<AdminView
            team={teamRoster} onUpdateTeam={saveTeam}
            gear={gearList}   onUpdateGear={saveGear}
            spaces={studioSpaces} spaceMeta={studioSpaceMeta}
            onUpdateSpaces={saveSpaces} onUpdateSpaceMeta={saveMeta}
          />}
        </div>

        {calDrawerItem&&<CalEventDrawer item={calDrawerItem} projects={projects} team={teamRoster} onClose={()=>setCalDrawerItem(null)} onUpdateProject={updateProject} onOpenProject={openProject}/>}
        {liveSelected&&<ProjectOverview project={liveSelected} team={teamRoster} allProjects={projects} onClose={()=>setSelected(null)} onUpdateDel={updateDel} onAddDel={addDel} onDeleteDel={deleteDel} onUpdateProject={updateProject} initialTab={initialTab?.tab} initialShootId={initialTab?.itemId} initialItemId={initialTab?.itemId} studioBookings={studioBookings} mediaCards={mediaCards}/>}
        {addingProject&&<AddProjectModal team={teamRoster} onClose={()=>setAddingProject(false)} onAdd={addProject}/>}

        {/* Studio Agent */}
        <StudioAgent
          projects={projects}
          team={teamRoster}
          onOpenProject={openProject}
          onApplyUpdate={update=>{
            if(!update) return;
            // Handle single update or batched updates array
            const actions = update.updates || (update.action ? [update] : []);
            actions.forEach(u=>{
              const {action, projectId, field, value, production, productionId, changes, deliverable} = u;
              if(action==="updateProject" && projectId && field) {
                updateProject(projectId, field, value);
              } else if(action==="addProduction" && projectId && production) {
                const p = projects.find(x=>x.id===projectId);
                if(p) updateProject(projectId, "productions", [
                  ...(p.productions||[]),
                  { id:uid(), status:"Planning", notes:"", feedsIntoId:null,
                    playbackDeliverableId:null, playbackAssets:[], assetRequests:[],
                    equipmentIds:[], externalGear:[], mediaCardIds:[],
                    crewInternal:[], crewExternal:[], schedule:[],
                    ingest:{datetime:"",notes:"",transcriptNeeded:false,reviewLinkNeeded:false,
                           recurringOrOnce:"",sessionCount:"",reviewLinkType:"",reviewLinkCount:"",
                           reviewWatermark:false,brightcoveNeeded:false,brightcovePW:false,reviewLinkDelIds:[]},
                    deliverables:[], secondaryLocations:[],
                    ...production }
                ]);
              } else if(action==="updateProduction" && projectId && productionId && changes) {
                const p = projects.find(x=>x.id===projectId);
                if(p) updateProject(projectId, "productions",
                  (p.productions||[]).map(pr=>pr.id===productionId?{...pr,...changes}:pr));
              } else if(action==="addDeliverable" && projectId && deliverable) {
                const normalizeRound = r => ({
                  id:        r.id||uid(),
                  label:     r.label||"Round 1",
                  deadline:  r.deadline||"",
                  reviewers: Array.isArray(r.reviewers) ? r.reviewers : [],
                  status:    r.status||"Pending",
                  notes:     r.notes||"",
                });
                addDel(projectId, {
                  id:             uid(),
                  status:         "Not Started",
                  frameLink:      "",
                  framePW:        "",
                  editorId:       null,
                  animatorId:     null,
                  producerId:     null,
                  notes:          "",
                  srtNeeded:      false,
                  captionsNeeded: false,
                  aspectRatio:    "16:9",
                  ...deliverable,
                  rounds: (deliverable.rounds||[]).map(normalizeRound),
                });
              } else if(action==="openProject" && projectId) {
                const p = projects.find(x=>x.id===projectId);
                if(p) openProject(p, u.tab||"overview");
              }
            });
          }}
        />
        {/* Toast notification */}
        {toast&&(
          <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:600,background:toast.color,borderRadius:10,padding:"12px 24px",fontSize:14,fontWeight:700,color:"#fff",boxShadow:"0 8px 32px rgba(0,0,0,0.4)",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em",pointerEvents:"none",animation:"fadeInUp 0.2s ease"}}>
            {toast.msg}
          </div>
        )}
      </div>
    </>
  );
}

</script>

<script>
// Retrieve app source — stored as inert text/plain, not parsed as JS
const APP_SRC = document.getElementById("app-src").textContent;
</script>

</body>
</html>
